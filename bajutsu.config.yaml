# Bajutsu config — team-wide defaults, overlaid by per-app entries.
#
# `bajutsu run|doctor|record --app <name>` resolves apps.<name>: the app entry
# overrides defaults (backend/device/locale), redact is merged (union), and
# capture/reservedNamespaces come from defaults. A scenario's preconditions add to
# launchEnv/launchArgs at run time.

# ── Team-wide defaults (apply to every app unless the app overrides them) ──
defaults:
  # Actuator selection in UI-stability order. The FIRST backend available on this
  # machine becomes the actuator and performs every tap/type/swipe/query for the
  # whole run (fixed at start, to avoid two drivers fighting over one device).
  # rocketsim taps semantically (by id, most stable); idb taps by coordinate.
  # May be a single string or a list.
  backend: [rocketsim, idb]

  device: "iPhone 15"   # default simulator model (override per app if needed)
  locale: en_US         # default locale

  # Evidence captured by default. Each token is <kind>[.<modifier>]; the light
  # three are screenshot.after / elements / actionLog. Heavier interval kinds
  # (video / deviceLog) are opt-in per step or via a scenario's capturePolicy.
  capture: [screenshot.after, elements, actionLog]

  # Masking applied before evidence is written. Merged (union) with each app's
  # redact. Three independent lists:
  redact:
    headers: [Authorization, Cookie]   # HTTP header names to mask (network evidence)
    fields: [token, password]          # JSON/body field names to mask
    # labels: []                       # accessibility labels to mask (optional)

  # Identifier namespaces reserved for cross-cutting concerns. Intent: any app that
  # uses these should also list them in its idNamespaces. (Informational for now —
  # `doctor` scores against the app's idNamespaces only.)
  reservedNamespaces: [auth, nav]

# ── Per-app entries. `--app <name>` selects one of these ──
apps:
  # The bundled fixture app (sample/). Instrumented for every Bajutsu primitive.
  sample:
    bundleId: com.bajutsu.sample      # required — the app's bundle identifier
    deeplinkScheme: bajutsusample     # URL scheme for deep-link preconditions
    # accessibilityIdentifier namespaces this app is allowed to use (first segment
    # of each id). `doctor` scores how well on-screen ids conform to this list.
    idNamespaces: [home, list, counter, settings, onboarding, auth, nav, comp]
    # Env vars passed to the app on launch (as SIMCTL_CHILD_*). Scenarios can add
    # more via preconditions.launchEnv.
    launchEnv: { SAMPLE_UITEST: "1" }
    # Optional per-app keys (all override or extend the defaults above):
    #   backend: [...]            # actuator order for this app
    #   device: "iPhone 17 Pro"   # simulator model
    #   locale: ja_JP
    #   launchArgs: ["-AppleLanguages", "(ja)"]
    #   setup: "<shell cmd run before the app launches>"
    #   redact: { headers: [...], fields: [...], labels: [...] }
    #   mockServer: { cmd: "<start cmd>", port: 8080, stubs: "<stubs dir>" }