# Self-hosting bajutsu's single-tenant server backend (BE-0016 Tier B) — the Linux control plane.
# The macOS worker runs natively on a Mac (it needs the Simulator) and joins over the tailnet; see
# docs/self-hosting.md. Copy .env.example to .env and fill it in, then `docker compose up -d`.
# One team = one (default) org; multi-tenant isolation is not implemented yet.
#
# Published ports bind to ${BIND_ADDR}, which defaults to 127.0.0.1 (loopback only). MinIO must
# stay private: to let the native Mac worker reach it, set BIND_ADDR to the host's tailnet IP —
# never 0.0.0.0 on a host that also has a public interface.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bajutsu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: bajutsu
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bajutsu"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Pinned for reproducible deploys; bump deliberately after re-validating with this stack.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:?set AWS_ACCESS_KEY_ID in .env}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:?set AWS_SECRET_ACCESS_KEY in .env}
    volumes: ["miniodata:/data"]
    # S3 API (reached by the Mac worker over the tailnet) + console — same BIND_ADDR rule as Redis;
    # loopback by default so a public host can't accidentally expose the artifacts bucket.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:9000:9000"
      - "${BIND_ADDR:-127.0.0.1}:9001:9001"

  # One-shot: wait for MinIO, then create the artifacts/scenarios bucket (idempotent on a restart
  # with a persisted volume — --ignore-existing keeps `mc mb` from failing if the bucket is there).
  # BAJUTSU_SERVER_STORE names the bucket as a URI (s3://bucket/prefix, BE-0204); strip the scheme
  # and any prefix path to get the bare bucket name `mc mb` needs. This service only ever talks to
  # MinIO, so a gs:// value (meant for the GCS path, which drops this service entirely) fails loudly
  # here rather than silently producing a bogus bucket name.
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    env_file: .env
    depends_on: [minio]
    entrypoint:
      - sh
      - -c
      - >
        case "$$BAJUTSU_SERVER_STORE" in
        s3://*) ;;
        *) echo "minio-init needs an s3://bucket BAJUTSU_SERVER_STORE, got: $$BAJUTSU_SERVER_STORE" >&2; exit 1 ;;
        esac;
        bucket="$${BAJUTSU_SERVER_STORE#s3://}"; bucket="$${bucket%%/*}";
        if [ -z "$$bucket" ]; then
        echo "minio-init needs an s3://bucket BAJUTSU_SERVER_STORE, got: $$BAJUTSU_SERVER_STORE" >&2; exit 1;
        fi;
        until mc alias set m http://minio:9000 "$$AWS_ACCESS_KEY_ID" "$$AWS_SECRET_ACCESS_KEY";
        do sleep 1; done;
        mc mb --ignore-existing "m/$$bucket"

  # One-shot: bring the schema to head (orgs/users/projects/runs/audit_log + users.role).
  migrate:
    build: { context: ../.., dockerfile: deploy/self-host/Dockerfile }
    env_file: .env
    # Derive the DB URL from POSTGRES_PASSWORD so the two can't drift (this overrides any
    # BAJUTSU_DATABASE_URL in .env, which is only for non-compose use).
    environment:
      BAJUTSU_DATABASE_URL: postgresql+psycopg://bajutsu:${POSTGRES_PASSWORD}@postgres:5432/bajutsu
    working_dir: /app
    command: ["alembic", "-c", "bajutsu/serve/server/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres: { condition: service_healthy }

  bajutsu:
    # GIT_COMMIT (BE-0277) embeds the built commit into the image so serve's version badge can
    # report it with no .git in the container. Compose resolves it from the invoking shell or .env;
    # build with e.g. `GIT_COMMIT=$(git rev-parse HEAD) docker compose build bajutsu`. Unset → empty
    # → the badge shows the version alone, as before. Only this service serves the badge endpoint,
    # so `migrate` (Alembic only) needs no build arg.
    build:
      context: ../..
      dockerfile: deploy/self-host/Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-}
    env_file: .env
    # Same as migrate: derive the DB URL from POSTGRES_PASSWORD so it can't use a stale password.
    environment:
      BAJUTSU_DATABASE_URL: postgresql+psycopg://bajutsu:${POSTGRES_PASSWORD}@postgres:5432/bajutsu
    # Mount your config.yml (the app/project list the server backend exposes) at /config.
    command:
      - bajutsu
      - serve
      - --asgi
      - --backend=server
      - --host=0.0.0.0
      - --port=8765
      - --config=/config/bajutsu.config.yaml
    volumes: ["./config:/config:ro"]
    # Front with Tailscale serve (loopback default) or the caddy profile below; set BIND_ADDR only
    # if something off-host must reach 8765 directly.
    ports: ["${BIND_ADDR:-127.0.0.1}:8765:8765"]
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
      migrate: { condition: service_completed_successfully }

  # Optional Linux web (Playwright) worker (BE-0173), off by default so an iOS-only single-tenant
  # deploy is unchanged. Enable it to run a web-backend worker as a container:
  # docker compose --profile web-worker up -d --build
  # WARNING: until BE-0166 lands, `/api/worker/lease` leases the oldest queued job with no
  # backend/capability filtering, so a MIXED pool (this web worker + Mac iOS workers) can hand a web
  # worker an iOS job (and vice versa), which then fails. Keep the pool homogeneous per backend —
  # run either iOS workers or web workers against a control plane, not both — until BE-0166 routes by
  # backend.
  # It leases web jobs over HTTP and — per BE-0160 — holds NO object-store credentials; it needs only
  # the control-plane URL and the same operator token the control plane uses (BAJUTSU_SERVE_TOKEN,
  # from .env), passed to the worker as BAJUTSU_TOKEN.
  worker-web:
    build: { context: ../.., dockerfile: deploy/self-host/worker-web.Dockerfile }
    profiles: ["web-worker"]
    environment:
      BAJUTSU_SERVER_URL: http://bajutsu:8765
      BAJUTSU_TOKEN: ${BAJUTSU_SERVE_TOKEN:?set BAJUTSU_SERVE_TOKEN in .env}
    depends_on:
      bajutsu: { condition: service_started }

  # Optional TLS reverse proxy for a real public hostname. Tailnet-only deploys skip this and use
  # `tailscale serve --bg 8765`. Enable with: docker compose --profile caddy up -d
  caddy:
    image: caddy:2
    profiles: ["caddy"]
    env_file: .env
    depends_on: [bajutsu]
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data

  # Optional metrics stack (BE-0169): Prometheus scrapes serve's /metrics, Grafana charts it.
  # Not started by default — like the caddy profile. Enable with:
  #   docker compose --profile metrics up -d
  # Grafana then lands on ${BIND_ADDR}:3000 (log in as admin / GRAFANA_ADMIN_PASSWORD), with the
  # Prometheus datasource and a starter Bajutsu dashboard already provisioned.
  prometheus:
    # Pinned (v2.53 is a Prometheus LTS); bump deliberately after re-validating with this stack.
    image: prom/prometheus:v2.53.0
    profiles: ["metrics"]
    # /metrics sits behind serve's auth gate (BE-0051), so the scraper authenticates with the
    # operator token. Prometheus does not expand env vars in its config file, so write the token to
    # a file the scrape config reads via `authorization.credentials_file`.
    entrypoint:
      - /bin/sh
      - -c
      - >
        printf '%s' "$$BAJUTSU_SERVE_TOKEN" > /etc/prometheus/serve-token &&
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml
        --storage.tsdb.path=/prometheus
    environment:
      BAJUTSU_SERVE_TOKEN: ${BAJUTSU_SERVE_TOKEN:?set BAJUTSU_SERVE_TOKEN in .env}
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on: [bajutsu]

  grafana:
    # Pinned for reproducible deploys; bump deliberately after re-validating with this stack.
    image: grafana/grafana:11.1.0
    profiles: ["metrics"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    # Same BIND_ADDR rule as the other published ports: loopback by default.
    ports: ["${BIND_ADDR:-127.0.0.1}:3000:3000"]
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

volumes:
  pgdata:
  miniodata:
  caddydata:
  promdata:
  grafanadata:
