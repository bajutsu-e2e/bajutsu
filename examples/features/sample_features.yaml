# Robust on-device feature demo. Everything runs on the *settled* Home screen
# (SAMPLE_LOGGED_IN skips the flaky login navigation), so assertions are deterministic.
# Exercises: shared steps (use), secret input, tags, and device control.

# Phase 2 (use) + Phase 4 (secrets): a shared component bumps the counter; the secret
# is typed into the search field. Deterministic assertions on the settled screen.
- name: shared steps and secret input on home
  tags: [smoke, robust]
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1" }
  steps:
    - use: { component: _components/bump_counter.yaml, with: {} }
    - type: { into: { id: home.search }, text: "${secrets.PASSWORD}" }
  expect:
    - value: { sel: { id: counter.value }, equals: "2" }
    - exists: { id: home.search }

# Phase 5 (device control): set GPS + push, still on Home.
- name: device control on home
  tags: [smoke]
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1" }
  steps:
    - setLocation: { lat: 35.681, lon: 139.767 }
    - push: { payload: { aps: { alert: "hello from bajutsu" } } }
  expect:
    - exists: { id: home.title }
