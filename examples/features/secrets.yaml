# Phase 4: the password comes from ${secrets.PASSWORD} (resolved from the environment).
# The real value reaches the device, but the recorded scenario keeps the token.
- name: login with a secret password
  steps:
    - type: { into: { id: auth.email }, text: "user@example.com" }
    - type: { into: { id: auth.password }, text: "${secrets.PASSWORD}" }
    - tap: { id: auth.submit }
  expect:
    - exists: { id: home.title }
