# Public website + bilingual docs portal + generated API reference (BE-0093, extending BE-0065).
# Built by `make docs` (`mkdocs build --strict`) — a separate, heavier path kept out of the
# deterministic `make check` gate, like on-device E2E. mkdocstrings reads each public symbol's typed
# signature and docstring statically (via griffe), so the build imports none of the lazy/optional
# backends (playwright, fastapi, redis, boto3) — no mocking needed.
#
# Links that escape docs/ (../DESIGN.md, ../roadmaps/…) are rewritten to absolute GitHub URLs at
# build time by the scripts/docs_repo_links.py hook, so the in-repo source keeps its GitHub-readable
# relative links while --strict stays green. The English/日本語 switch is driven by
# mkdocs-static-i18n's folder mode: English at docs/*.md, the Japanese mirror under docs/ja/.
site_name: Bajutsu
site_url: https://bajutsu-e2e.github.io/bajutsu/
site_description: Natural-language-driven, determinism-first E2E testing — a platform-neutral core behind one Driver backend.
repo_url: https://github.com/bajutsu-e2e/bajutsu
docs_dir: docs
use_directory_urls: false

# The slim docs/README.md files are the GitHub folder index, not site pages; the site's landing page
# is docs/index.md. Excluding them avoids a README.md↔index.md output collision and keeps their
# repo-relative links out of the --strict link check.
exclude_docs: |
  README.md
  ja/README.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# The docs were authored to render on GitHub, so headings carry GitHub-style anchors (Unicode
# preserved, spaces → hyphens). pymdownx's slugify reproduces those, so the in-page `#anchor` links
# resolve under --strict; the default toc slugify strips non-ASCII and would break every Japanese
# anchor. The rest is the mkdocs-material baseline the pages assume (tables, admonitions, fenced
# code, footnotes).
markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - tables
  - attr_list
  - md_in_html
  - admonition
  - footnotes
  - pymdownx.highlight
  # The `mermaid` custom fence lets mkdocs-material render ```mermaid blocks client-side (the
  # theme bundles the JS), matching how GitHub already renders the same fences natively — so a
  # diagram's mermaid source (kept in the page for editability) looks the same in both places. A
  # follow-up will pair each diagram with a checked-in SVG render behind a collapsed <details>.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details

# Rewrite docs/-escaping links to absolute repo URLs before rendering (see the script's docstring).
hooks:
  - scripts/docs_repo_links.py

plugins:
  - search
  # English is the default (docs/*.md); Japanese is the docs/ja/ mirror. A page with no ja sibling
  # (the generated api/ reference) falls back to English on the Japanese site.
  - i18n:
      docs_structure: folder
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Roadmap status: ロードマップの状況
            Getting started: はじめに
            Getting started (iOS): はじめに（iOS）
            Getting started (web track): はじめに（web トラック）
            Overview: 概要
            Showcase app: ショーケースアプリ
            Concepts: コンセプト
            Glossary: 用語集
            Architecture: アーキテクチャ
            Vision: ビジョン
            Run loop: 実行ループ
            Authoring scenarios: シナリオの作成
            Scenarios: シナリオ
            Cookbook: クックブック
            Selectors: セレクタ
            DSL grammar: DSL 文法
            Recording: 記録
            Codegen: コード生成
            Drivers & platforms: ドライバとプラットフォーム
            Drivers: ドライバ
            Network: ネットワーク
            iOS on a real device and in a device cloud: iOS を実機とデバイスクラウドで動かす
            Evidence & reporting: evidence とレポート
            Evidence: evidence
            Reporting: レポート
            Operating: 運用
            Web UI: Web UI
            Configuration: 設定
            Self-hosting: セルフホスティング
            AI development: AI 開発
            Contributor workflow tutorial: コントリビューターワークフローチュートリアル
            API reference: API リファレンス
            Scenario schema: シナリオスキーマ
            Driver & selectors: ドライバとセレクタ
            Runner: ランナー
            Assertions: アサーション
  # The English-only API reference is built into the Japanese site too (fallback), so every Python
  # object is documented at both api/… and ja/api/…. resolve_closest points each cross-reference at
  # the same-language copy instead of logging an ambiguous-URL warning that --strict would fail on.
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_if_no_docstring: false
            members_order: source
            filters: ["!^_"]  # exclude private (`_`-prefixed) members from the reference
  # Social/OpenGraph preview cards. Enabled in CI only (the docs workflow installs the Cairo/Pango
  # native libs `mkdocs-material[imaging]` needs), so a bare local `make docs` needs no system deps.
  - social:
      enabled: !ENV [CI, false]

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bajutsu-e2e/bajutsu

nav:
  - Home: index.md
  # Generated from live BE metadata by scripts/build_roadmap_dashboard.py (BE-0094) into
  # docs/api/roadmap.md (gitignored); `make docs` regenerates it before the build.
  - Roadmap status: api/roadmap.md
  - Getting started:
      - Overview: overview.md
      - Getting started: getting-started/index.md
      - Getting started (iOS): getting-started/ios.md
      - Getting started (web track): getting-started/web.md
      - Showcase app: showcase.md
  - Concepts:
      - Concepts: concepts.md
      - Glossary: glossary.md
      - Architecture: architecture.md
      - Vision: vision.md
      - Run loop: run-loop.md
  - Authoring scenarios:
      - Scenarios: scenarios.md
      - Cookbook: cookbook.md
      - Selectors: selectors.md
      - DSL grammar: dsl-grammar.md
      - Recording: recording.md
      - Codegen: codegen.md
  - Drivers & platforms:
      - Drivers: drivers.md
      - Network: network.md
      - iOS on a real device and in a device cloud: ios-device-cloud.md
  - Evidence & reporting:
      - Evidence: evidence.md
      - Reporting: reporting.md
  - Operating:
      - CLI: cli.md
      - Web UI: web-ui.md
      - What uses Claude: ai-boundary.md
      - Configuration: configuration.md
      - CI: ci.md
      - AWS Device Farm: devicefarm.md
      - Self-hosting: self-hosting.md
      - AI development: ai-development.md
      - Roadmap workflow: roadmap-workflow.md
      - Contributor workflow tutorial: contributor-workflow-tutorial.md
  - API reference:
      - Overview: api/index.md
      - Configuration: api/config.md
      - Scenario schema: api/scenario.md
      - Driver & selectors: api/drivers.md
      - Runner: api/runner.md
