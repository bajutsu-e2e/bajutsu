# Web multi-touch (BE-0054): pinch / rotate are synthesized via CDP touch events. The home
# screen's gesture box classifies the live two-finger touches, so these assert the multiTouch
# path actually drove the page. Two scenarios so each gesture asserts its own clean state.
description: >-
  Web gestures — reach home, then drive the gesture box with a synthesized pinch and rotate,
  asserting the page classified each two-finger gesture.
scenarios:
  - name: pinch out is classified as a zoom
    steps:
      - tap: { id: onboarding.start }
      - tap: { id: auth.submit }
      - wait: { for: { id: gesture.box }, timeout: 5 }
      - pinch: { sel: { id: gesture.box }, scale: 2.0 }
    expect:
      - value: { sel: { id: gesture.status }, equals: "pinched-out" }

  - name: rotation is classified as a rotate
    steps:
      - tap: { id: onboarding.start }
      - tap: { id: auth.submit }
      - wait: { for: { id: gesture.box }, timeout: 5 }
      - rotate: { sel: { id: gesture.box }, radians: 1.0 }
    expect:
      - value: { sel: { id: gesture.status }, equals: "rotated" }
