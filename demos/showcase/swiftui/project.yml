name: BajutsuShowcaseSwiftUI
options:
  bundleIdPrefix: com.bajutsu.showcase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  BajutsuKit:
    path: ../../../BajutsuKit
targets:
  # The a11y build: ACCESSIBLE is defined, so every aid(...) attaches an identifier
  # and state mirrors to accessibilityValue. doctor --app grades this Ready.
  BajutsuShowcaseSwiftUI:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: BajutsuKit
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Showcase SwiftUI
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bajutsu.showcase.swiftui
            CFBundleURLSchemes: [showcaseswiftui]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bajutsu.showcase.swiftui
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ACCESSIBLE
  # The no-a11y twin: same Sources/, but ACCESSIBLE is absent, so aid(...) is a no-op
  # and no identifiers or mirrored values reach the tree. doctor --app grades it Blocked.
  BajutsuShowcaseSwiftUINoAx:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: BajutsuKit
    info:
      path: Info-NoAx.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Showcase SwiftUI (no a11y)
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bajutsu.showcase.swiftui.noax
            CFBundleURLSchemes: [showcaseswiftuinoax]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bajutsu.showcase.swiftui.noax
schemes:
  BajutsuShowcaseSwiftUI:
    build:
      targets:
        BajutsuShowcaseSwiftUI: all
  BajutsuShowcaseSwiftUINoAx:
    build:
      targets:
        BajutsuShowcaseSwiftUINoAx: all
