name: BajutsuShowcaseUIKit
options:
  bundleIdPrefix: com.bajutsu.showcase.ios.uikit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO
packages:
  BajutsuKit:
    path: ../../../BajutsuKit
targets:
  # a11y target: ACCESSIBLE defined → every aid(...) sets an identifier and state
  # mirrors to accessibilityValue. The deterministic-run / doctor-Ready variant.
  BajutsuShowcaseUIKit:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: BajutsuKit
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Showcase UIKit
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bajutsu.showcase.ios.uikit
            CFBundleURLSchemes: [showcaseuikit]
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bajutsu.showcase.ios.uikit
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: ACCESSIBLE
  # no-a11y twin: same Sources/, ACCESSIBLE undefined → aid(...) is a no-op and the
  # tree carries no identifiers. The record / doctor-Blocked variant.
  BajutsuShowcaseUIKitNoAx:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: BajutsuKit
    info:
      path: Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Showcase UIKit (no a11y)
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bajutsu.showcase.ios.uikit.noax
            CFBundleURLSchemes: [showcaseuikitnoax]
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bajutsu.showcase.ios.uikit.noax
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  BajutsuShowcaseUIKit:
    build:
      targets:
        BajutsuShowcaseUIKit: all
  BajutsuShowcaseUIKitNoAx:
    build:
      targets:
        BajutsuShowcaseUIKitNoAx: all
