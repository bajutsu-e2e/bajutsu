# -noax twin of scenarios/network_live.yaml. Tapping Refresh (the Stable toolbar button) issues a real
# GET to SHOWCASE_API_URL/horses; BajutsuKit captures the exchange as network evidence with no app
# change. The upstream response varies, so the scenario asserts only the deterministic fact — that the
# request was observed. Network capture is app-side (BajutsuKit, linked in the -noax build too), so it
# needs no accessibility. Run over XCUITest (`--backend ios`).
- name: refresh issues an observed catalog request
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { label: "Refresh", traits: [button] }, timeout: 10 }
      capture: [video, network]
    - tap: { label: "Refresh", traits: [button] }
    - wait: { until: { request: { method: GET, pathMatches: "/horses$" } }, timeout: 10 }
  expect:
    - request: { method: GET, pathMatches: "/horses$" }
