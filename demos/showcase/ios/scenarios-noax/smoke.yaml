# -noax twin of scenarios/smoke.yaml. Same flow — launch on the Stable tab and confirm the seeded
# catalog rendered — but this build carries no identifiers, so rows are addressed by their visible
# name ("Horse N", the `Text(horse.name)` StableView renders). Run over XCUITest (`--backend ios`):
# idb collapses the tab bar and can't reach a -noax element by label.
#
# The a11y twin asserts the fixed catalog is exactly five rows via `count: { idMatches: stable.row.* }`.
# There is no visible mirror of the catalog *size* (only the rows themselves), and an id-less count by
# label is unreliable — XCUITest can surface a row's cell and its inner static text as two elements —
# so this twin proves the catalog rendered by the presence of its bookend rows instead.
- name: stable catalog smoke
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { label: "Horse 1" }, timeout: 10 }
      capture: [video]
  expect:
    - exists: { label: "Horse 1" }
    - exists: { label: "Horse 3" }
    - exists: { label: "Horse 5" }
