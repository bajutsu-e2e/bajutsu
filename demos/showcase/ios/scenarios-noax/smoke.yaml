# -noax twin of scenarios/smoke.yaml. Same flow — launch on the Stable tab and confirm the seeded
# catalog rendered — but this build carries no identifiers, so rows are addressed by their visible
# name ("Horse N", the `Text(horse.name)` StableView renders). Run over XCUITest (`--backend ios`),
# which reaches a -noax element by its visible label (a coordinate backend could not).
#
# The a11y twin asserts three things: the catalog is exactly five rows (`count: { idMatches:
# stable.row.* }`), `stable.row.1` exists, and the empty state is absent. There is no visible mirror
# of the catalog *size* (only the rows themselves), and an id-less count by label is unreliable —
# XCUITest can surface a row's cell and its inner static text as two elements — so this twin proves
# the catalog rendered by the presence of its bookend rows instead of an exact count. The empty-state
# check does carry over: `labelMatches: "No horses"` matches the placeholder on both toolkits
# ("No horses" on SwiftUI, "No horses in the stable" on UIKit), the counterpart to search.yaml's twin
# asserting "No matches" is absent.
- name: stable catalog smoke
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { label: "Horse 1" }, timeout: 10 }
      capture: [video]
  expect:
    - exists: { label: "Horse 1" }
    - exists: { label: "Horse 3" }
    - exists: { label: "Horse 5" }
    - exists: { labelMatches: "No horses", negate: true }
