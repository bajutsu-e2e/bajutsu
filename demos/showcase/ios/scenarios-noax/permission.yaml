# -noax twin of scenarios/permission.yaml. Runtime notification permission (notDetermined →
# authorized): tap Request Notifications, then assert the visible "Notifications: authorized" mirror
# (and the "Granted" text the app renders once authorized).
#
# Non-deterministic on iOS, exactly like the a11y twin: the SpringBoard prompt is out-of-process and
# is cleared by the vision alert guard (`alertHandling`), an AI path — so this twin is NOT a
# deterministic gate on iOS. It is kept for 1:1 correspondence with the shared suite, not as a CI gate.
- name: grant notification permission
  tags: [permission, system]
  alertHandling: { instruction: "tap Allow" }
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Permissions", traits: [button] }
      capture: [video]
    - wait: { for: { label: "Request Notifications", traits: [button] }, timeout: 10 }
    - assert:
        - exists: { label: "Notifications: notDetermined" }
    - tap: { label: "Request Notifications", traits: [button] }
    - wait: { for: { label: "Granted" }, timeout: 10 }
  expect:
    - exists: { label: "Notifications: authorized" }
