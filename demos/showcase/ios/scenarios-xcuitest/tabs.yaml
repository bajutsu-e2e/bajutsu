# Demonstrates the XCUITest backend (BE-0019) driving a `-noax` app's tab bar by label —
# the tabs idb's `describe-all` collapses into one opaque "Tab Bar" group. Run with the iOS
# backend so xcuitest is selected: `--backend ios`. Works on both -noax showcase apps, which
# carry no accessibility identifiers, so the tabs are addressed by their visible label.
- name: switch tabs by label over xcuitest
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Search", traits: [button] }
      capture: [video]
    - tap: { label: "Log", traits: [button] }
  expect:
    - exists: { label: "Log", traits: [button, selected] }
    - exists: { label: "Search", traits: [button] }
