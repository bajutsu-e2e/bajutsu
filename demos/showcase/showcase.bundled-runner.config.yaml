# Bajutsu config for the BE-0292 bundled-runner e2e check. Identical to the two a11y iOS targets in
# showcase.config.yaml EXCEPT that neither carries an `xcuitest` block: with no `testRunner` and no
# `build`, a Simulator run falls through to the wheel-bundled generic runner (BE-0292). The
# `bundled-runner (xcuitest)` job runs `smoke.yaml` against both targets with `--backend xcuitest` after
# `make runner-bundle`, proving the bundled runner drives an app with no runner path and no build
# step. The runner is app-agnostic (BE-0019), so covering both SwiftUI and UIKit shows one bundled
# runner drives either toolkit. Kept separate from showcase.config.yaml so its explicit-testRunner
# targets — which the conformance lane and local `make run-*` still depend on — stay untouched.
defaults:
  backend: [ios]
  device: "iPhone 17 Pro"
  reservedNamespaces: []

targets:
  showcase-swiftui:
    bundleId: com.bajutsu.showcase.ios.swiftui
    deeplinkScheme: showcaseswiftui
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app
    build: make swiftui-build
    scenarios: scenarios

  showcase-uikit:
    bundleId: com.bajutsu.showcase.ios.uikit
    deeplinkScheme: showcaseuikit
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKit.app
    build: make uikit-build
    scenarios: scenarios
