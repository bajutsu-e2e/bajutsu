# Visual regression (VRT) demo — pixel-compare every screen against a baseline image.
#
# VRT needs a baseline to compare against, and the baseline is just a screenshot of a
# known-good run, so the flow is two-step (and the demo *is* that flow):
#
#   1. First run — no baseline exists yet. Each `visual` check fails with "baseline not
#      found"; the report shows the captured screenshot with an "Approve as baseline"
#      button (Web UI), or run `bajutsu approve`.
#   2. Approve, then re-run — the screenshots now match the baselines and the checks pass.
#      Change a pixel (or the UI) and the next run fails with a diff image.
#
# One scenario per screen (the five tabs, the two pushed detail screens, and the three
# modal styles). `SHOWCASE_UITEST` disables animations so each screen settles deterministically.
# `threshold` is the max allowed diff (% of pixels); `exclude` masks two volatile chrome strips
# before the compare — the top status bar (clock / signal) and the bottom floating tab bar, whose
# iOS 26 translucent "Liquid Glass" material samples the content behind it and so renders a few
# grey-levels off run-to-run. The values are screenshot *pixels* (device-scale dependent); tune
# them to your simulator. Baselines resolve inside the dir
# passed via `--baselines` (default: a `baselines/` folder beside this scenario, gitignored —
# regenerate locally). See demos/showcase/Makefile `vrt` / `vrt-approve`.
#
# The last two scenarios show BE-0171: `element` scopes the comparison to one element's frame (no
# chrome to mask, so no `exclude` needed), and a `{ selector: … }` entry in `exclude` masks an
# element by selector instead of a fixed pixel rectangle — stable across layout / resolution changes.
description: >-
  Visual regression demo — pixel-compare each showcase screen against a stored baseline. The
  first run reports missing baselines; approve them, then re-run to pass.
scenarios:
  - name: Stable catalog matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - wait: { for: { id: stable.row.1 }, timeout: 10 }
        capture: [video]
    expect:
      - visual: { baseline: stable.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Search matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Search", traits: [button] }
        capture: [video]
      - wait: { for: { id: search.field }, timeout: 10 }
    expect:
      - visual: { baseline: search.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Log matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Log", traits: [button] }
        capture: [video]
      - wait: { for: { id: log.submit }, timeout: 10 }
    expect:
      - visual: { baseline: log.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Notices matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Notices", traits: [button] }
        capture: [video]
      - wait: { for: { id: notice.row.1 }, timeout: 10 }
    expect:
      - visual: { baseline: notices.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Permissions matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Permissions", traits: [button] }
        capture: [video]
      - wait: { for: { id: perm.requestNotif }, timeout: 10 }
    expect:
      - visual: { baseline: permissions.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Horse Detail matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - wait: { for: { id: stable.row.1 }, timeout: 10 }
        capture: [video]
      - tap: { id: stable.row.1 }
      - wait: { for: { id: horse.title }, timeout: 5 }
    expect:
      - visual: { baseline: horse_detail.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Notice Detail matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Notices", traits: [button] }
        capture: [video]
      - wait: { for: { id: notice.row.1 }, timeout: 10 }
      - tap: { id: notice.row.1 }
      - wait: { for: { id: notice.detail.title }, timeout: 5 }
    expect:
      - visual: { baseline: notice_detail.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Filter sheet matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Log", traits: [button] }
        capture: [video]
      - wait: { for: { id: log.openFilter }, timeout: 10 }
      - tap: { id: log.openFilter }
      - wait: { for: { id: log.sheet.title }, timeout: 5 }
    expect:
      - visual: { baseline: filter_sheet.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Gallery cover matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Log", traits: [button] }
        capture: [video]
      - wait: { for: { id: log.openGallery }, timeout: 10 }
      - tap: { id: log.openGallery }
      - wait: { for: { id: log.cover.title }, timeout: 5 }
    expect:
      - visual: { baseline: gallery_cover.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  - name: Delete dialog matches its visual baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - tap: { label: "Log", traits: [button] }
        capture: [video]
      # Scroll the lower Modals controls clear of the floating tab bar before tapping (see modals.yaml).
      - wait: { for: { id: log.submit }, timeout: 10 }
      - swipe: { on: { id: log.note }, direction: up }
      - swipe: { on: { id: log.submit }, direction: up }
      - swipe: { on: { id: log.openFilter }, direction: up }
      - wait: { for: { id: log.openDelete }, timeout: 5 }
      - tap: { id: log.openDelete }
      - wait: { for: { id: log.dialog.delete }, timeout: 5 }
    expect:
      - visual: { baseline: delete_dialog.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1300, h: 130 }, { x: 0, y: 2250, w: 1300, h: 290 }] }

  # BE-0171: compare only the first catalog row's frame. The screenshot is cropped to that element,
  # so unrelated changes elsewhere on the screen (and the chrome strips) never affect this check.
  - name: First catalog row matches its element-scoped baseline
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - wait: { for: { id: stable.row.1 }, timeout: 10 }
        capture: [video]
    expect:
      - visual: { baseline: stable_row_element.png, threshold: 4.0, element: { id: stable.row.1 } }

  # BE-0171: mask the first row *by selector* rather than a pixel rectangle, so the mask follows the
  # element across layout / resolution changes; the status bar and tab bar stay masked by rectangle.
  - name: Catalog matches its baseline with the first row masked by selector
    preconditions:
      launchEnv: { SHOWCASE_UITEST: "1" }
    steps:
      - wait: { for: { id: stable.row.1 }, timeout: 10 }
        capture: [video]
    expect:
      - visual:
          baseline: stable_row_masked.png
          threshold: 4.0
          exclude:
            - { x: 0, y: 0, w: 1300, h: 130 }
            - { x: 0, y: 2250, w: 1300, h: 290 }
            - { selector: { id: stable.row.1 } }
