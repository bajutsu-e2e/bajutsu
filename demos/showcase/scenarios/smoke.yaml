# Smoke: the app launches on the Stable tab, the fixed catalog is present, and the seeded
# rows show. Runs identically against showcase-swiftui and showcase-uikit (same ids). The
# catalog is fixed at five (no launch-env seed knob, BE-0079), so the count is a constant.
- name: stable catalog smoke
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: stable }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
  expect:
    - count: { sel: { idMatches: "stable.row.*" }, equals: 5 }
    - exists: { id: stable.row.1 }
    - exists: { id: stable.empty, negate: true }
