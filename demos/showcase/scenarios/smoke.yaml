# Smoke: the app launches logged-in, the Stable catalog seeds, and the seeded rows
# are present. Runs identically against showcase-swiftui and showcase-uikit (same ids).
- name: stable catalog smoke
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: stable, SHOWCASE_SEED: "5" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
  expect:
    - count: { sel: { idMatches: "stable.row.*" }, equals: 5 }
    - exists: { id: stable.row.1 }
    - exists: { id: stable.empty, negate: true }

- name: empty catalog shows the empty state
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: stable, SHOWCASE_SEED: "0" }
  steps:
    - wait: { for: { id: stable.empty }, timeout: 10 }
      capture: [video]
  expect:
    - exists: { id: stable.empty }
    - count: { sel: { idMatches: "stable.row.*" }, equals: 0 }
