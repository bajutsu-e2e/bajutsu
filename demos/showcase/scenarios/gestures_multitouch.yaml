# Multi-touch gestures (SPEC §5.3): pinch and rotate on the Log tab's dedicated two-finger
# targets. These are XCUITest-only — idb is single-touch and raises UnsupportedAction (BE-0019),
# so this scenario is NOT part of the idb smoke path; the e2e `xcuitest (multi-touch)` job runs
# it with `--backend xcuitest`. Each target flips its a11y value once the two-finger gesture is
# recognized, so the run can assert the actuation actually landed rather than merely not erroring.
#
# The targets sit below the long-press / double-tap pair in the Log form, and a SwiftUI List
# renders off-screen rows lazily (absent from the accessibility tree until scrolled in), so the
# scenario swipes them into view first — each swipe anchored on an element that stays visible as
# the form scrolls up, and a condition wait stops once the target appears.
- name: pinch and rotate targets mirror their result
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: log }
  steps:
    - wait: { for: { id: log.submit }, timeout: 10 }
      capture: [video]
    - swipe: { on: { id: log.submit }, direction: up }
    - swipe: { on: { id: log.dialog.value }, direction: up }
    - wait: { for: { id: log.doubletap }, timeout: 5 }
    - swipe: { on: { id: log.doubletap }, direction: up }
    - wait: { for: { id: log.pinch }, timeout: 5 }
    - assert:
        - value: { sel: { id: log.pinch.value }, equals: "idle" }
        - value: { sel: { id: log.rotate.value }, equals: "idle" }
    - pinch: { sel: { id: log.pinch }, scale: 2.0 }
    - rotate: { sel: { id: log.rotate }, radians: 1.0 }
  expect:
    - value: { sel: { id: log.pinch.value }, equals: "pinched" }
    - value: { sel: { id: log.rotate.value }, equals: "rotated" }
