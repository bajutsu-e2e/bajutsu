# Device-environment steps on the Android emulator (adb-backed): override the GPS location and
# round-trip the clipboard, then re-assert the settled screen — the deterministic Android twin of
# device.yaml (idb/simctl). The steps drive the device, not the app UI, so the flow runs on the
# Stable catalog (the launch tab, needing no tab-bar navigation) and re-asserts that the app stays on
# that screen, exactly as the iOS device.yaml re-asserts its seeded catalog. adb advertises
# `setLocation` and `clipboard` of the device-control family, so the flow is preflight-clean (BE-0212).
#
# The clipboard round-trip is the strong assertion this lane wanted from the start (PR #934): seed the
# primary clip, then read it back. It runs through the in-app receiver the showcase embeds from
# BajutsuAndroid (BE-0233) — `cmd clipboard` is a no-op on-device, and since Android 10 only the
# foreground app may touch the clipboard, so bajutsu drives it from inside the app.
#   bajutsu run --scenario device_android.yaml --target showcase-compose --backend android ...
- name: override the device location and round-trip the clipboard (android)
  tags: [system]
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
    - setLocation: { lat: 35.681, lon: 139.767 }
    - setClipboard: { text: "COUPON123" }
  expect:
    - exists: { id: stable.row.1 }
    - clipboard: { equals: "COUPON123" }
