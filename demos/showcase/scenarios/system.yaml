# Pasteboard round-trip: the Permissions tab's System section copies a known string and reads
# it back, so a scenario can assert pasteboard state idb's app-scoped query cannot otherwise
# observe. The round-trip is in-app (Copy then Paste) so it reads back silently — reading a
# pasteboard seeded by another process trips iOS's paste-permission prompt. The System section
# sits below Notifications + Location, so scroll to the bottom (two swipes, the second anchored
# on Location which is still visible after the first) before tapping.
- name: copy then paste round-trips through the mirror
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: permissions }
  steps:
    - wait: { for: { id: perm.requestNotif }, timeout: 10 }
      capture: [video]
    - swipe: { on: { id: perm.requestNotif }, direction: up }
    - swipe: { on: { id: perm.requestLocation }, direction: up }
    - wait: { for: { id: sys.paste.value }, timeout: 5 }
    - tap: { id: sys.copy }
    - tap: { id: sys.paste }
  expect:
    - value: { sel: { id: sys.paste.value }, equals: "bajutsu-clip" }
