# iOS-only device-environment step (simctl-backed): deliver a push notification to the app, then
# re-assert the settled screen (the push does not change the foreground UI, so the Stable catalog is
# still shown). Split out of the shared device.yaml because `push` has no faithful Android-emulator
# equivalent — adb does not advertise `deviceControl.push`, so preflight (bajutsu/capability_preflight.py)
# rejects a `push` step on the adb backend before any device work. The cross-backend half (setLocation
# + clipboard) lives in device.yaml; this file carries only the iOS-specific push and so runs on the
# iOS XCUITest backend alone. Making push work on the Android emulator is a separate roadmap item.
#   bajutsu run --scenario push.yaml --target showcase-swiftui ...
- name: receive a push notification
  tags: [system]
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
    - push: { payload: { aps: { alert: "You have a new message" } } }
  expect:
    - exists: { id: stable.row.1 }
