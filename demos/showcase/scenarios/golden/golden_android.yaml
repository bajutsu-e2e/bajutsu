# Golden element-tree assertion (BE-0006), Android adb path: pin the normalized representation of
# the Compose Stable catalog's list rows — the same accuracy risks golden.yaml (idb) guards, now on
# the third backend. The Stable tab is the launch tab, so adb reaches it with no tab navigation
# (BE-0107 retired SHOWCASE_TAB, and adb cannot tap the native tab bar); this is why the golden
# stays on the Stable tab. Its recorded tree is the adb backend's, distinct from idb's lists.json
# and XCUITest's controls.json — each backend renders a different accessibility tree, so each keeps
# its own baseline (BE-0208 unit 4).
#
# Comparison is per-field, not whole-dict: exact for identifier / label / value, set-equal for
# traits, and a tolerant sanity check on frame (see bajutsu/golden.py) — which is why one baseline
# recorded on the local arm64 emulator also passes on the CI x86_64 emulator: the frame geometry
# differs by density but is only sanity-checked, while identity / label / traits are stable across
# the ABI. Re-record from a run's elements.json when a deliberate normalizer / control change moves
# a field.
- name: golden lists (android)
  tags: [golden, lists]
  description: >-
    Assert the normalized element tree for the Compose Stable catalog matches the recorded
    Android golden — the catalog rows, the refresh button, and the mirrored status the
    Motivation flagged as accuracy risks (identity, state, traits exact; frame sane).
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
  expect:
    - golden: { path: lists_android.json }
