# Golden element-tree assertions (BE-0006), idb path: pin the normalized representation of the
# Stable catalog's list rows so a drift in idb / iOS surfaces as a failing check, not a silent
# field regression. The Stable tab is the launch tab, so idb reaches it with no tab navigation;
# the weekly idb-monitor runs this against the latest idb_companion (BE-0079 discharged sample's
# role). The Log tab's Entry-control golden moved to golden_xcuitest.yaml when SHOWCASE_TAB was
# retired (BE-0107): idb can no longer reach the Log tab, so that golden runs on XCUITest.
#
# Comparison is per-field, not whole-dict: exact for identifier / label / value, set-equal
# for traits, and a tolerant sanity check on frame (see bajutsu/golden.py). Re-record with the
# scratch flow in the BE-0079 item when a deliberate normalizer / control change moves a field.

- name: golden lists
  tags: [golden, lists]
  description: >-
    Assert the normalized element tree for the Stable catalog matches the recorded golden —
    the List rows (NavigationLink), the toolbar button, and the mirrored status the
    Motivation flagged as accuracy risks.
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
  expect:
    - golden: { path: lists.json }
