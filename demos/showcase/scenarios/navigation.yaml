# Navigation: tap a catalog row to push Horse Detail, toggle the favorite, then pop
# back via the cross-backend `back` step (Android: system key; iOS: OS back button).
#
# These scenarios use launchEnv + taps only (no literal-scheme deeplinks), so the one
# file drives both showcase-swiftui and showcase-uikit unchanged. Deeplinks are
# per-target (their schemes differ); see ../README.md for the per-scheme `openurl` form.
- name: push horse detail and pop back
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: stable }
  steps:
    - wait: { for: { id: stable.row.3 }, timeout: 10 }
      capture: [video]
    - tap: { id: stable.row.3 }
    - wait: { for: { id: horse.title }, timeout: 5 }
    - assert:
        - value: { sel: { id: horse.id.value }, equals: "3" }
        - value: { sel: { id: horse.favorite.value }, equals: "off" }
    - tap: { id: horse.favorite }
    - assert:
        - value: { sel: { id: horse.favorite.value }, equals: "on" }
    - back: {}
    - wait: { for: { id: stable.row.3 }, timeout: 5 }
  expect:
    - exists: { id: stable.row.3 }
    - exists: { id: horse.title, negate: true }
