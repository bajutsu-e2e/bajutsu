# Runtime notification permission (notDetermined → authorized), shared across iOS and Android. The
# steps and assertions are identical on both; only the grant *mechanism* differs, and it lives in the
# target config, not this scenario:
#   - iOS (idb / XCUITest): there is no deterministic pre-grant (simctl can't grant notifications), so
#     the out-of-process SpringBoard prompt is handled by the vision alert guard — `dismissAlerts` here
#     taps "Allow" to grant. This is an AI path (needs Claude via the api-key / claude-code / ant
#     provider), so on iOS the scenario is not deterministic.
#   - Android (adb): showcase-compose's config `grantPermissions: [POST_NOTIFICATIONS]` pre-grants at
#     lease time (`pm grant` after `pm clear`, before launch), so the RequestPermission contract
#     short-circuits to granted with no dialog. No prompt appears, so the guard never fires and no LLM
#     runs — the flow stays fully deterministic on the android-e2e lane (prime directive 1 holds). The
#     guard is an alert *handler*, never an assertion, so it never touches the pass/fail verdict.
# The app model starts at notDetermined regardless of any OS-level grant, so the pre/post assertions
# are identical on both platforms. `dismissAlerts` is on but no-ops wherever no prompt appears.
- name: grant notification permission
  tags: [permission, system]
  dismissAlerts: { instruction: "tap Allow" }   # iOS: tap Allow to grant; Android: no-op (pre-granted)
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Permissions", traits: [button] }
      capture: [video]
    - wait: { for: { id: perm.requestNotif }, timeout: 10 }
    - assert:
        - value: { sel: { id: perm.notif.value }, equals: "notDetermined" }
    - tap: { id: perm.requestNotif }
    # iOS: the prompt covers the app and collapses idb's tree, so this wait times out and the alert
    # guard taps "Allow"; the retry then sees the granted state. Android: pre-granted, so the positive
    # node appears immediately with no dialog and the guard stays idle.
    - wait: { for: { id: perm.notif.authorized }, timeout: 10 }
  expect:
    - value: { sel: { id: perm.notif.value }, equals: "authorized" }
