# Runtime notification permission (notDetermined → authorized), shared across iOS and Android. The
# steps and assertions are identical on both; only the grant *mechanism* differs, and it lives in the
# target config, not this scenario:
#   - iOS (XCUITest): there is no deterministic pre-grant (simctl can't grant notifications), so
#     the out-of-process SpringBoard prompt is handled by the vision alert guard — `dismissAlerts` here
#     taps "Allow" to grant. This is an AI path (needs Claude via the api-key / claude-code / ant
#     provider), so on iOS the scenario is not deterministic.
#   - Android (adb): showcase-compose's config `grantPermissions: [POST_NOTIFICATIONS]` pre-grants at
#     lease time (`pm grant` after `pm clear`, before launch), so the RequestPermission contract
#     short-circuits to granted with no dialog. No prompt appears, so the guard never fires and no LLM
#     runs — the flow stays fully deterministic on the android-e2e lane (prime directive 1 holds). The
#     guard is an alert *handler*, never an assertion, so it never touches the pass/fail verdict.
# The app's notification model starts at notDetermined regardless of any OS-level grant (it only
# updates inside the request completion handler), so the pre/post assertions below are identical on
# both platforms. `dismissAlerts` is on but no-ops wherever no prompt appears. The location scenario
# below does *not* share this "starts at notDetermined" property on iOS — see its own comment.
# Tagged `ai` (on top of `permission`/`system`) so the iOS smoke lane can `--exclude ai` and run only
# this file's deterministic `location` scenario below, per prime directive 1 — Android runs both
# untouched (neither needs AI there).
- name: grant notification permission
  tags: [permission, system, ai]
  dismissAlerts: { instruction: "tap Allow" }   # iOS: tap Allow to grant; Android: no-op (pre-granted)
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Permissions", traits: [button] }
      capture: [video]
    - wait: { for: { id: perm.requestNotif }, timeout: 10 }
    - assert:
        - value: { sel: { id: perm.notif.value }, equals: "notDetermined" }
    - tap: { id: perm.requestNotif }
    # iOS: the prompt covers the app and collapses the app's a11y tree, so this wait times out and the alert
    # guard taps "Allow"; the retry then sees the granted state. Android: pre-granted, so the positive
    # node appears immediately with no dialog and the guard stays idle.
    - wait: { for: { id: perm.notif.authorized }, timeout: 10 }
  expect:
    - value: { sel: { id: perm.notif.value }, equals: "authorized" }

# Location, pre-granted declaratively (BE-0276): unlike notifications above, `location` has a TCC
# service on iOS (`simctl privacy grant location <bundle>`) and a real android.permission.* on
# Android (`pm grant`), so `permissions` handles it on both platforms — no SpringBoard/system
# prompt ever appears, so no dismissAlerts, no AI, fully deterministic on both lanes.
- name: location permission pre-granted
  tags: [permission, system]
  permissions:
    location: grant
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Permissions", traits: [button] }
      capture: [video]
    - wait: { for: { id: perm.requestLocation }, timeout: 10 }
    - tap: { id: perm.requestLocation }
    # Android: pre-granted, so the RequestPermission launcher's callback fires immediately with no
    # dialog. iOS: CLLocationManager reports a pre-granted status as soon as the delegate is set —
    # before this tap even runs — so, unlike the sibling notification scenario above, there is no
    # "notDetermined" window to assert here; the tap still runs as a no-op sanity check.
    - wait: { for: { id: perm.location.value, value: "authorizedWhenInUse" }, timeout: 10 }
  expect:
    - value: { sel: { id: perm.location.value }, equals: "authorizedWhenInUse" }
