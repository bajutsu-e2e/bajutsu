# OS alerts (the deliberate ones): the Permissions tab raises the SpringBoard notification
# prompt, which is out-of-process — idb's app-scoped query cannot see or tap it. The run's
# vision alert guard handles it; `dismissAlerts.instruction` here taps "Allow" (granting)
# instead of dismissing. Needs ANTHROPIC_API_KEY for the guard.
#
# The prompt only appears while authorization is notDetermined; a clean reinstall (the
# default) resets it, so each run sees the prompt afresh.
- name: grant notification permission
  dismissAlerts: { instruction: "tap Allow" }   # grant the prompt instead of dismissing it
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: permissions }
  steps:
    - wait: { for: { id: perm.requestNotif }, timeout: 10 }
      capture: [video]
    - assert:
        - value: { sel: { id: perm.notif.value }, equals: "notDetermined" }
    - tap: { id: perm.requestNotif }
    # The prompt covers the app and collapses idb's tree, so this wait times out and the
    # alert guard taps "Allow"; the retry then sees the granted state.
    - wait: { for: { id: perm.notif.authorized }, timeout: 4 }
  expect:
    - value: { sel: { id: perm.notif.value }, equals: "authorized" }
