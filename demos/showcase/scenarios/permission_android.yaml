# Runtime permission handling (BE-0210), Android adb path — the deterministic twin of permission.yaml
# (idb). On iOS the notification prompt is an out-of-process SpringBoard alert the app-scoped query
# cannot tap, so permission.yaml leans on the vision alert guard (`dismissAlerts`, needs an API key).
# Android grants the permission up front instead: showcase-compose's `grantPermissions` lists
# POST_NOTIFICATIONS, so the lease grants it with `pm grant` after `pm clear` but before launch
# (bajutsu/platform_lifecycle.py). A pre-granted permission makes Android's RequestPermission contract
# return granted immediately without ever raising the system dialog — so this flow stays fully
# deterministic (no LLM, no fixed sleep; prime directives 1 and 2 hold) and belongs on the CI lane.
#
# The Permissions tab is not the launch tab, so this taps the native tab bar to reach it — a
# NavigationBarItem resolves the shared `{ label, traits: [button] }` selector (BE-0223). The app
# model still starts at notDetermined regardless of the OS grant, so the pre/post assertions mirror
# permission.yaml exactly; only the grant mechanism differs.
- name: grant notification permission (android)
  tags: [permission, system]
  description: >-
    Assert the notification permission goes notDetermined → authorized when granted up front via
    `pm grant`, with no runtime dialog and no alert guard — the deterministic Android twin of the
    idb `dismissAlerts` flow.
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Permissions", traits: [button] }
      capture: [video]
    - wait: { for: { id: perm.requestNotif }, timeout: 10 }
    - assert:
        - value: { sel: { id: perm.notif.value }, equals: "notDetermined" }
    # Pre-granted, so the contract short-circuits to granted with no dialog; the positive
    # `perm.notif.authorized` node appears without any alert guard tapping "Allow".
    - tap: { id: perm.requestNotif }
    - wait: { for: { id: perm.notif.authorized }, timeout: 10 }
  expect:
    - value: { sel: { id: perm.notif.value }, equals: "authorized" }
