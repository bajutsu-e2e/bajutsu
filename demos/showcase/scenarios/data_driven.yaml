# Data-driven runs: one scenario, three rows. Each row runs in its own clean environment
# (preconditions carry over), so the Search filter starts empty every time. `${row.*}` tokens
# are substituted per row — here in both the typed query and the asserted row id, so each row
# proves the filter found exactly the horse it searched for.
#   bajutsu run --scenario data_driven.yaml --target showcase-swiftui ...
- name: search finds the seeded horse
  data:
    - { q: "Horse 1", n: "1" }
    - { q: "Horse 3", n: "3" }
    - { q: "Horse 5", n: "5" }
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1", SHOWCASE_TAB: search, SHOWCASE_SEED: "5" }
  steps:
    - wait: { for: { id: search.field }, timeout: 10 }
    - type: { into: { id: search.field }, text: "${row.q}" }
    - wait: { for: { id: "search.row.${row.n}" }, timeout: 5 }
  expect:
    - value: { sel: { id: search.count }, equals: "1" }
    - exists: { id: "search.row.${row.n}" }
