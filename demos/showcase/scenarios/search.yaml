# Search: type into the search field to filter the catalog; the match count is mirrored
# to an a11y value, and a no-match query shows the empty state. Seed is "Horse 1".."Horse 5".
# Each id lists both its dotted SPEC form (iOS / Compose) and its underscore Android Views form,
# so one scenario runs unchanged on every target (BE-0221).
- name: filter narrows the catalog
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Search", traits: [button] }
      capture: [video]
    - wait: { for: { id: [search.field, search_field] }, timeout: 10 }
    - type: { text: "Horse 3", into: { id: [search.field, search_field] } }
    - wait: { for: { id: [search.row.3, search_row_3] }, timeout: 5 }
  expect:
    - count: { sel: { idMatches: ["search.row.*", "search_row_*"] }, equals: 1 }
    - value: { sel: { id: [search.count, search_count] }, equals: "1" }
    - exists: { id: [search.results-empty, search_results_empty], negate: true }

- name: no match shows the empty state
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Search", traits: [button] }
      capture: [video]
    - wait: { for: { id: [search.field, search_field] }, timeout: 10 }
    - type: { text: "zzz", into: { id: [search.field, search_field] } }
    - wait: { for: { id: [search.results-empty, search_results_empty] }, timeout: 5 }
  expect:
    - exists: { id: [search.results-empty, search_results_empty] }
    - count: { sel: { idMatches: ["search.row.*", "search_row_*"] }, equals: 0 }
    - value: { sel: { id: [search.count, search_count] }, equals: "0" }
