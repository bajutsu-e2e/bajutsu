# Tabs (a11y): exercises the tab bar itself on the accessibility-on iOS apps. Each
# UITabBarItem / SwiftUI tabItem Label now also carries its own idNamespace as an
# accessibilityIdentifier (MainTabBarController.swift / RootView.swift), so this switches
# tabs by `id` instead of the `label`+`traits:[button]` selector the shared scenarios/
# and the -noax twin (ios/scenarios-xcuitest/tabs.yaml) use.
#
# iOS-only: unlike the shared scenarios/ directory, this is not run against the Android
# twins — the tab ids added here have no Android counterpart yet (BE-0007 follow-up), so
# a shared scenario keeps addressing tabs by label. Kept in its own directory rather than
# scenarios/ for that reason; pass it explicitly, e.g.:
#   bajutsu run --target showcase-swiftui --backend ios \
#     --config demos/showcase/showcase.config.yaml demos/showcase/ios/scenarios/tabs.yaml
- name: switch tabs by id
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { id: search, traits: [button] }
      capture: [video]
    - wait: { for: { id: search.field }, timeout: 10 }
    - tap: { id: log, traits: [button] }
    - wait: { for: { id: log.note }, timeout: 10 }
  expect:
    - exists: { id: log, traits: [selected] }
    - exists: { id: search, traits: [button] }
    - exists: { id: stable, traits: [button] }

- name: return to the Stable tab by id
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { id: notice, traits: [button] }
      capture: [video]
    - wait: { for: { id: notice.row.1 }, timeout: 10 }
    - tap: { id: stable, traits: [button] }
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
  expect:
    - exists: { id: stable, traits: [selected] }
    - exists: { id: notice.row.1, negate: true }
