# Tabs (a11y): exercises the tab bar itself. Each tab item carries its own idNamespace as its
# identifier — UITabBarItem.accessibilityIdentifier / SwiftUI tabItem Label on iOS
# (MainTabBarController.swift / RootView.swift), android:id / testTag on Android
# (MainActivity.kt / RootScreen.kt) — so this switches tabs by `id` instead of the
# `label`+`traits:[button]` selector the -noax twin (ios/scenarios-noax/tabs.yaml) uses. The
# ids themselves (`stable`, `search`, `log`, `notice`, `perm`) have no '.'/'-', so they need no
# dual id-form (BE-0221): the one literal id matches Compose/Views unchanged.
#
# `[ios]` now resolves to XCUITest (BE-0290), which taps the native tab bar by label, so this flow
# runs on the iOS backend like any other. The `tags: [xcuitest]` here is a legacy split: it dates
# from when `[ios]` could resolve to the retired coordinate idb backend, whose `describe-all`
# collapsed the tab bar into one opaque group regardless of accessibility identifiers (SPEC.md §3,
# BE-0107), which the `[ios]` capability ladder (BE-0240) could not auto-escalate for a plain
# `tap: { id, traits }` the way it does for a detected construct like `pinch`/`rotate` — there is
# nothing in the step for the preflight to key on. The tag lets `run-swiftui`/`run-uikit`'s bulk
# `[ios]` invocation (demos/showcase/Makefile) `--exclude` it, and `run-swiftui-tabs`/`run-uikit-tabs`
# run it on its own. Android's `backend: [android]` is a single-actuator pin (no ladder ambiguity),
# so it needs no such carve-out.
- name: switch tabs by id
  tags: [xcuitest]
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { id: search, traits: [button] }
      capture: [video]
    - wait: { for: { id: search.field }, timeout: 10 }
    - tap: { id: log, traits: [button] }
    - wait: { for: { id: log.note }, timeout: 10 }
  expect:
    - exists: { id: log, traits: [selected] }
    - exists: { id: search, traits: [button] }
    - exists: { id: stable, traits: [button] }

- name: return to the Stable tab by id
  tags: [xcuitest]
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { id: notice, traits: [button] }
      capture: [video]
    - wait: { for: { id: notice.row.1 }, timeout: 10 }
    - tap: { id: stable, traits: [button] }
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
  expect:
    - exists: { id: stable, traits: [selected] }
    - exists: { id: notice.row.1, negate: true }
