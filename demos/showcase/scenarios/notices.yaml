# Notices: a long vertical list (20 rows) whose bottom rows start off-screen. With lazy
# row rendering, an off-screen row is not in the accessibility tree at all until scrolled
# into view — so reaching it genuinely requires a scroll. launchEnv + taps/swipes/back only
# (no literal-scheme deeplinks), so this drives both a11y targets.
- name: the list has off-screen rows
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Notices", traits: [button] }
      capture: [video]
    - wait: { for: { id: notice.row.1 }, timeout: 10 }
  expect:
    - exists: { id: notice.row.1 }     # top rows are on-screen
    - exists: { id: notice.row.2 }
    - exists: { id: notice.row.20, negate: true }   # the last row starts below the fold

- name: tap a visible notice to open its detail, then pop back
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Notices", traits: [button] }
      capture: [video]
    - wait: { for: { id: notice.row.2 }, timeout: 10 }
    - tap: { id: notice.row.2 }
    - wait: { for: { id: notice.detail.title }, timeout: 5 }
    - assert:
        - exists: { id: notice.detail.body }
    - back: {}
    - wait: { for: { id: notice.row.1 }, timeout: 5 }
  expect:
    - exists: { id: notice.row.1 }
    - exists: { id: notice.detail.title, negate: true }

# The headline: scroll an off-screen target into view, then tap it. Each swipe scrolls a
# fraction of the screen (the default swipe travel) and is anchored on a row that stays
# visible as the list scrolls down; the condition wait stops once the target appears. A
# screen-relative travel keeps the reach comparable across devices of different densities (a
# fixed pixel count would scroll far less of a dense screen). The anchors step through the list
# with one swipe of margin (past row.16, through row.18) so the target is still reached where
# the list's fling settles shorter — a software-rendered CI emulator scrolls less per swipe
# than a hardware-accelerated device, and the extra step covers that gap without over-scrolling
# the target off the top on a faster one.
- name: scroll to an off-screen notice and open it
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - tap: { label: "Notices", traits: [button] }
      capture: [video]
    - wait: { for: { id: notice.row.1 }, timeout: 10 }
    - assert:
        - exists: { id: notice.row.20, negate: true }   # off-screen before scrolling
    - swipe: { on: { id: notice.row.4 }, direction: up }
    - swipe: { on: { id: notice.row.8 }, direction: up }
    - swipe: { on: { id: notice.row.12 }, direction: up }
    - swipe: { on: { id: notice.row.16 }, direction: up }
    - swipe: { on: { id: notice.row.18 }, direction: up }
    - wait: { for: { id: notice.row.20 }, timeout: 5 }   # now scrolled into view
    - tap: { id: notice.row.20 }
    - wait: { for: { id: notice.detail.title }, timeout: 5 }
  expect:
    - exists: { id: notice.detail.title }
