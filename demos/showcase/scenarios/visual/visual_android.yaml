# Visual regression (VRT) assertion, Android adb path (BE-0208 unit 4, visual dimension): pixel-compare
# the Compose Stable catalog against a recorded baseline image — the screenshot twin of the golden
# element-tree check (golden/golden_android.yaml), now guarding rendered pixels rather than the tree.
#
# Scope is the launch (Stable) tab only, mirroring golden_android.yaml: it is the tab the app launches
# on, so adb reaches it with no tab-bar navigation. One screen, one baseline — the minimal visual
# dimension; more screens can follow.
#
# Unlike the element-tree golden, a pixel baseline is host-specific: the CI x86_64 software renderer
# (swiftshader) and a local arm64 emulator diverge per pixel, so — unlike lists_android.json — this
# baseline must be RECORDED ON CI and committed. It lives in a committed dir (baselines_android/,
# passed via --baselines by the android Makefile's `e2e-visual` target), not the gitignored local
# baselines the iOS VRT demo (../visual.yaml) uses. Regenerate it by re-running the CI lane and
# promoting the captured screenshot (`bajutsu approve`) when a deliberate UI change moves pixels.
#
# `SHOWCASE_UITEST=1` disables app animations so the screen settles deterministically; the CI lane
# also runs the emulator with `disable-animations`. `exclude` masks the volatile system chrome —
# the top status bar (clock / battery / signal) — before the compare so the wall clock never churns
# the baseline. The mask box is in screenshot pixels for the pixel_6 x86_64 profile the CI lane pins;
# `threshold` allows minor software-renderer variance.
- name: visual stable catalog (android)
  tags: [visual, lists]
  description: >-
    Pixel-compare the Compose Stable catalog against the recorded Android visual baseline, masking
    the system status bar so the clock does not churn the comparison.
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: stable.row.1 }, timeout: 10 }
      capture: [video]
  expect:
    - visual: { baseline: stable.png, threshold: 4.0, exclude: [{ x: 0, y: 0, w: 1080, h: 100 }] }
