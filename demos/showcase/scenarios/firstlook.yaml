# First look: the smallest end-to-end "drive it and watch the assertion" scenario — the
# showcase's successor to the old demo/sample2 counter first-look. Browse the Stable catalog,
# open a horse, toggle Favorite, and watch the mirrored value flip. Deliberately minimal, so
# `tour` and a first read grok the run → assert loop at a glance; changing the expected value
# is the clean "modify it and watch the assertion break" demonstration. Each id lists both its
# dotted SPEC form (iOS / Compose) and its underscore Android Views form, so one scenario runs
# unchanged on every target (BE-0221).
- name: open a horse and favorite it
  preconditions:
    launchEnv: { SHOWCASE_UITEST: "1" }
  steps:
    - wait: { for: { id: [stable.row.1, stable_row_1] }, timeout: 10 }
      capture: [video]
    - tap: { id: [stable.row.1, stable_row_1] }
    - wait: { for: { id: [horse.favorite, horse_favorite] }, timeout: 5 }
    - assert:
        - value: { sel: { id: [horse.favorite.value, horse_favorite_value] }, equals: "off" }
    - tap: { id: [horse.favorite, horse_favorite] }
  expect:
    - value: { sel: { id: [horse.favorite.value, horse_favorite_value] }, equals: "on" }
