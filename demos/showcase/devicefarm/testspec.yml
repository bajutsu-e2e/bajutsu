# AWS Device Farm custom-environment test spec — reference example (BE-0235).
#
# This is the spec `scripts/devicefarm_submit.py` renders (via `render_test_spec`) for two showcase
# Compose scenarios; it is checked in as a readable reference and PoC starting point. Regenerate it
# for your own scenarios with:
#
#   uv run python scripts/devicefarm_submit.py \
#     --scenario scenarios/firstlook.yaml --scenario scenarios/controls.yaml \
#     --target showcase-compose --config showcase.config.yaml \
#     --package .=. --app-apk app-debug.apk --package-only
#
# Device Farm runs these phases on a host that already has `adb` connected to the reserved device
# (serial `booted`). Bajutsu runs here exactly as it does locally — the verdict comes from its own
# manifest, not from Device Farm's PASSED/FAILED classification. The install phase bootstraps Python
# 3.13 with uv because Device Farm's host tops out at 3.12 while Bajutsu requires >= 3.13 (a
# temporary workaround, removed once Device Farm ships 3.13 — see `_python_bootstrap_commands`).
# Batch-topology caveats (150-minute hard cap, APK-only, raw-adb as a host-toolchain by-product) are
# documented in docs/devicefarm.md.
version: 0.1
phases:
  install:
    commands:
    - python -m pip install --user --upgrade uv
    - $HOME/.local/bin/uv python install 3.13
    - $HOME/.local/bin/uv venv --python 3.13 $HOME/bajutsu-venv
    - $HOME/.local/bin/uv pip install --python $HOME/bajutsu-venv "$DEVICEFARM_TEST_PACKAGE_PATH"
  pre_test:
    commands:
    - adb devices
  test:
    commands:
    - $HOME/bajutsu-venv/bin/bajutsu run --scenario scenarios/firstlook.yaml --target
      showcase-compose --config showcase.config.yaml --backend adb --udid booted
    - $HOME/bajutsu-venv/bin/bajutsu run --scenario scenarios/controls.yaml --target
      showcase-compose --config showcase.config.yaml --backend adb --udid booted
  post_test:
    commands:
    - cp -r runs "$DEVICEFARM_LOG_DIR"/ || true
artifacts:
- $DEVICEFARM_LOG_DIR
