# Bajutsu config for the showcase dogfood suite — four iOS products from two codebases
# (UIKit × SwiftUI) plus their four Android twins (Views × Compose, BE-0007 preparation),
# each in an accessibility-on / -off variant. See SPEC.md.
#
# The two iOS `-a11y` apps expose an identical identifier contract, so the shared
# `scenarios/` directory runs unchanged against either iOS toolkit:
#   bajutsu run --target showcase-swiftui --config demos/showcase/showcase.config.yaml ...
#   bajutsu run --target showcase-uikit   --config demos/showcase/showcase.config.yaml ...
# The `-noax` apps carry no identifiers (idNamespaces: []) — the `record` / `doctor`
# "missing accessibility" demo. `make -C demos/showcase <target>-build` builds each.
# The four Android twins (below, BE-0007 preparation) share the same id contract: Compose reproduces
# the dotted SPEC ids verbatim, while showcase-views maps them to underscores (`android:id` allows
# neither '.' nor '-', SPEC §2.1). The shared scenarios run on both unchanged because each selector
# lists both id forms — `id: [stable.refresh, stable_refresh]` — matching whichever the tree renders
# (BE-0221); the id convention stays explicit in the scenario, never a hidden driver transform.
defaults:
  backend: [idb]
  device: "iPhone 17 Pro"
  reservedNamespaces: []   # no shared cross-screen ids; the back is the OS BackButton (DESIGN §7.3)

targets:
  # ---- SwiftUI, accessibility ON (the `run` / `doctor`-Ready target) -------------
  showcase-swiftui:
    bundleId: com.bajutsu.showcase.ios.swiftui
    deeplinkScheme: showcaseswiftui
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    appPath: demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app
    build: make -C demos/showcase swiftui-build
    scenarios: demos/showcase/scenarios
    # XCUITest backend (BE-0019): the same generic runner also drives this a11y app, so the driver
    # conformance suite (BE-0114) can run its contract against XCUITest on identifier-bearing
    # elements — `bajutsu run --target showcase-swiftui --backend xcuitest ...`, idb staying default.
    xcuitest:
      testRunner: BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make -C demos/showcase runner-build

  # ---- SwiftUI, accessibility OFF (the `record` / `doctor`-Blocked target) -------
  showcase-swiftui-noax:
    bundleId: com.bajutsu.showcase.ios.swiftui.noax
    deeplinkScheme: showcaseswiftuinoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []   # honest: this build exposes no identifiers
    appPath: demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUINoAx.app
    build: make -C demos/showcase swiftui-noax-build
    backend: [idb]   # idb + vision (BE-0176): crawl drives this -noax app with no XCUITest runner
    scenarios: demos/showcase/ios/scenarios-xcuitest
    # XCUITest backend (BE-0019) stays wired for explicit `--backend xcuitest`: the generic runner
    # reaches elements idb's tree can't (e.g. a TabView's tabs) by label, where idb needs vision.
    xcuitest:
      testRunner: BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make -C demos/showcase runner-build

  # ---- UIKit, accessibility ON (same identifier contract as showcase-swiftui) ----
  showcase-uikit:
    bundleId: com.bajutsu.showcase.ios.uikit
    deeplinkScheme: showcaseuikit
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    appPath: demos/showcase/ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKit.app
    build: make -C demos/showcase uikit-build
    scenarios: demos/showcase/scenarios
    # XCUITest backend (BE-0019): the a11y UIKit scenarios now cross tabs by tapping the native tab
    # bar (BE-0107), which idb can't do, so `--backend ios` needs the generic runner wired here too.
    xcuitest:
      testRunner: BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make -C demos/showcase runner-build

  # ---- UIKit, accessibility OFF -------------------------------------------------
  showcase-uikit-noax:
    bundleId: com.bajutsu.showcase.ios.uikit.noax
    deeplinkScheme: showcaseuikitnoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []
    appPath: demos/showcase/ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKitNoAx.app
    build: make -C demos/showcase uikit-noax-build
    backend: [idb]   # idb + vision (BE-0176): crawl drives this -noax app with no XCUITest runner
    scenarios: demos/showcase/ios/scenarios-xcuitest
    # XCUITest backend (BE-0019) stays wired for explicit `--backend xcuitest`: the generic runner
    # drives the -noax UITabBar tabs by label, which idb's describe-all collapses into an opaque group.
    xcuitest:
      testRunner: BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make -C demos/showcase runner-build

  # ==== Android (BE-0007 preparation) =============================================
  # The Android twins of the four iOS products (demos/showcase/android). `backend: [android]`
  # resolves to `adb`, the BE-0007 driver: `run` against these drives the app on an attached
  # emulator/device (id-based taps, value assertions over `uiautomator dump`). `package` carries the
  # applicationId; launchEnv arrives as intent extras. Interval evidence (screenrecord/logcat),
  # device control, and the by-scheme deeplink/back paths are BE-0007 follow-up slices.

  # ---- Compose, accessibility ON — testTags surface the dotted SPEC ids verbatim
  # (testTagsAsResourceId), so the shared id-based scenarios drive this app unchanged.
  showcase-compose:
    package: com.bajutsu.showcase.android.compose
    deeplinkScheme: showcasecompose
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    appPath: demos/showcase/android/compose/build/outputs/apk/a11y/debug/compose-a11y-debug.apk
    build: make -C demos/showcase/android compose-build
    backend: [android]
    scenarios: demos/showcase/scenarios

  # ---- Compose, accessibility OFF ------------------------------------------------
  showcase-compose-noax:
    package: com.bajutsu.showcase.android.compose.noax
    deeplinkScheme: showcasecomposenoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []   # honest: this build exposes no identifiers
    appPath: demos/showcase/android/compose/build/outputs/apk/noax/debug/compose-noax-debug.apk
    build: make -C demos/showcase/android compose-noax-build
    backend: [android]
    scenarios: demos/showcase/scenarios

  # ---- Views, accessibility ON — native android:id, which allows neither '.' nor '-', so the
  # ids are the SPEC ids with both mapped to '_' (stable.refresh → stable_refresh). The shared
  # scenarios run here unchanged because each selector lists both id forms (BE-0221):
  # `id: [stable.refresh, stable_refresh]` matches whichever the tree renders — no driver-side id
  # rewriting, no scenario fork. `readyWhen` names the Stable-tab launch element in both forms; the
  # `idNamespaces` heuristic can't gate on it because `namespace_of` splits on `.`, absent here.
  showcase-views:
    package: com.bajutsu.showcase.android.views
    deeplinkScheme: showcaseviews
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: demos/showcase/android/views/build/outputs/apk/a11y/debug/views-a11y-debug.apk
    build: make -C demos/showcase/android views-build
    backend: [android]
    scenarios: demos/showcase/scenarios

  # ---- Views, accessibility OFF ---------------------------------------------------
  showcase-views-noax:
    package: com.bajutsu.showcase.android.views.noax
    deeplinkScheme: showcaseviewsnoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []
    appPath: demos/showcase/android/views/build/outputs/apk/noax/debug/views-noax-debug.apk
    build: make -C demos/showcase/android views-noax-build
    backend: [android]
    scenarios: demos/showcase/scenarios
