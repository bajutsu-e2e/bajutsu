# Bajutsu config for the showcase dogfood suite — four iOS products from two codebases
# (UIKit × SwiftUI) plus their four Android twins (Views × Compose, BE-0007 preparation),
# each in an accessibility-on / -off variant. See SPEC.md.
#
# The two iOS `-a11y` apps expose an identical identifier contract, so the shared
# `scenarios/` directory runs unchanged against either iOS toolkit:
#   bajutsu run --target showcase-swiftui --config demos/showcase/showcase.config.yaml ...
#   bajutsu run --target showcase-uikit   --config demos/showcase/showcase.config.yaml ...
# The `-noax` apps carry no identifiers (idNamespaces: []) — the `record` / `doctor`
# "missing accessibility" demo. `make -C demos/showcase <target>-build` builds each (from the
# repo root; a config-bound `bajutsu` invocation runs each `build:` from this file's own directory).
# The four Android twins (below, BE-0007 preparation) share the same id contract: Compose reproduces
# the dotted SPEC ids verbatim, while showcase-views maps them to underscores (`android:id` allows
# neither '.' nor '-', SPEC §2.1). The shared scenarios run on both unchanged because each selector
# lists both id forms — `id: [stable.refresh, stable_refresh]` — matching whichever the tree renders
# (BE-0221); the id convention stays explicit in the scenario, never a hidden driver transform.
defaults:
  backend: [ios]
  device: "iPhone 17 Pro"
  reservedNamespaces: []   # no shared cross-screen ids; the back is the OS BackButton (DESIGN §7.3)

targets:
  # ---- SwiftUI, accessibility ON (the `run` / `doctor`-Ready target) -------------
  showcase-swiftui:
    bundleId: com.bajutsu.showcase.ios.swiftui
    deeplinkScheme: showcaseswiftui
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    # BE-0231: gate readiness on the first Stable row — the element the smoke scenario's opening
    # `wait` needs — not on any in-namespace node. On a cold-boot CI Simulator some other namespace
    # element can render first, letting `_await_ready` return early and the first step race the row.
    # Both id forms (BE-0221) to mirror the scenario's own selector and the `showcase-views`
    # precedent; this iOS target's tree only ever renders the dotted form.
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app
    build: make swiftui-build
    scenarios: scenarios
    # `[ios]` resolves to XCUITest, the sole iOS backend since idb was retired (BE-0290). Its generic
    # runner drives this a11y app by bundle id, so the whole suite — including
    # gestures_multitouch.yaml's pinch/rotate and the driver conformance contract (BE-0114) — runs on
    # identifier-bearing elements in one invocation with no --backend.
    backend: [ios]
    xcuitest:
      testRunner: ../../BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make runner-build

  # ---- SwiftUI, same app, exercises the BE-0292 bundled XCUITest runner ----------
  # A twin of showcase-swiftui with no `xcuitest:` block: a Simulator run for this target has
  # no testRunner and no build, so it resolves to the wheel-bundled runner (`bajutsu doctor
  # --target showcase-swiftui-bundled` reports `xcuitest runner: bundled`) instead of the
  # locally built BajutsuKit/Runner product. Kept separate from showcase-swiftui so the driver
  # conformance suite (BE-0114) above keeps exercising the locally built runner unchanged.
  showcase-swiftui-bundled:
    bundleId: com.bajutsu.showcase.ios.swiftui
    deeplinkScheme: showcaseswiftui
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app
    build: make swiftui-build
    scenarios: scenarios
    # App-wide interstitial handler (BE-0314): an onboarding overlay this app could show at an
    # unpredictable point, cleared wherever it surfaces. This config-level list is prepended to each
    # scenario's own `interrupts` (config entries checked first) — see scenarios/interrupts.yaml for
    # the scenario-level counterpart. Illustrative on this app, which renders no such overlay, so the
    # handler stays inert; it demonstrates the config/scenario layering the field composes.
    interrupts:
      - condition: { exists: { id: [notice.onboarding.skip, notice_onboarding_skip] } }
        steps:
          - tap: { id: [notice.onboarding.skip, notice_onboarding_skip] }
    backend: [ios]

  # ---- SwiftUI, accessibility OFF (the `record` / `doctor`-Blocked target) -------
  showcase-swiftui-noax:
    bundleId: com.bajutsu.showcase.ios.swiftui.noax
    deeplinkScheme: showcaseswiftuinoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []   # honest: this build exposes no identifiers
    appPath: ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUINoAx.app
    build: make swiftui-noax-build
    backend: [ios]   # XCUITest, the sole iOS backend (BE-0290); its runner reaches labels
    scenarios: ios/scenarios-noax
    # The `-noax` twin of the shared `scenarios/` suite: the same flows, but every step addresses
    # elements by their visible label (never an identifier — this build has none) and every assertion
    # reads the on-screen mirror `Text` instead of the a11y value the -noax tree drops. `[ios]`
    # resolves to XCUITest, whose automation snapshot descends into the tab bar and reaches a `-noax`
    # element (including a TabView's tabs) by label — the case a coordinate backend could not address
    # without vision (BE-0290 retired idb, which needed that vision path).
    xcuitest:
      testRunner: ../../BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make runner-build

  # ---- UIKit, accessibility ON (same identifier contract as showcase-swiftui) ----
  showcase-uikit:
    bundleId: com.bajutsu.showcase.ios.uikit
    deeplinkScheme: showcaseuikit
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    appPath: ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKit.app
    build: make uikit-build
    scenarios: scenarios
    # `[ios]` resolves to XCUITest (BE-0290), as for showcase-swiftui. The a11y UIKit scenarios cross
    # tabs by tapping the native tab bar (BE-0107), which the generic XCUITest runner drives.
    backend: [ios]
    xcuitest:
      testRunner: ../../BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make runner-build

  # ---- UIKit, accessibility OFF -------------------------------------------------
  showcase-uikit-noax:
    bundleId: com.bajutsu.showcase.ios.uikit.noax
    deeplinkScheme: showcaseuikitnoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []
    appPath: ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKitNoAx.app
    build: make uikit-noax-build
    backend: [ios]   # XCUITest, the sole iOS backend (BE-0290); its runner reaches labels
    scenarios: ios/scenarios-noax
    # Same `ios/scenarios-noax` suite as showcase-swiftui-noax — the label/visible-text twin of the
    # shared `scenarios/` flows, run over XCUITest. The UIKit `-noax` app renders the identical visible
    # mirror strings (AppModel + *Controller labels), so the one suite drives both `-noax` toolkits.
    # XCUITest drives the -noax UITabBar tabs by label — a coordinate backend collapsed them into one
    # opaque group (BE-0290 retired idb, which hit that limit).
    xcuitest:
      testRunner: ../../BajutsuKit/Runner/build/dd/Build/Products/BajutsuRunner.xctestrun
      build: make runner-build

  # ==== Android (BE-0007 preparation) =============================================
  # The Android twins of the four iOS products (demos/showcase/android). `backend: [android]`
  # resolves to `adb`, the BE-0007 driver: `run` against these drives the app on an attached
  # emulator/device (id-based taps, value assertions over `uiautomator dump`). `package` carries the
  # applicationId; launchEnv arrives as intent extras. Interval evidence (screenrecord/logcat),
  # device control, and the by-scheme deeplink/back paths are BE-0007 follow-up slices.

  # ---- Compose, accessibility ON — testTags surface the dotted SPEC ids verbatim
  # (testTagsAsResourceId), so the shared id-based scenarios drive this app unchanged.
  showcase-compose:
    package: com.bajutsu.showcase.android.compose
    deeplinkScheme: showcasecompose
    launchEnv: { SHOWCASE_UITEST: "1" }
    # Granted up front (`pm grant`) at lease time, so the notification prompt never blocks the run
    # (BE-0210); the shared permission.yaml relies on this on Android to stay deterministic — no dialog
    # appears, so its `alertHandling` guard no-ops (on iOS, which can't pre-grant, that guard grants).
    grantPermissions: [android.permission.POST_NOTIFICATIONS]
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    appPath: android/compose/build/outputs/apk/a11y/debug/compose-a11y-debug.apk
    build: make -C android compose-build
    backend: [android]
    scenarios: scenarios

  # ---- Compose, accessibility OFF ------------------------------------------------
  showcase-compose-noax:
    package: com.bajutsu.showcase.android.compose.noax
    deeplinkScheme: showcasecomposenoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []   # honest: this build exposes no identifiers
    appPath: android/compose/build/outputs/apk/noax/debug/compose-noax-debug.apk
    build: make -C android compose-noax-build
    backend: [android]
    scenarios: scenarios

  # ---- Views, accessibility ON — native android:id, which allows neither '.' nor '-', so the
  # ids are the SPEC ids with both mapped to '_' (stable.refresh → stable_refresh). The shared
  # scenarios run here unchanged because each selector lists both id forms (BE-0221):
  # `id: [stable.refresh, stable_refresh]` matches whichever the tree renders — no driver-side id
  # rewriting, no scenario fork. `readyWhen` names the Stable-tab launch element in both forms; the
  # `idNamespaces` heuristic can't gate on it because `namespace_of` splits on `.`, absent here.
  showcase-views:
    package: com.bajutsu.showcase.android.views
    deeplinkScheme: showcaseviews
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: [stable, horse, search, log, notice, perm, sys, net]
    readyWhen: { id: [stable.row.1, stable_row_1] }
    appPath: android/views/build/outputs/apk/a11y/debug/views-a11y-debug.apk
    build: make -C android views-build
    backend: [android]
    scenarios: scenarios

  # ---- Views, accessibility OFF ---------------------------------------------------
  showcase-views-noax:
    package: com.bajutsu.showcase.android.views.noax
    deeplinkScheme: showcaseviewsnoax
    launchEnv: { SHOWCASE_UITEST: "1" }
    idNamespaces: []
    appPath: android/views/build/outputs/apk/noax/debug/views-noax-debug.apk
    build: make -C android views-noax-build
    backend: [android]
    scenarios: scenarios
