# Demo config for running the feature scenarios on-device. Mirrors the sample app
# entry from bajutsu.config.yaml, adding `secrets: [PASSWORD]` so ${secrets.PASSWORD}
# resolves from the environment.
defaults:
  backend: [idb]
  device: "iPhone 17 Pro"
targets:
  sample:
    bundleId: com.bajutsu.sample
    deeplinkScheme: bajutsusample
    launchEnv: { SAMPLE_UITEST: "1" }
    idNamespaces: [home, list, counter, settings, onboarding, auth, nav, comp]
    secrets: [PASSWORD]
    # Built .app to install on each device before launch (if missing) — so a freshly
    # picked/booted simulator just works without a manual `simctl install`. `bajutsu
    # serve` runs `build` below on demand when this binary is missing, so the Web UI
    # builds + installs the app itself (no manual build first). Path is relative to
    # the run's working directory (the repo root).
    appPath: demos/features/app/build/dd/Build/Products/Debug-iphonesimulator/BajutsuSample.app
    build: make -C demos/features sample-build
    # Directory of this app's scenarios — `bajutsu run --target sample` runs every *.yaml here.
    scenarios: demos/features/app/scenarios
