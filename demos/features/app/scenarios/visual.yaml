# Visual regression (VRT) demo — pixel-compare the home screen against a baseline image.
#
# VRT needs a baseline to compare against, and the baseline is just a screenshot of a
# known-good run. So the flow is two-step (and the demo *is* that flow):
#
#   1. First run — no baseline exists yet. The `visual` check fails with
#      "baseline not found"; the report shows the captured screenshot with an
#      "Approve as baseline" button (WebUI), or run `bajutsu approve`.
#   2. Approve, then re-run — the screenshot now matches the baseline and the check passes.
#      Change a pixel (or the UI) and the next run fails with a diff image.
#
# Baselines resolve inside the dir passed via `--baselines` (default: a `baselines/`
# folder beside this scenario). See demos/features/Makefile `vrt` target.
description: >-
  Visual regression demo — reach the home screen and pixel-compare it against a
  stored baseline. First run reports a missing baseline; approve it, then re-run to pass.
scenarios:
  - name: home screen matches its visual baseline
    description: Onboard, sign in, reach home, then assert the screen matches baselines/home.png.
    preconditions:
      launchEnv: { SAMPLE_UITEST: "1" }
    steps:
      - tap: { id: onboarding.start }
      - type: { text: "a@b.com", into: { id: auth.email } }
      - type: { text: "pw", into: { id: auth.password } }
      - tap: { id: auth.submit }
      - wait: { for: { id: home.title }, timeout: 5 }
    expect:
      # `threshold` is the max allowed diff (% of pixels); a small budget absorbs
      # harmless antialiasing jitter. `exclude` masks volatile regions before the
      # compare — here a generous top strip over the status bar / clock. The values are
      # screenshot *pixels* (device-scale dependent); tune them to your simulator.
      - visual:
          baseline: home.png
          threshold: 0.5
          exclude:
            - { x: 0, y: 0, w: 1300, h: 130 }
