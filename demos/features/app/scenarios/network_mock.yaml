# Deterministic network via mocks: BajutsuKit answers a matching request with a canned
# response instead of hitting the network, so the test does not depend on a live server.
# Each mock returns a status the real endpoint would never give — proof the stub served it.
- name: GET answered by a mock stub
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: network }
  mocks:
    - match: { method: GET, urlMatches: "example.com" }
      respond:
        status: 418                     # real example.com returns 200; 418 proves the stub
        headers: { Content-Type: text/plain }
        body: "stubbed by bajutsu"
  steps:
    - tap: { id: net.fetch }
    - wait: { until: { request: { method: GET, urlMatches: "example.com", status: 418 } }, timeout: 6 }
  expect:
    - request: { method: GET, urlMatches: "example.com", status: 418 }

- name: POST answered by a mock stub (offline)
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: network }
  mocks:
    - match: { method: POST, pathMatches: "/post$" }
      respond: { status: 201, body: "{\"ok\":true}" }   # httpbin returns 200; 201 proves the stub
  steps:
    - tap: { id: net.post }
    - wait: { until: { request: { method: POST, path: /post, status: 201 } }, timeout: 6 }
  expect:
    - request: { method: POST, path: /post, status: 201 }
