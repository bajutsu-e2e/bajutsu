# An id-driven smoke scenario for the sample app, run on idb:
#   bajutsu run --scenario sample/scenarios/cross_backend.yaml --app sample --no-erase
# Every step addresses elements by id and uses single-touch actions only (idb is
# single-touch).
- name: increment the counter and filter the list
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_SEED: "5" }
  steps:
    - wait: { for: { id: home.title }, timeout: 5 }
    - tap: { id: counter.increment }
    - tap: { id: counter.increment }
    - type: { text: "Item 3", into: { id: home.search } }
    - wait: { until: settled, timeout: 3 }
  expect:
    - exists: { id: home.title }
    - value: { sel: { id: counter.value }, equals: "2" }
    - count: { sel: { idMatches: "list.row.*" }, equals: 1 }
    - exists: { id: list.row.3 }
