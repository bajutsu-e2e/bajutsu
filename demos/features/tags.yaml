# Phase 1: tags + selection. `bajutsu run --tag smoke --exclude slow` keeps the first two.
- name: smoke check
  tags: [smoke]
  steps:
    - tap: { id: home.tab }
  expect:
    - exists: { id: home.title }

- name: auth flow
  tags: [smoke, auth]
  steps:
    - tap: { id: auth.submit }
  expect:
    - exists: { id: home.title }

- name: slow nightly thing
  tags: [slow]
  steps:
    - tap: { id: home.tab }
  expect:
    - exists: { id: home.title }
