# Dynamic-UI real-backend coverage (BE-0285): the read-count snapshot-identity assumption
# (BE-0259) assumes two adjacent reads with no actuation between them see the same device state — an
# assumption only a live, drifting UI can violate. The ticker advances on its own timer, so this
# scenario can pass only against a genuinely live DOM. Waiting for an *exact* absolute tick count
# would race the onboarding/login steps' own real latency (the ticker starts at page load, before
# they run) — so instead it captures the ticker's own value as a live baseline and waits for that
# specific reading to become `gone` (i.e. for the value to have changed at all). The final check is
# an inline `assert` step immediately after that wait, not the scenario-level `expect` — `expect` runs
# only after every step finishes and does its own single, unretried read (`_evaluate_expect` /
# `_timeout_floor` in bajutsu/orchestrator/loop.py — 0 on this lane), which would race a further tick
# in the gap; the inline `assert` has no such gap to race. (BE-0245's wait-floor premise is
# Android/adb-specific — a Compose-recomposition poll budget — so it has no web analog and is out of
# scope here.)
description: >-
  Web dynamic UI — reach home, capture the live ticker's value, then condition-wait for it to
  change (no tap ever drives it) and assert against the freshly observed value in the very next step.
scenarios:
  - name: a live-ticking display proves reads observe real UI drift
    steps:
      - tap: { id: onboarding.start }
      - type: { text: "a@b.com", into: { id: auth.email } }
      - type: { text: "pw", into: { id: auth.password } }
      - tap: { id: auth.submit }
      - wait: { for: { id: home.title }, timeout: 5 }
        extract: { baseline: { sel: { id: ticker.value } } }
      - wait: { until: { gone: { id: ticker.value, value: "${vars.baseline}" } }, timeout: 15 }
        extract: { after: { sel: { id: ticker.value } } }
      - assert:
          - value: { sel: { id: ticker.value }, equals: "${vars.after}" }
