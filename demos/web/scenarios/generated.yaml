- name: Get started, sign in with email a@b.com and password pw, increment the counter
    twice, then confirm the counter shows 2.
  from: Get started, sign in with email a@b.com and password pw, increment the counter
    twice, then confirm the counter shows 2.
  preconditions:
    reinstall: clean
  steps:
  - tap:
      id: onboarding.start
    from: The welcome screen shows the 'Get started' button; tapping it begins the
      flow toward sign-in.
  - type:
      text: a@b.com
      into:
        id: auth.email
      submit: !!bool 'false'
    from: The Sign in screen is showing, so I'll fill the Email field with the required
      address.
  - type:
      text: pw
      into:
        id: auth.password
      submit: !!bool 'false'
    from: Email is already 'a@b.com'; the Password field is empty, so I enter the
      password next.
  - tap:
      id: auth.submit
    from: Email and password are already populated, so tapping Sign in submits the
      credentials to reach the counter screen.
  - tap:
      id: counter.increment
    from: Counter shows 0; tapping Increment for the first of two increments toward
      the target of 2.
  - tap:
      id: counter.increment
    from: The counter reads 1, so tapping Increment once more brings it to the target
      value of 2.
  - wait:
      for:
        id: counter.value
      timeout: 5.0
  expect:
  - value:
      sel:
        id: counter.value
      equals: '2'
    from: the counter shows 2
