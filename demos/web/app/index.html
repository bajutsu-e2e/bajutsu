<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bajutsu Web Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 28rem; }
      section[hidden] { display: none; }
      button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
      input { display: block; margin: 0.5rem 0; padding: 0.4rem; font-size: 1rem; width: 100%; }
      output, .count { font-size: 2rem; font-weight: 600; }
      h1 { font-size: 1.4rem; }
    </style>
  </head>
  <body>
    <!--
      A deliberately tiny web app mirroring the iOS sample's smoke flow
      (onboarding → login → counter), used to prove the Playwright web backend
      drives a real browser deterministically. Stable, non-localized `data-testid`
      attributes are the web equivalent of iOS accessibilityIdentifier, and are what
      a scenario's `{ id: ... }` selector resolves to.
    -->
    <section data-testid="onboarding.screen" id="onboarding">
      <h1 data-testid="onboarding.title">Welcome to Bajutsu</h1>
      <button data-testid="onboarding.start">Get started</button>
      <!-- A second entry point for the human-in-the-loop record demo (BE-0179): a device
           verification that asks for a one-time code. The AI cannot know an out-of-band code, so
           `record` hands off to a human. Kept separate from onboarding.start so the smoke flow
           (onboarding -> auth -> home) is unaffected. -->
      <button data-testid="verify.start">Verify a device</button>
    </section>

    <section data-testid="verify.screen" id="verify" hidden>
      <h1 data-testid="verify.title">Device verification</h1>
      <p>A one-time code was sent to your device. Enter it to continue:</p>
      <p>Your code: <strong data-testid="verify.code" id="verify-code">------</strong></p>
      <input data-testid="verify.input" type="text" placeholder="One-time code" aria-label="One-time code" />
      <button data-testid="verify.submit">Verify</button>
      <output data-testid="verify.error" hidden>That code is not correct — try again.</output>
    </section>

    <section data-testid="verified.screen" id="verified" hidden>
      <h1 data-testid="verified.title">Device verified ✓</h1>
    </section>

    <section data-testid="auth.screen" id="auth" hidden>
      <h1 data-testid="auth.title">Sign in</h1>
      <input data-testid="auth.email" type="email" placeholder="Email" aria-label="Email" />
      <input data-testid="auth.password" type="password" placeholder="Password" aria-label="Password" />
      <button data-testid="auth.submit">Sign in</button>
    </section>

    <section data-testid="home.screen" id="home" hidden>
      <h1 data-testid="home.title">Home</h1>
      <input data-testid="counter.value" readonly value="0" aria-label="Counter value" />
      <button data-testid="counter.increment">Increment</button>
      <div
        data-testid="gesture.box"
        style="width: 200px; height: 200px; background: #eee; touch-action: none"
      >
        Pinch / rotate me
      </div>
      <output data-testid="gesture.status">idle</output>
    </section>

    <script>
      const show = (id) => {
        for (const s of document.querySelectorAll("section")) s.hidden = s.id !== id;
      };
      document.querySelector('[data-testid="onboarding.start"]').addEventListener("click", () =>
        show("auth")
      );
      document.querySelector('[data-testid="auth.submit"]').addEventListener("click", () =>
        show("home")
      );

      // Device-verification flow for the human-in-the-loop record demo. A random code is generated
      // and shown when the screen opens; the code is display-only (no id a scenario would type), so
      // an authoring AI has nothing to derive the value from and must hand off to a human.
      const verifyCodeEl = document.querySelector('[data-testid="verify.code"]');
      const verifyInput = document.querySelector('[data-testid="verify.input"]');
      const verifyError = document.querySelector('[data-testid="verify.error"]');
      let verifyCode = "";
      const newCode = () => {
        const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no ambiguous O/0/1/I
        verifyCode = Array.from(
          { length: 6 },
          () => alphabet[Math.floor(Math.random() * alphabet.length)]
        ).join("");
        verifyCodeEl.textContent = verifyCode;
      };
      document.querySelector('[data-testid="verify.start"]').addEventListener("click", () => {
        newCode();
        verifyInput.value = "";
        verifyError.hidden = true;
        show("verify");
      });
      document.querySelector('[data-testid="verify.submit"]').addEventListener("click", () => {
        if (verifyInput.value.trim().toUpperCase() === verifyCode) show("verified");
        else verifyError.hidden = false;
      });
      const counter = document.querySelector('[data-testid="counter.value"]');
      let n = 0;
      document.querySelector('[data-testid="counter.increment"]').addEventListener("click", () => {
        n += 1;
        counter.value = String(n);
      });

      // A two-finger gesture target: classify the live touches as a pinch (distance change) or a
      // rotate (angle change) so a scenario can assert the multiTouch path drove the page.
      const gbox = document.querySelector('[data-testid="gesture.box"]');
      const gstatus = document.querySelector('[data-testid="gesture.status"]');
      let startDist = null;
      let startAngle = null;
      const dist = (t) => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
      const angle = (t) => Math.atan2(t[1].clientY - t[0].clientY, t[1].clientX - t[0].clientX);
      gbox.addEventListener("touchstart", (e) => {
        if (e.touches.length === 2) {
          startDist = dist(e.touches);
          startAngle = angle(e.touches);
        }
      });
      gbox.addEventListener("touchmove", (e) => {
        if (e.touches.length === 2 && startDist !== null) {
          const ratio = dist(e.touches) / startDist;
          const deg = ((angle(e.touches) - startAngle) * 180) / Math.PI;
          if (Math.abs(deg) > 15) gstatus.textContent = "rotated";
          else if (ratio > 1.1) gstatus.textContent = "pinched-out";
          else if (ratio < 0.9) gstatus.textContent = "pinched-in";
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
