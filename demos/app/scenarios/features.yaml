# On-device feature showcase for the demo app: tags + a parameterized shared component
# (login) + a secret variable. Run a subset with, e.g.:
#   bajutsu run --scenario features.yaml --app demo --tag smoke --exclude slow
- name: log in via the shared component
  tags: [smoke]
  steps:
    - tap: { id: onboarding.start }
    - use: { component: _components/login.yaml, with: { email: "a@b.com", password: "pw" } }
    - wait: { for: { id: home.title }, timeout: 5 }
  expect:
    - exists: { id: home.title }

- name: log in with a secret password
  tags: [smoke, auth]
  steps:
    # ${secrets.PASSWORD} resolves from the environment; the literal value is masked in
    # every run artifact, while the scenario file keeps only the token.
    - tap: { id: onboarding.start }
    - type: { into: { id: auth.email }, text: "user@example.com" }
    - type: { into: { id: auth.password }, text: "${secrets.PASSWORD}" }
    - tap: { id: auth.submit }
    - wait: { for: { id: home.title }, timeout: 5 }
  expect:
    - exists: { id: home.title }

- name: nightly deep check
  tags: [slow]
  steps:
    - tap: { id: onboarding.start }
    - use: { component: _components/login.yaml, with: { email: "a@b.com", password: "pw" } }
    - wait: { for: { id: home.title }, timeout: 5 }
    - tap: { id: counter.increment }
  expect:
    - value: { sel: { id: counter.value }, equals: "1" }
