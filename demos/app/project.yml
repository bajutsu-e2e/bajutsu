name: BajutsuDemo
options:
  bundleIdPrefix: com.bajutsu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO
targets:
  BajutsuDemo:
    type: application
    platform: iOS
    sources:
      - path: BajutsuDemo
    info:
      path: BajutsuDemo/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: Bajutsu Demo
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.bajutsu.demo
            CFBundleURLSchemes: [bajutsudemo]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bajutsu.demo
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  BajutsuDemo:
    build:
      targets:
        BajutsuDemo: all
