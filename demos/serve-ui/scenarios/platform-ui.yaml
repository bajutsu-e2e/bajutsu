# Platform-aware controls — each view shows only the selected app's platform controls: an iOS app
# gets the iOS device UI (simulators, device pickers, erase, the alert-dismiss guard), a web app
# gets the headless/headed "show browser" toggle, with no manual Backend entry. The dogfood's only
# app (webui) is a web app, so each view reflects that on load. Deterministic: the SPA toggles the
# iosonly/webonly elements synchronously from the selected app's backend, which the Playwright
# backend reads as present/absent in the tree.
description: >-
  Platform-aware controls — each view shows only the selected app's platform controls (here, the
  web app's headed toggle) across Record, Replay, and Crawl.
scenarios:
  - name: Replay shows the web app's headed toggle instead of iOS device UI
    description: webui is a web app, so Replay shows the "show browser" toggle instead of the iOS Simulators UI — without typing a backend.
    steps:
      - tap: { id: nav.replay }
      - wait: { for: { id: replay.headed }, timeout: 10 }
      - assert:
          - exists: { id: replay.headed }                    # headless/headed menu present (web)
          - exists: { id: replay.simulators, negate: true }  # iOS device UI hidden
  - name: Record shows the web app's headed toggle instead of iOS controls
    description: Record shows the web app's "show browser" toggle instead of the iOS controls — without typing a backend.
    steps:
      - tap: { id: nav.record }
      - wait: { for: { id: record.headed }, timeout: 10 }
      - assert:
          - exists: { id: record.headed }
  - name: Crawl shows the web app's headed toggle instead of iOS controls
    description: Crawl shows the web app's "show browser" toggle instead of the iOS controls — without typing a backend.
    steps:
      - tap: { id: nav.crawl }
      - wait: { for: { id: crawl.headed }, timeout: 10 }
      - assert:
          - exists: { id: crawl.headed }
