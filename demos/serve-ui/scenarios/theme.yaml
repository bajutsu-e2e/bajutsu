# Theme picker (BE-0191) — the header <select> lists every registered theme. The driver reads a
# <select>'s current option value as the `value` trait, so the picked theme is assertable by id.
# Deterministic: Playwright emulates prefers-color-scheme as light by default, in the dogfood runner
# and the exported spec alike, so the picker starts on `daylight` (the light built-in) on both.
#
# The `selectOption` action (BE-0191 unit 5) switches a native <select> deterministically: it
# resolves the <select> through the same determinism core every action shares, then sets the option
# by value and fires `change` so the client's initTheme() handler runs exactly as for a user pick.
# That is what lets the second scenario drive the picker in both directions and assert the change —
# the earlier `type`-typeahead approach fired under some headless Chromium builds but not others.
description: >-
  Theme picker — the header select renders and starts on the light theme (the OS preference), and a
  selectOption switches it deterministically, with the selected theme id readable from the select.
scenarios:
  - name: the theme picker reflects the OS scheme
    description: The picker renders in the header and reads daylight, the light built-in, following the (light) OS preference.
    steps:
      - wait: { for: { id: view.record }, timeout: 10 }
    expect:
      - value: { sel: { id: nav.theme-picker }, equals: daylight }   # follows the (light) OS preference

  - name: selectOption switches the theme deterministically
    description: >-
      Selecting a theme by option value drives the native <select> and the picker reflects the pick,
      in both directions — proving the switch is deterministic regardless of scenario order.
    steps:
      - wait: { for: { id: view.record }, timeout: 10 }
      - selectOption: { sel: { id: nav.theme-picker }, option: midnight }
      - assert:
          - value: { sel: { id: nav.theme-picker }, equals: midnight }   # switched to the dark built-in
      - selectOption: { sel: { id: nav.theme-picker }, option: daylight }
      - assert:
          - value: { sel: { id: nav.theme-picker }, equals: daylight }   # and back to the light built-in
