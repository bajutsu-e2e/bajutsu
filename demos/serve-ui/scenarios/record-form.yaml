# Record form — the AI-driven Record surface degrades gracefully when Claude can't be reached
# (BE-0101). The dogfood runs keyless (no ANTHROPIC_API_KEY, no provider), so the Record view must
# show its "needs Claude" gate, disable Generate, and keep Save disabled — while the plain goal
# textarea still records typed input. Deterministic: pass/fail is the controls' own state, no AI runs.
description: >-
  Record form (keyless) — with no Claude reachable the AI gate shows, Generate and Save are
  disabled, and the goal textarea still records typed input.
scenarios:
  - name: the Record surface degrades gracefully without Claude
    description: >-
      On the Record view with no AI provider configured, the gate banner is present, Generate and
      Save are disabled, and typing a goal changes neither.
    steps:
      - wait: { for: { id: view.record }, timeout: 10 }
      - assert:
          - exists: { id: record.ai-gate }
          - disabled: { id: record.generate }
          - disabled: { id: record.save }
      - type: { text: "increment the counter twice and check it reads 2", into: { id: record.goal } }
    expect:
      - value: { sel: { id: record.goal }, contains: "increment the counter" }
      - disabled: { id: record.generate }
      - disabled: { id: record.save }
