# Network observation: tap Fetch -> wait until bajutsu's collector observes the GET ->
# assert the app's own status, the exchange BajutsuKit echoed back into the UI
# (net.captured.*), and the request bajutsu observed via its collector. BajutsuKit is
# linked into the app; bajutsu injects BAJUTSU_COLLECTOR automatically on `run`.
- name: fetch makes a GET request
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: network }
  # Only show requests to example.com inline in the report's Steps timeline.
  networkSteps: { domains: ["example.com"] }
  steps:
    - tap: { id: net.fetch }
    # Wait on the observed traffic itself (a GET to this endpoint), not a screen-settle proxy.
    - wait: { until: { request: { method: GET, url: "https://example.com", status: 200 } }, timeout: 8 }
  expect:
    - value: { sel: { id: net.status }, equals: "200" }
    # The values the app read back out of BajutsuKit's store.
    - value: { sel: { id: net.captured.method }, equals: "GET" }
    - value: { sel: { id: net.captured.status }, equals: "200" }
    - request: { method: GET, status: 200 }
