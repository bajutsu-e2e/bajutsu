# List: search filtering, an empty state, push navigation, and swipe-to-delete.
# Rows are data-derived (`lists.row.<id>`), counted by glob.

# Seeded with five rows.
- name: list seeds five rows
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "lists" }
  steps:
    - assert:
        - count: { sel: { idMatches: "lists.row.*" }, equals: 5 }

# Search narrows the visible rows to the single match.
- name: search filters rows
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "lists" }
  steps:
    - type: { text: "Row 3", into: { id: lists.search } }
  expect:
    - count: { sel: { idMatches: "lists.row.*" }, equals: 1 }
    - exists: { id: lists.row.3 }

# A search with no match reveals the empty state and a zero count.
- name: search with no match shows empty state
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "lists" }
  steps:
    - assert:
        - exists: { id: lists.empty, negate: true }
    - type: { text: "zzz", into: { id: lists.search } }
  expect:
    - exists: { id: lists.empty }
    - value: { sel: { id: lists.count }, equals: "0" }

# Tapping a row pushes its detail; the detail mirrors the row name.
- name: open a row detail
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "lists" }
  steps:
    - tap: { id: lists.row.2 }
    - wait: { for: { id: lists.detail.title }, timeout: 3 }
  expect:
    - value: { sel: { id: lists.detail.value }, equals: "Row 2" }

# Swipe a row to reveal Delete, confirm, and the row is gone.
- name: swipe deletes a row
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "lists" }
  steps:
    - assert:
        - count: { sel: { idMatches: "lists.row.*" }, equals: 5 }
    - swipe: { on: { id: lists.row.1 }, direction: left }
    - tap: { label: "Delete" }
  expect:
    - count: { sel: { idMatches: "lists.row.*" }, equals: 4 }
    - exists: { id: lists.row.1, negate: true }
