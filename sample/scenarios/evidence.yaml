# Interval evidence: capture a video segment and the device log around the
# reindex (which emits an os_signpost interval on subsystem com.simyoke.sample).
- name: capture video and device log around reindex
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_SCREEN: "settings" }
  steps:
    - tap: { id: settings.reindex }
    - wait: { for: { id: settings.reindexComplete }, timeout: 5 }
      capture: [video, deviceLog]
  expect:
    - value: { sel: { id: settings.status }, equals: "done" }
