# selected state, change banner, reindex wait, value + negated exists.
- name: toggle normalization and reindex
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_SCREEN: "settings" }
  steps:
    - assert:
        - selected: { id: settings.normalizeToggle }
    - tap: { id: settings.normalizeToggle }
    - assert:
        - exists: { id: settings.banner }
    - tap: { id: settings.reindex }
    - wait: { for: { id: settings.reindexComplete }, timeout: 5 }
  expect:
    - value: { sel: { id: settings.status }, equals: "done" }
    - exists: { id: settings.banner, negate: true }
  capturePolicy:
    - on: { action: tap, idMatches: "settings.*" }
      capture: [screenshot.after, elements]
