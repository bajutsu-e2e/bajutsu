# The notification-permission prompt lives in SpringBoard, so idb's app-scoped
# query cannot see or tap it. Run with the vision alert guard, instructing it to
# grant:
#
#   bajutsu run sample/scenarios/permission.yaml --app sample \
#     --backend idb --no-erase --dismiss-alerts --alert-instruction "tap Allow"
#
# The prompt only appears while authorization is notDetermined, so reinstall the
# app first (uninstall + install resets notification authorization).
- name: grant notification permission
  preconditions:
    launchEnv: { SAMPLE_UITEST: "1", SAMPLE_LOGGED_IN: "1", SAMPLE_TAB: "system" }
  steps:
    - assert:
        - value: { sel: { id: sys.notif.value }, equals: "notDetermined" }
    - tap: { id: sys.requestNotif }
    # The prompt covers the app and collapses idb's tree, so this wait times out
    # and the alert guard taps "Allow"; the retry then sees the granted state.
    - wait: { for: { id: sys.notif.authorized }, timeout: 4 }
  expect:
    - value: { sel: { id: sys.notif.value }, equals: "authorized" }
