name: SimPilotSample
options:
  bundleIdPrefix: com.simpilot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO
targets:
  SimPilotSample:
    type: application
    platform: iOS
    sources:
      - path: SimPilotSample
    info:
      path: SimPilotSample/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: SimPilotSample
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.simpilot.sample
            CFBundleURLSchemes: [simpilotsample]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simpilot.sample
        TARGETED_DEVICE_FAMILY: "1,2"
