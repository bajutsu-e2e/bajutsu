name: SimyokeSample
options:
  bundleIdPrefix: com.simyoke
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    SUPPORTS_MACCATALYST: NO
targets:
  SimyokeSample:
    type: application
    platform: iOS
    sources:
      - path: SimyokeSample
    info:
      path: SimyokeSample/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: SimyokeSample
        UIRequiredDeviceCapabilities: [arm64]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLName: com.simyoke.sample
            CFBundleURLSchemes: [simyokesample]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simyoke.sample
        TARGETED_DEVICE_FAMILY: "1,2"
