# Identifier recovery map for the sample app on no-identifier backends (rocketsim).
#
# RocketSim's agent protocol exposes role / label / value but NO
# accessibilityIdentifier, so bajutsu's id-first selectors can't resolve on it
# directly. Each entry maps an accessibilityIdentifier to a matcher against what
# rocketsim DOES report; the driver fills the identifier back in at query() time
# (idb is unaffected — it already carries AXUniqueId).
#
# Rules: a matcher must hit exactly one on-screen element. Use `role` to
# disambiguate same-label elements (the "Home" title is a staticText; the "Home"
# tab is a radioButton). Use `labelMatches` (regex) for dynamic text whose label
# changes while its identifier does not (the counter "Count: N").
#
# Scope: the Home screen exercised by sample/scenarios/cross_backend.yaml.

home.title:        { role: staticText, label: "Home" }
counter.value:     { role: staticText, labelMatches: "^Count:" }
counter.increment: { role: button, label: "+" }
home.load:         { role: button, label: "Load" }
nav.settings:      { role: button, label: "Settings" }
home.search:       { role: textField }   # the only text field on Home

# Data-derived list rows (label = the row's visible text).
list.row.1: { role: staticText, label: "Item 1" }
list.row.2: { role: staticText, label: "Item 2" }
list.row.3: { role: staticText, label: "Item 3" }
list.row.4: { role: staticText, label: "Item 4" }
list.row.5: { role: staticText, label: "Item 5" }
