[project]
name = "bajutsu"
version = "0.0.0"
description = "自然言語駆動 iOS E2E テストツール（Simulator 限定）"
readme = "DESIGN.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
    "pydantic>=2.7",
    "anthropic>=0.40",
    "pyyaml>=6.0",
    "jinja2>=3.1",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5", "mypy>=1.10", "types-pyyaml>=6.0"]
# The idb backend shells out to the `idb` client; idb_companion is a separate
# `brew install facebook/fb/idb-companion`.
idb = ["fb-idb>=1.1.0"]

[project.scripts]
bajutsu = "bajutsu.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["bajutsu"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
python_version = "3.11"
strict = true
