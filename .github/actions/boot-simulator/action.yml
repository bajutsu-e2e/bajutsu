name: Boot a Simulator
description: >-
  Select an iPhone Simulator and start its boot asynchronously, returning the UDID
  immediately. `simctl boot` only asks CoreSimulator (a launchd service) to boot the
  device — the boot then proceeds independently of this step, so callers can run the
  build concurrently and wait for "booted" only right before they install/run.
  Prefers an already-booted device, then a pre-installed available one (guaranteed
  compatible with the runner's Xcode); falls back to creating one with the default
  runtime. Shared by the on-device jobs so the selection logic lives in one place.

outputs:
  udid:
    description: The selected simulator's UDID (boot started, not necessarily finished).
    value: ${{ steps.boot.outputs.udid }}

runs:
  using: composite
  steps:
    - name: Start boot
      id: boot
      shell: bash
      run: |
        set -euo pipefail
        # Reuse a device that is already booted (zero boot cost) before booting a fresh one.
        udid=$(xcrun simctl list devices booted -j | jq -r '[.devices | to_entries[] | .value[] | select(.name|startswith("iPhone")) | .udid] | first // empty')
        if [ -n "$udid" ]; then
          echo "Reusing already-booted simulator $udid"
          echo "udid=$udid" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        # Pairing the newest device type with the newest runtime ourselves can hit
        # "Incompatible device"; a pre-installed available iPhone avoids that.
        udid=$(xcrun simctl list devices available -j | jq -r '[.devices | to_entries[] | select(.key|test("iOS")) | .value[] | select(.name|startswith("iPhone")) | .udid] | first // empty')
        if [ -z "$udid" ]; then
          devtype=$(xcrun simctl list devicetypes -j | jq -r '[.devicetypes[] | select(.productFamily=="iPhone") | .identifier] | last')
          udid=$(xcrun simctl create ci-iphone "$devtype")
        fi
        echo "Starting boot of simulator $udid"
        # Async: returns once boot is initiated; CoreSimulator finishes it in the background.
        xcrun simctl boot "$udid" || true
        echo "udid=$udid" >> "$GITHUB_OUTPUT"
