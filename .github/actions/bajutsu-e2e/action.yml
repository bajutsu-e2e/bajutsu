name: bajutsu E2E
description: >-
  Run bajutsu scenarios against an already-booted Simulator with the XCUITest backend,
  then upload the run (report.html, screenshots, video, network.json) as an artifact.
  The caller is responsible for building and installing the app (and the XCUITest runner)
  first; this action owns the bajutsu-specific part (doctor, run, artifacts).

inputs:
  scenarios:
    description: A single scenario *.yaml to run (passed as `run --scenario`).
    required: true
  exclude:
    description: >-
      Comma list; skip scenarios carrying any of these tags (passed as `run --exclude`). Empty
      (the default) runs every scenario in the file.
    required: false
    default: ""
  target:
    description: Target key in bajutsu.config.yaml.
    required: true
  udid:
    description: Simulator UDID (or "booted" for the current one).
    required: false
    default: booted
  backend:
    description: Actuator backend.
    required: false
    default: xcuitest
  config:
    description: Path to bajutsu.config.yaml.
    required: false
    default: bajutsu.config.yaml
  artifact-name:
    description: Name for the uploaded run artifacts.
    required: false
    default: bajutsu-run

runs:
  using: composite
  steps:
    # The XCUITest backend needs no pip extra (its runner is driven over HTTP, and `xcodebuild` is a
    # system tool that ships with Xcode on the macOS runner) — so the run path is the base install.
    # --no-dev: never the dev group (mypy / pytest / ruff and the gate-only extras
    # bedrock/server/worker/db/oauth/mcp); those belong to the Linux `check` gate.
    - name: Sync dependencies
      shell: bash
      run: uv sync --no-dev

    # Inputs go through env: so the shell sees them as data, not as script text spliced in
    # before parsing (the GitHub Actions ${{ }} injection pattern). See BE-0123.
    - name: Preflight (bajutsu doctor — non-blocking)
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        UDID: ${{ inputs.udid }}
        BACKEND: ${{ inputs.backend }}
        CONFIG: ${{ inputs.config }}
      run: >-
        uv run --no-sync bajutsu doctor --target "$TARGET" --udid "$UDID"
        --backend "$BACKEND" --config "$CONFIG"
        || echo "doctor: non-blocking (convention score only)"

    - name: Run scenarios
      shell: bash
      env:
        SCENARIOS: ${{ inputs.scenarios }}
        EXCLUDE: ${{ inputs.exclude }}
        TARGET: ${{ inputs.target }}
        UDID: ${{ inputs.udid }}
        BACKEND: ${{ inputs.backend }}
        CONFIG: ${{ inputs.config }}
      run: >-
        uv run --no-sync bajutsu run --scenario "$SCENARIOS" --exclude "$EXCLUDE" --target "$TARGET"
        --udid "$UDID" --backend "$BACKEND"
        --config "$CONFIG" --no-erase

    # artifact-name is a `with:` value on a `uses:` step, not a shell `run:` block, so the
    # ${{ }} injection pattern does not apply — no env: indirection needed here (BE-0123).
    - name: Upload run artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: runs/
        if-no-files-found: ignore
