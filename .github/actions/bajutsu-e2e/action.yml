name: bajutsu E2E
description: >-
  Run bajutsu scenarios against an already-booted Simulator with the idb backend,
  then upload the run (report.html, screenshots, video, network.json) as an artifact.
  The caller is responsible for building and installing the app first (build varies per
  app); this action owns the bajutsu-specific part (idb setup, doctor, run, artifacts).

inputs:
  scenarios:
    description: A single scenario *.yaml to run (passed as `run --scenario`).
    required: true
  target:
    description: Target key in bajutsu.config.yaml.
    required: true
  udid:
    description: Simulator UDID (or "booted" for the current one).
    required: false
    default: booted
  backend:
    description: Actuator backend.
    required: false
    default: idb
  config:
    description: Path to bajutsu.config.yaml.
    required: false
    default: bajutsu.config.yaml
  artifact-name:
    description: Name for the uploaded run artifacts.
    required: false
    default: bajutsu-run

runs:
  using: composite
  steps:
    # Skip Homebrew's auto-update (re-fetching every tap on each run costs minutes) and the
    # post-install cleanup; the `brew list` guard already short-circuits when idb-companion is
    # present, so these only speed the actual install.
    - name: Install idb_companion
      shell: bash
      env:
        HOMEBREW_NO_AUTO_UPDATE: "1"
        HOMEBREW_NO_INSTALL_CLEANUP: "1"
      run: brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion

    # --no-dev: the run path needs only the idb backend, never the dev group (mypy / pytest /
    # ruff and the gate-only extras bedrock/server/worker/db/oauth/mcp). Those belong to the
    # Linux `check` gate; pulling them here installed ~80 extra packages for nothing.
    - name: Sync dependencies (idb backend)
      shell: bash
      run: uv sync --extra idb --no-dev

    # Inputs go through env: so the shell sees them as data, not as script text spliced in
    # before parsing (the GitHub Actions ${{ }} injection pattern). See BE-0123.
    - name: Preflight (bajutsu doctor — non-blocking)
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        UDID: ${{ inputs.udid }}
        BACKEND: ${{ inputs.backend }}
        CONFIG: ${{ inputs.config }}
      run: >-
        uv run --no-sync bajutsu doctor --target "$TARGET" --udid "$UDID"
        --backend "$BACKEND" --config "$CONFIG"
        || echo "doctor: non-blocking (convention score only)"

    - name: Run scenarios
      shell: bash
      env:
        SCENARIOS: ${{ inputs.scenarios }}
        TARGET: ${{ inputs.target }}
        UDID: ${{ inputs.udid }}
        BACKEND: ${{ inputs.backend }}
        CONFIG: ${{ inputs.config }}
      run: >-
        uv run --no-sync bajutsu run --scenario "$SCENARIOS" --target "$TARGET"
        --udid "$UDID" --backend "$BACKEND"
        --config "$CONFIG" --no-erase

    # artifact-name is a `with:` value on a `uses:` step, not a shell `run:` block, so the
    # ${{ }} injection pattern does not apply — no env: indirection needed here (BE-0123).
    - name: Upload run artifacts
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: runs/
        if-no-files-found: ignore
