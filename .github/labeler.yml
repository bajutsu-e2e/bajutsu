# Path-based auto-labels applied to every repo-owned PR by `.github/workflows/pr-labels.yml`
# (via actions/labeler). Each top-level key is a label name; a PR gets the label when any of its
# changed files matches one of the globs. The `area:*` family marks which part of the tree a PR
# touches so reviewers can triage the PR list at a glance — complementary to, and distinct from,
# the `topic:*` roadmap-item labels stamped by `roadmap-topic-labels.yml` (BE-0156).
#
# Additive only (`sync-labels: false`): matching adds labels, never strips ones a reviewer set by
# hand. Labels that don't exist yet are created on first use (the workflow holds `issues: write`).
# A PR may carry several `area:*` labels — the categories overlap by design (e.g. a driver change
# is both `area:python-core` and `area:drivers`).

documentation:
  - changed-files:
      - any-glob-to-any-file: ['docs/**', '**/*.md']

dependencies:
  - changed-files:
      - any-glob-to-any-file: ['pyproject.toml', 'uv.lock']

area:python-core:
  - changed-files:
      - any-glob-to-any-file: ['bajutsu/**']

area:drivers:
  - changed-files:
      - any-glob-to-any-file: ['bajutsu/drivers/**']

area:mcp:
  - changed-files:
      - any-glob-to-any-file: ['bajutsu/mcp/**']

area:web-ui:
  - changed-files:
      - any-glob-to-any-file: ['bajutsu/serve/**', 'assets/**', 'overrides/**']

area:swift:
  - changed-files:
      - any-glob-to-any-file: ['BajutsuKit/**', '**/*.swift']

area:ci:
  - changed-files:
      - any-glob-to-any-file: ['.github/**', 'scripts/**', 'Makefile']

area:roadmap:
  - changed-files:
      - any-glob-to-any-file: ['roadmaps/**']

area:tests:
  - changed-files:
      - any-glob-to-any-file: ['tests/**']

area:demos:
  - changed-files:
      - any-glob-to-any-file: ['demos/**']
