name: Feature request
description: Suggest an improvement. For a full design proposal, use the roadmap (BE) process instead — see below.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Substantial features in Bajutsu are tracked as **roadmap items (BE IDs)** under
        [`roadmaps/`](https://github.com/bajutsu-e2e/bajutsu/tree/main/roadmaps),
        not as long-lived issues. If your idea is already well-formed, consider opening a
        roadmap item directly (the `ideation` flow drafts one for you). Use this issue for a
        lightweight request or to start the conversation.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What can't you do today, or what's painful? Describe the need, not just a solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: How might Bajutsu address it? Rough ideas are fine.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or existing workarounds you've thought about.
    validations:
      required: false

  - type: checkboxes
    id: principles
    attributes:
      label: Alignment with Bajutsu's principles
      description: These are non-negotiable. Confirm the request is consistent with them.
      options:
        - label: "Doesn't make an LLM decide pass/fail — `run` stays fully deterministic (AI authors and investigates, never judges)."
          required: true
        - label: "Determinism first — no fixed sleeps; ambiguous selectors fail rather than guessing."
          required: true
        - label: "App-agnostic — per-target differences belong in config (`targets.<name>`), not the tool/runner."
          required: true
        - label: I checked the roadmap and existing issues and this isn't already tracked.
          required: true
