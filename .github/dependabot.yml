version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the pin + the version
  # comment). Grouped so all action bumps land in one PR.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Wait 7 days after a release before opening a PR — a fresh version has had time to
    # surface yanks/regressions, reducing supply-chain risk from a just-published bump.
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  # Python dependencies (pyproject.toml: runtime + dev extras).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      python:
        patterns: ["*"]
