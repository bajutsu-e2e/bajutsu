# Move shipped roadmap items into implemented/ so their directory matches their Status.
# When a PR flips an item to `Status: Implemented`, this allocates the mechanical half of the
# documented ship step — `git mv` proposals/ -> implemented/ and regenerate the index — and
# pushes the fixup back onto the branch. The same invariant is a gate test
# (tests/test_promote_roadmap_items.py), so the move is enforced even where this can't run
# (a fork PR can't be pushed to); there the gate keeps the PR red until the move lands.
name: roadmap-promote

on:
  pull_request:
    paths:
      - 'roadmaps/**'

permissions:
  contents: write

concurrency:
  group: roadmap-promote-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  promote:
    name: promote shipped items
    runs-on: ubuntu-latest
    # A fork PR's branch can't be pushed back to; the gate test is the backstop there.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Move items whose Status no longer matches their directory
        run: python3 scripts/promote_roadmap_items.py

      - name: Commit and push if changed
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No items to promote; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(roadmap): file shipped items under implemented/ and reindex"
          # Integrate anything another roadmap workflow (e.g. roadmap-id) pushed meanwhile, so
          # both can run on one PR without a non-fast-forward push. A conflict here is rare
          # (a single PR both allocating an ID and shipping an item); if it loses the race the
          # gate test keeps the PR red until a re-run, never a silent wrong merge.
          git fetch origin "$HEAD_REF"
          if ! git rebase FETCH_HEAD; then
            git rebase --abort
            echo "::error::rebase onto origin/$HEAD_REF failed; re-run after the other roadmap job lands"
            exit 1
          fi
          git push origin "HEAD:$HEAD_REF"
