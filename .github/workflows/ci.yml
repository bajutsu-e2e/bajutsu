# Repo CI: lint + typecheck + test on Linux. The logic layer needs no Simulator, so this
# is fast and cheap; on-device E2E (macOS runners) is a separate, heavier workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      # Mirrors `make check`. The uv-native steps run identically to the local gate
      # and the pre-push hook; actionlint is the lone separately-installed binary.
      - name: Lockfile up to date (uv lock --check)
        run: uv lock --check

      - name: Format (ruff format --check)
        run: uv run --no-sync ruff format --check .

      - name: Lint (ruff)
        run: uv run --no-sync ruff check .

      - name: Lint shell scripts (shellcheck)
        run: uv run --no-sync shellcheck .githooks/pre-push scripts/serve.sh scripts/merge-uv-lock.sh .claude/hooks/session-start.sh demos/record/demo.sh

      # actionlint is a standalone Go binary, not pip/uv-installable — the one gate check
      # not covered by `uv sync`. Pinned to a tagged release of the official installer.
      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12

      - name: Lint workflows (actionlint)
        run: ./actionlint -color

      - name: Typecheck (mypy)
        run: uv run --no-sync mypy bajutsu demos

      - name: Test (pytest + coverage)
        run: uv run --no-sync pytest -q --cov=bajutsu --cov-report=term-missing:skip-covered --cov-report=json:coverage.json --cov-fail-under=85

      # Render coverage.json into the run's job summary. Runs even when the floor above fails,
      # so a coverage regression shows the numbers rather than only a red step. Presentation
      # only — pass/fail is already decided by --cov-fail-under; the script never fails the run.
      - name: Coverage summary
        if: always()
        run: uv run --no-sync python scripts/coverage_summary.py --floor 85 coverage.json

  # Real-browser E2E for the web (Playwright) backend (BE-0041). Unlike the iOS E2E it runs on
  # Linux — a headless Chromium, no Mac and no Simulator — so it lives here rather than in e2e.yml.
  # The unit gate above stays browser-free (the driver is covered via a fake page); this job
  # installs the `web` extra + Chromium and drives the demo web app end to end.
  web-e2e:
    name: web e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Web smoke (demos/web)
        run: make -C demos/web e2e
