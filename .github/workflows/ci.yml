# Repo CI: lint + typecheck + test on Linux. The logic layer needs no Simulator, so this
# is fast and cheap; on-device E2E (macOS runners) is a separate, heavier workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run --no-sync ruff check .

      - name: Typecheck (mypy)
        run: uv run --no-sync mypy bajutsu

      - name: Test (pytest)
        run: uv run --no-sync pytest -q
