# Repo CI: lint + typecheck + test on Linux. The logic layer needs no Simulator, so this
# is fast and cheap; it runs on every PR (the `check` job is the required gate). The heavier,
# narrowly-relevant jobs live in their own path-filtered workflows so they run only when warranted:
# on-device E2E (macOS) in ios-e2e.yml, the real-browser web E2E in web-e2e.yml, and the dependency
# advisory audit in dependency-audit.yml.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    # Every gate step below calls a `make` target, so the commands and file/target lists live only
    # in the Makefile and CI mirrors `make check` by construction (no hand-copied list to drift).
    # uv's auto-sync is disabled — the env is already populated by the explicit `uv sync` step —
    # to keep the old `uv run --no-sync` speed.
    env:
      UV_NO_SYNC: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      # Each step invokes the matching `make` target so the gate's commands and file/target lists
      # live only in the Makefile. actionlint is the lone separately-installed binary (kept inline
      # below: `make lint-actions` only runs it when it's on PATH, but CI installs ./actionlint).
      - name: Lockfile up to date (uv lock --check)
        run: make lock-check

      - name: Format (ruff format --check)
        run: make format-check

      - name: Lint (ruff)
        run: make lint

      - name: Lint docstrings (ruff D, migrated surface)
        run: make lint-docstrings

      - name: Lint imports (core/contract/periphery boundaries)
        run: make lint-imports

      - name: Lint roadmap (cross-links + author handle)
        run: make lint-roadmap

      - name: Lint shell scripts (shellcheck)
        run: make lint-sh

      # actionlint is a standalone Go binary, not pip/uv-installable — the one gate check
      # not covered by `uv sync`. The installer script is pinned by commit SHA (not the
      # mutable v1.7.12 tag) so its fetched-and-executed content is immutable, matching the
      # SHA-pinned `uses:` steps above (BE-0133). The trailing SHA is the commit v1.7.12
      # points at; bump the SHA, the version arg, and the checksum below together on upgrade.
      - name: Install actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/914e7df21a07ef503a81201c76d2b11c789d3fca/scripts/download-actionlint.bash) 1.7.12  # v1.7.12

      # The installer fetches the binary tarball from a mutable release asset, so pinning the
      # script alone leaves the executed binary unverified. Pin the extracted linux/amd64
      # binary's sha256 (runner is ubuntu-latest) to make it tamper-evident. Derivation:
      # actionlint_1.7.12_linux_amd64.tar.gz (release checksums.txt: 8aca8db9…) extracted → this.
      - name: Verify actionlint binary checksum
        run: echo "c872d6db8c6bf83a8eaa704fc93999f027d55dffbc63b8a6abdccb47df5f4cd4  actionlint" | sha256sum -c -

      - name: Lint workflows (actionlint)
        run: ./actionlint -color

      # serve.js is build-step-free browser JS with no other CI coverage, so a syntax slip would
      # otherwise reach a browser unchecked. `node` ships on ubuntu-latest, so `make lint-js` runs
      # `node --check`; the eslint structural rules stay a local-only extra (no node toolchain in
      # this Python repo), exactly as `make lint-js` degrades when eslint is absent.
      - name: Lint JS (node --check serve.js)
        run: make lint-js

      # Persist mypy's incremental cache across runs so typecheck is a warm re-check (a few seconds)
      # instead of a full cold scan (~18s here). mypy invalidates per-file by content, so a restored
      # cache is always safe; the per-commit key with prefix restore-keys keeps it fresh (each run
      # saves a new entry, restoring from the most recent matching one).
      - name: Cache mypy
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}-
            mypy-${{ runner.os }}-

      - name: Typecheck (mypy)
        run: make typecheck

      - name: Test (pytest + coverage)
        run: make test

      # Render coverage.json into the run's job summary. Runs even when the floor above fails,
      # so a coverage regression shows the numbers rather than only a red step. Presentation
      # only — pass/fail is already decided by --cov-fail-under; the script never fails the run.
      # Keep --floor equal to the Makefile's `test` --cov-fail-under so the summary marks the same
      # bar the gate enforces (both 89); a mismatch just misreports which lines are "below floor".
      - name: Coverage summary
        if: always()
        run: uv run --no-sync python scripts/coverage_summary.py --floor 89 coverage.json
