# Repo CI: lint + typecheck + test on Linux. The logic layer needs no Simulator, so this
# is fast and cheap; on-device E2E (macOS runners) is a separate, heavier workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]  # the supported minimum and the pinned version
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # The dev tools live in the `dev` extra; sync it explicitly, then run with
      # --no-sync so `uv run` doesn't re-sync the env back to the default set.
      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run --no-sync ruff check .

      - name: Typecheck (mypy)
        run: uv run --no-sync mypy bajutsu

      - name: Test (pytest)
        run: uv run --no-sync pytest -q
