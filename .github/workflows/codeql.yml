# CodeQL code scanning (advanced setup). Replaces GitHub's default setup so we can
# path-filter the heavier per-platform analyses: on pull requests, Swift (BajutsuKit) and
# Android java-kotlin (the demos/showcase/android Compose + Views app) are each analysed
# only when their own sources — or this workflow itself — change, while the lightweight
# always-on languages (actions / javascript-typescript / python) run every time. Non-PR
# events (push to main, merge queue, the weekly schedule) always run the full matrix so the
# default-branch alert baseline stays complete.
#
# The Android job uses `build-mode: manual` with an explicit Gradle build: CodeQL's buildless
# extractor sees no Kotlin in an Android Gradle project, and autobuild can't find a build command
# because the project lives under demos/showcase/android, not at the repo root. So it compiles the
# showcase via the committed Gradle wrapper (ubuntu-latest ships the Android SDK, so no extra setup)
# and traces that build — mirroring the Swift job's manual `swift build` on macOS.
#
# The required branch-protection status check is the aggregation job `CodeQL` below,
# not the per-language `Analyze (...)` jobs — that keeps a single stable required check
# regardless of which languages are skipped.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: "18 4 * * 1" # weekly, Monday 04:18 UTC (mirrors default setup's weekly cadence)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed languages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      swift: ${{ steps.filter.outputs.swift }}
      android: ${{ steps.filter.outputs.android }}
    steps:
      # The path filter is only consumed to skip Swift / Android on pull requests; every other
      # event forces the full matrix (see each analyze job's `if`). Running paths-filter only for
      # pull_request keeps this job cheap and avoids relying on git diff data that may be
      # unavailable for push/merge_group/schedule/dispatch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: github.event_name == 'pull_request'
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            swift:
              - "BajutsuKit/**"
              - "**/*.swift"
              - ".github/workflows/codeql.yml"
            android:
              - "demos/showcase/android/**"
              - "**/*.kt"
              - "**/*.java"
              - ".github/workflows/codeql.yml"

  analyze:
    name: Analyze
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:${{ matrix.language }}"

  analyze-swift:
    name: Analyze (swift)
    needs: changes
    # Skip Swift only on pull requests that touch neither Swift sources nor this workflow.
    # Every other event (push to main, merge_group, schedule, manual dispatch) runs the
    # full Swift analysis.
    if: >-
      needs.changes.outputs.swift == 'true' ||
      github.event_name != 'pull_request'
    runs-on: macos-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: swift
          build-mode: manual
      - name: Build
        run: swift build --package-path BajutsuKit
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:swift"

  analyze-java-kotlin:
    name: Analyze (java-kotlin)
    needs: changes
    # Skip Android only on pull requests that touch neither Android/Kotlin/Java sources nor this
    # workflow. Every other event (push to main, merge_group, schedule, manual dispatch) runs it.
    if: >-
      needs.changes.outputs.android == 'true' ||
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          # Java and Kotlin share one CodeQL language id. `manual` + an explicit Gradle build (below)
          # is needed because the showcase is a Gradle project under demos/showcase/android, not at
          # the repo root: buildless extraction sees no Kotlin, and autobuild can't find a build
          # command at the root. The manual build mirrors the Swift job's `swift build`.
          languages: java-kotlin
          build-mode: manual
      - name: Build the Android showcase so CodeQL can trace it
        # The committed Gradle wrapper + ubuntu-latest's preinstalled Android SDK build all four
        # products (both toolkits × both a11y flavors), so CodeQL extracts every Kotlin/Java source.
        # Pin JDK 17 (the showcase's documented minimum) rather than the runner's default.
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          make -C demos/showcase/android build-all
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:java-kotlin"

  # Aggregation gate wired to the required "CodeQL" branch-protection check. Passes when
  # every analysis job that ran succeeded; a skipped per-platform job (a PR without Swift or
  # Android changes) is treated as OK. This keeps one stable required check independent of
  # which languages are skipped.
  codeql:
    name: CodeQL
    needs: [analyze, analyze-swift, analyze-java-kotlin]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify analysis results
        env:
          ANALYZE_RESULT: ${{ needs.analyze.result }}
          SWIFT_RESULT: ${{ needs.analyze-swift.result }}
          ANDROID_RESULT: ${{ needs.analyze-java-kotlin.result }}
        run: |
          echo "analyze=$ANALYZE_RESULT swift=$SWIFT_RESULT android=$ANDROID_RESULT"
          if [ "$ANALYZE_RESULT" != "success" ]; then
            echo "::error::CodeQL analysis failed for core languages ($ANALYZE_RESULT)"
            exit 1
          fi
          if [ "$SWIFT_RESULT" != "success" ] && [ "$SWIFT_RESULT" != "skipped" ]; then
            echo "::error::CodeQL analysis failed for Swift ($SWIFT_RESULT)"
            exit 1
          fi
          if [ "$ANDROID_RESULT" != "success" ] && [ "$ANDROID_RESULT" != "skipped" ]; then
            echo "::error::CodeQL analysis failed for Android java-kotlin ($ANDROID_RESULT)"
            exit 1
          fi
