# BajutsuKit (Swift) gate — the test-support package the host app links. Pure-Foundation
# logic (request matching / mock parsing) is unit-tested here with `swift test` on a plain
# macOS runner (no Simulator), mirroring how the Python core's gate needs no device. The
# on-device behaviour (URLProtocol interception in a running app) stays in e2e.yml.
name: Swift (BajutsuKit)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "BajutsuKit/**"
      - ".github/workflows/swift.yml"
  pull_request:
    paths:
      - "BajutsuKit/**"
      - ".github/workflows/swift.yml"

permissions:
  contents: read

concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build + test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Build
        run: swift build --package-path BajutsuKit

      - name: Test
        run: swift test --package-path BajutsuKit
