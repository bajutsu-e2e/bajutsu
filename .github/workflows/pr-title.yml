# Validate the PR title: a scoped conventional subject (`feat(run): …`), and — when the branch name
# encodes a roadmap id (`claude/be-0050-<slug>`) — the matching `[BE-0050]` prefix. The branch, not
# the diff, is the authoritative roadmap-id signal, so this catches a missing or mismatched id and a
# malformed title. Re-runs on `edited` so a later title change can't slip past. Title-only and
# stdlib-only (scripts/lint_pr.py --title-only) — no checkout history or uv needed.
#
# Dependabot is exempt: its PR titles are auto-generated ("Bump …" / grouped-update summaries), not
# scoped conventional subjects, and it owns no roadmap item — a bot can't act on a red title check, so
# gating it only wedges dependency PRs. The exemption is a *step*-level guard, not a job `if:`, so the
# job still completes green — keeping the required-check contract satisfied even when the check is
# skipped for the bot's PRs.
#
# Copilot Autofix PRs are exempt for the same reason: GitHub opens them from an `alert-autofix-<n>`
# branch with a fixed, generator-chosen title ("Potential fix for code scanning alert no. …") that
# carries no scope and no roadmap id, and the branch — not the human who adopts the PR — is the
# reliable signal (the author may show as a person, so a login check misses it). We key the exemption
# off the branch name rather than the title so a future generator wording can't reopen the gap, and
# require the head repo to be this repo (`head.repo.full_name == github.repository`): Autofix always
# branches in-repo, so requiring same-repo stops an outside fork from opting out of the gate just by
# naming its branch `alert-autofix-*` (in-repo contributors have write access and are already trusted).
name: PR title lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  title:
    name: validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Fork PRs run the linter from the trusted base SHA so a PR can't edit scripts/lint_pr.py
          # to bypass the gate; same-repo PRs check out the PR head so linter/workflow changes are
          # tested. The title and branch ref the linter reads come from the (trusted) github.event
          # context via env, so only the script itself needs a trusted source.
          ref: ${{ github.event.pull_request.head.repo.fork && github.event.pull_request.base.sha || github.event.pull_request.head.sha }}

      - name: Check the PR title (form + roadmap-id prefix from the branch)
        if: >-
          github.event.pull_request.user.login != 'dependabot[bot]' &&
          !(
            github.event.pull_request.head.repo.full_name == github.repository &&
            startsWith(github.event.pull_request.head.ref, 'alert-autofix-')
          )
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: python3 scripts/lint_pr.py --title-only
