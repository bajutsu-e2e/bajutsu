# Allocate permanent BE IDs on `main`, after a merge (BE-0089).
#
# A roadmap item keeps the `BE-XXXX` placeholder all the way through authoring, review, and the merge
# itself: the branch is merged as-is. The merge is a push to `main`, which triggers this workflow; it
# runs the existing allocator against `main`'s tree, renames each placeholder to the next free
# `BE-NNNN`, and commits the result directly to `main`. Allocation therefore happens in merge order on
# `main`, so the `BE-NNNN` sequence is contiguous by construction and a number is never burned by a
# rejected proposal. (This replaces the earlier PR-open allocation; see BE-0061 for the collision
# hardening this builds on.)
#
# Landing a commit on protected `main` needs a bypass identity: a dedicated GitHub App on `main`'s
# ruleset bypass list, whose id/private-key are stored as the `AUTOMATION_BOT_APP_ID` /
# `AUTOMATION_BOT_PRIVATE_KEY` secrets. Until those secrets exist the job is a green no-op (the gate step
# below), so `main` is never red while the App is being set up.
name: "Roadmap: allocate BE IDs"

on:
  push:
    branches: [main]
    paths:
      - 'roadmaps/**'

permissions:
  contents: write       # commit the renumber to main
  pull-requests: write  # comment the allocated id on the merged PR

concurrency:
  group: roadmap-id-main
  cancel-in-progress: false   # serialize; never drop a queued allocation

jobs:
  allocate:
    name: allocate BE IDs
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the bypass App being configured
        id: gate
        env:
          APP_ID: ${{ secrets.AUTOMATION_BOT_APP_ID }}
          APP_KEY: ${{ secrets.AUTOMATION_BOT_PRIVATE_KEY }}
        run: |
          # Enable only when BOTH the App id and its private key are present: minting the App token
          # needs both, so a half-configured App (id set, key missing) must stay dormant rather than
          # run and fail — keeping main green while the App is being provisioned (BE-0089).
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AUTOMATION_BOT_APP_ID / AUTOMATION_BOT_PRIVATE_KEY are not both set — merge-time BE-ID allocation is dormant (BE-0089). No-op."
          fi

      - name: Mint a short-lived installation token for the bypass App
        if: steps.gate.outputs.enabled == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.AUTOMATION_BOT_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_BOT_PRIVATE_KEY }}

      - name: Check out main with the App token
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Allocate placeholder IDs on main, guard the diff, and push
        if: steps.gate.outputs.enabled == 'true'
        id: allocate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"

          # Reused unchanged (BE-0089): the allocator finds every BE-XXXX placeholder, allocates
          # max(used)+1 per item, git-mv's the dir/files, and rewrites the in-file token. On `main`
          # the `used` set is just main's numbered items, so allocation is contiguous in merge order.
          out="$(python3 scripts/allocate_roadmap_ids.py)"
          echo "$out"
          tokens="$(printf '%s\n' "$out" \
            | sed -n 's/^Allocated \(BE-[0-9]\{4\}\) for .*/\1/p' | paste -sd' ' -)"
          if [ -z "$tokens" ]; then
            # The renumber commit re-triggers this workflow (an App-token push fires events), but it
            # carries no placeholder, so this run is a no-op.
            echo "No BE-XXXX placeholders on main; nothing to allocate."
            exit 0
          fi

          git add -A
          git commit -m "docs(roadmap): allocate BE IDs for merged placeholder items"
          # Gate the bypass-token commit before it lands on main: cap its blast radius to roadmaps/
          # (BE-0089) and, on the renumbered tree, run the stdlib roadmap format check — the first
          # point a once-placeholder item's shape is checkable, on a path with no PR or required
          # check of its own (BE-0149). Runs on the commit, so it guards exactly what gets pushed;
          # a failure aborts before `git push`, leaving main untouched.
          python3 scripts/check_renumber_diff.py

          # main may have moved between checkout and push; rebase onto it and retry a few times,
          # logging which step failed so a stuck conflict isn't misreported as push contention.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Could not push the renumber to main after several attempts."
              exit 1
            fi
            echo "::warning::push to main rejected (attempt ${attempt}); fetching and rebasing onto origin/main."
            if ! git fetch origin main; then
              echo "::warning::git fetch failed (attempt ${attempt}); retrying."
              continue
            fi
            if ! git rebase origin/main; then
              echo "::warning::rebase onto origin/main conflicted (attempt ${attempt}); aborting and retrying."
              git rebase --abort
            fi
          done
          echo "tokens=$tokens" >> "$GITHUB_OUTPUT"

      - name: Comment the allocated id on the merged PR (best-effort)
        if: steps.gate.outputs.enabled == 'true' && steps.allocate.outputs.tokens != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MERGE_SHA: ${{ github.sha }}
          TOKENS: ${{ steps.allocate.outputs.tokens }}
        run: |
          # A push event carries no PR number, so resolve it from the merge commit. A miss is
          # harmless: the allocation has already landed on main, and the comment is informational.
          pr="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${MERGE_SHA}/pulls" -q '.[0].number' 2>/dev/null || true)"
          if [ -z "$pr" ] || [ "$pr" = "null" ]; then
            echo "No PR maps to ${MERGE_SHA}; skipping the announcement comment."
            exit 0
          fi
          gh pr comment "$pr" \
            --body "Allocated **${TOKENS}** on \`main\` (merge-time BE-ID allocation, BE-0089)." \
            || echo "::warning::Could not comment on PR #$pr (non-fatal)."
