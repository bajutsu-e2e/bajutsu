# Allocate permanent BE IDs to roadmap items authored with the BE-XXXX placeholder.
# The ideation skill leaves the ID undetermined so concurrent branches never
# race for a number; this workflow assigns the next free IDs at PR time, pushes the
# rename back onto the branch, and rewrites the PR title's BE-XXXX to the allocated ID.
name: roadmap-id

on:
  pull_request:
    paths:
      - 'roadmaps/**'

permissions:
  contents: write
  pull-requests: write   # to rewrite the PR title's BE-XXXX placeholder

concurrency:
  group: roadmap-id-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  allocate:
    name: allocate BE IDs
    runs-on: ubuntu-latest
    # A fork PR's branch can't be pushed back to; only same-repo PRs are renumbered.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Reserve BE IDs already taken by other open PRs
        id: reserved
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_PR: ${{ github.event.pull_request.number }}
        run: |
          # origin/main is the allocator's floor, but a number a *parallel* open PR has already
          # allocated isn't on main yet — reserve those so two branches in flight never collide
          # (the BE-0054 double-allocation). Best effort: an empty list just falls back to main.
          reserved="$(bash scripts/open_pr_be_ids.sh "$CURRENT_PR")"
          echo "Reserved by other open PRs: ${reserved:-<none>}"
          echo "reserved=$reserved" >> "$GITHUB_OUTPUT"

      - name: Allocate placeholder IDs
        id: allocate
        env:
          ROADMAP_RESERVED_IDS: ${{ steps.reserved.outputs.reserved }}
        run: |
          out="$(python3 scripts/allocate_roadmap_ids.py)"
          echo "$out"
          # The script prints "Allocated BE-NNNN for <slug>" per item; collect the IDs
          # (space-separated) so the title step can rewrite the placeholder. Empty when
          # there were no placeholders — a no-op run.
          tokens="$(printf '%s\n' "$out" \
            | sed -n 's/^Allocated \(BE-[0-9]\{4\}\) for .*/\1/p' | paste -sd' ' -)"
          echo "tokens=$tokens" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No placeholders to allocate; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(roadmap): allocate BE IDs for placeholder items"
          git push origin "HEAD:$HEAD_REF"

      - name: Rewrite the PR title's BE-XXXX to the allocated ID
        if: steps.allocate.outputs.tokens != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          TOKENS: ${{ steps.allocate.outputs.tokens }}
        run: |
          if ! printf '%s' "$PR_TITLE" | grep -q 'BE-XXXX'; then
            echo "PR title carries no BE-XXXX placeholder; leaving it unchanged."
            exit 0
          fi
          # A title holds a single [BE-XXXX] prefix; map it to the first allocated ID
          # (allocation is sorted by slug, so this is deterministic).
          first="${TOKENS%% *}"
          if [ "$first" != "$TOKENS" ]; then
            echo "::notice::Multiple IDs allocated ($TOKENS); rewriting the title's BE-XXXX to the first ($first)."
          fi
          new_title="${PR_TITLE//BE-XXXX/$first}"
          echo "Updating PR #$PR_NUMBER title to: $new_title"
          gh pr edit "$PR_NUMBER" --title "$new_title"
