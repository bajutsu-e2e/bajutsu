# Allocate permanent BE IDs to roadmap items authored with the BE-XXXX placeholder.
# The roadmap-brainstorm skill leaves the ID undetermined so concurrent branches never
# race for a number; this workflow assigns the next free IDs at PR time and pushes the
# rename back onto the branch.
name: roadmap-id

on:
  pull_request:
    paths:
      - 'docs/roadmap/**'

permissions:
  contents: write

concurrency:
  group: roadmap-id-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  allocate:
    name: allocate BE IDs
    runs-on: ubuntu-latest
    # A fork PR's branch can't be pushed back to; only same-repo PRs are renumbered.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Allocate placeholder IDs
        run: python3 scripts/allocate_roadmap_ids.py

      - name: Commit and push if changed
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No placeholders to allocate; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(roadmap): allocate BE IDs for placeholder items"
          git push origin "HEAD:$HEAD_REF"
