# Allocate permanent BE IDs to roadmap items authored with the BE-XXXX placeholder.
# The ideation skill leaves the ID undetermined so concurrent branches never race for a number; this
# workflow assigns the next free IDs at PR time, claims each atomically as a refs/be-claims/* git ref
# (GitHub's create-ref API is a compare-and-set, so two branches in the same window cannot both take
# a number — the loser re-picks), pushes the rename back onto the branch, and rewrites the PR title's
# BE-XXXX to the allocated ID.
name: roadmap-id

on:
  pull_request:
    paths:
      - 'roadmaps/**'

permissions:
  contents: write
  pull-requests: write   # to rewrite the PR title's BE-XXXX placeholder

concurrency:
  group: roadmap-id-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  allocate:
    name: allocate BE IDs
    runs-on: ubuntu-latest
    # A fork PR's branch can't be pushed back to, and its token can't create claim refs; only
    # same-repo PRs are renumbered.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Allocate placeholder IDs, claim them atomically, and push
        id: allocate
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_PR: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Allocate, then claim each id atomically. A claim lost to a parallel PR (HTTP 422) means we
          # raced for that number: release any we did win, reset, and retry — the winning claim is now
          # visible to `be_claims.sh list`, so the next attempt steers off it. A few attempts settle
          # any realistic contention; origin/main is the allocator's floor regardless.
          tokens=""
          for attempt in 1 2 3 4 5; do
            reserved="$(bash scripts/open_pr_be_ids.sh "$CURRENT_PR") $(bash scripts/be_claims.sh list)"
            echo "Attempt $attempt — reserved (open PRs + claims): ${reserved:-<none>}"

            out="$(ROADMAP_RESERVED_IDS="$reserved" python3 scripts/allocate_roadmap_ids.py)"
            echo "$out"
            # The script prints "Allocated BE-NNNN for <slug>" per item; collect the ids.
            tokens="$(printf '%s\n' "$out" \
              | sed -n 's/^Allocated \(BE-[0-9]\{4\}\) for .*/\1/p' | paste -sd' ' -)"
            if [ -z "$tokens" ]; then
              echo "No BE-XXXX placeholders; nothing to allocate."
              exit 0
            fi

            read -ra toks <<< "$tokens"
            won=()
            lost=0
            for tok in "${toks[@]}"; do
              if bash scripts/be_claims.sh claim "${tok#BE-}" "$HEAD_SHA"; then
                won+=("${tok#BE-}")
              else
                lost=1
              fi
            done
            if [ "$lost" -eq 0 ]; then
              break
            fi

            for id in "${won[@]}"; do
              bash scripts/be_claims.sh release "$id"
            done
            git reset --quiet --hard HEAD
            git clean --quiet -fd roadmaps/
            tokens=""
          done

          if [ -z "$tokens" ]; then
            echo "::error::Could not claim an allocated id after several attempts; a parallel PR is racing — re-run this job."
            exit 1
          fi

          # Allocation only renamed the BE-XXXX placeholder directories. The index tables are
          # generated from each item's metadata, and the generator skips an item while it is still
          # BE-XXXX, so a newly-numbered item's row appears only after allocation. Regenerate here so
          # this commit lands a complete, gate-green index (tests/test_roadmap_index.py). Stdlib-only
          # like the allocate script (no uv needed).
          python3 scripts/build_roadmap_index.py

          git add -A
          git commit -m "docs(roadmap): allocate BE IDs for placeholder items"
          git push origin "HEAD:$HEAD_REF"
          echo "tokens=$tokens" >> "$GITHUB_OUTPUT"

      - name: Rewrite the PR title's BE-XXXX to the allocated ID
        if: steps.allocate.outputs.tokens != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          TOKENS: ${{ steps.allocate.outputs.tokens }}
        run: |
          if ! printf '%s' "$PR_TITLE" | grep -q 'BE-XXXX'; then
            echo "PR title carries no BE-XXXX placeholder; leaving it unchanged."
            exit 0
          fi
          # A title holds a single [BE-XXXX] prefix; map it to the first allocated ID
          # (allocation is sorted by slug, so this is deterministic).
          first="${TOKENS%% *}"
          if [ "$first" != "$TOKENS" ]; then
            echo "::notice::Multiple IDs allocated ($TOKENS); rewriting the title's BE-XXXX to the first ($first)."
          fi
          new_title="${PR_TITLE//BE-XXXX/$first}"
          echo "Updating PR #$PR_NUMBER title to: $new_title"
          gh pr edit "$PR_NUMBER" --title "$new_title"
