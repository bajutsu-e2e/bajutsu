# On-device E2E: build the sample app, boot a Simulator, and run a smoke scenario through
# the idb backend. This exercises the full path (driver + simctl + idb + real actuation)
# that the Linux `ci.yml` cannot. macOS runners are slow/metered, so this is manual
# (run it on demand from the Actions tab or `gh workflow run e2e.yml`), not scheduled.
name: E2E (Simulator)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke (idb)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build the sample app
        run: make sample-build

      - name: Boot a Simulator
        id: sim
        run: |
          set -euo pipefail
          # Prefer a pre-installed available iPhone simulator — it's guaranteed compatible
          # with the runner's Xcode. (Pairing the newest device type with the newest
          # runtime ourselves can hit "Incompatible device".) Fall back to creating one
          # with simctl's default runtime.
          udid=$(xcrun simctl list devices available -j | jq -r '[.devices | to_entries[] | select(.key|test("iOS")) | .value[] | select(.name|startswith("iPhone")) | .udid] | first // empty')
          if [ -z "$udid" ]; then
            devtype=$(xcrun simctl list devicetypes -j | jq -r '[.devicetypes[] | select(.productFamily=="iPhone") | .identifier] | last')
            udid=$(xcrun simctl create ci-iphone "$devtype")
          fi
          echo "Using simulator $udid"
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b
          echo "udid=$udid" >> "$GITHUB_OUTPUT"

      - name: Install the app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "sample/build/dd/Build/Products/Debug-iphonesimulator/BajutsuSample.app"

      - name: Run smoke scenarios
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: sample/scenarios/smoke.yaml
          app: sample
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: smoke-run
