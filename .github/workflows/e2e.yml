# On-device E2E (macOS) — two jobs the Linux `ci.yml` cannot run:
#   - smoke (idb): build the sample, boot a Simulator, run a scenario through the idb backend
#     (driver + simctl + idb + real actuation).
#   - xcuitest (codegen): generate a native XCUITest from a scenario and run it with
#     xcodebuild — no bajutsu / idb / AI at test time (the codegen output path).
# Runs on every relevant PR and on demand (the Actions tab / `gh workflow run e2e.yml`).
name: E2E (Simulator)

on:
  workflow_dispatch:
  # Trigger on every PR so the `e2e` gate job always reports a status (required checks
  # that never run stay pending and block merges). The metered macOS jobs themselves are
  # path-gated by the `changes` job below — docs-only PRs skip them and the gate passes.
  pull_request:
  # Also run in the merge queue: `E2E` is a required check, and a required check that
  # never reports on `merge_group` leaves the queue entry pending until it times out.
  # The `changes` job uses the merge group's SHAs so path-gating still applies here.
  merge_group:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether an on-device run is warranted. The macOS jobs only fire when the PR
  # touches what they exercise — the app, the SDK, the runtime, the build/deps, or the E2E
  # workflow/action itself. Manual runs (no PR context) always count as relevant.
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Detect relevant paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: |
          if [ -z "$BASE_SHA" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          # The on-device jobs exercise only the idb runtime (smoke) and codegen -> XCUITest
          # (xcuitest); they never touch the serve control plane, the worker, the MCP server, or
          # the linter, which the Linux gate already covers. Drop those — both the packages and
          # their CLI command modules (cli/commands/{serve,worker,mcp,lint,schema}.py) — plus
          # tests/, before matching, so a serve/worker/mcp/lint-only PR skips the metered macOS
          # jobs. Dependency/build changes (pyproject / uv.lock / Makefile) stay device-relevant —
          # a runtime dep could move.
          device=$(echo "$changed" | grep -vE '^(bajutsu/serve/|bajutsu/mcp/|bajutsu/lint\.py|bajutsu/cli/commands/(serve|worker|mcp|lint|schema)\.py|tests/)' || true)
          if echo "$device" | grep -qE '^(bajutsu/|BajutsuKit/|demos/features/app/|demos/features/demo\.config\.yaml|pyproject\.toml|uv\.lock|Makefile|\.github/workflows/e2e\.yml|\.github/actions/bajutsu-e2e/|\.github/actions/boot-simulator/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  smoke:
    name: smoke (idb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Skip Homebrew's auto-update (re-fetching every tap on each run costs minutes) and the
      # post-install cleanup; rely on the runner image's pre-installed Homebrew state for xcodegen.
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # Start the boot first so it runs concurrently with the app build below — the first
      # boot of a fresh Simulator costs ~80s and does not depend on the build. We only
      # block on "booted" (the wait step) right before installing the app.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator

      - name: Build the sample app
        run: make -C demos/features sample-build

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}"

      - name: Install the app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/features/app/build/dd/Build/Products/Debug-iphonesimulator/BajutsuSample.app"

      - name: Run smoke scenarios
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/features/app/scenarios/smoke.yaml
          target: sample
          config: demos/features/demo.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: smoke-run

  # The codegen output path: a scenario -> native XCUITest, compiled and run by xcodebuild
  # with no bajutsu / idb / AI at test time. This is the claim M3 makes about codegen, so CI
  # has to exercise the generated Swift natively (not just the idb runtime above).
  xcuitest:
    name: xcuitest (codegen)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Skip Homebrew's auto-update (re-fetching every tap on each run costs minutes) and the
      # post-install cleanup; rely on the runner image's pre-installed Homebrew state for xcodegen.
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache xcodebuild DerivedData so the UITest build is incremental across runs. Keyed on the
      # Xcode version + Swift sources + project spec; the restore-keys fallback warms the cache
      # (compiled modules) when only sources change, scoped to the same Xcode, and a miss simply
      # rebuilds cold — so the cache only ever speeds the build, never changes its result.
      - name: Cache DerivedData
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: demos/features/app/build/dd
          key: xcode-dd-${{ runner.os }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/features/app/**/*.swift', 'demos/features/app/**/project.yml') }}
          restore-keys: |
            xcode-dd-${{ runner.os }}-${{ steps.xcode.outputs.ver }}-

      # Start the boot before the codegen build so the ~80s first boot overlaps with it.
      # No explicit wait is needed: `xcodebuild test` blocks on the destination becoming
      # ready when it reaches the test phase, by which point the boot has finished.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator

      # `make -C demos/features ui-test` re-generates ComponentsUITests.swift from the
      # scenario, regenerates the project, then `xcodebuild test`s it. xcodebuild builds the
      # app + UITests target itself, so no separate build/install step is needed.
      - name: Codegen + run native XCUITest
        run: make -C demos/features ui-test SIM=${{ steps.sim.outputs.udid }}

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: xcuitest-result
          path: demos/features/app/build/dd/Logs/Test/*.xcresult
          if-no-files-found: ignore

  # Single required status check for E2E. Always runs so it reports even when the macOS
  # jobs are skipped (docs-only PRs) — a skipped dependency is a pass; only a real
  # failure or cancellation fails the gate. Make `E2E` the required check, not the
  # path-gated macOS jobs.
  e2e:
    name: E2E
    needs: [changes, smoke, xcuitest]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        env:
          SMOKE: ${{ needs.smoke.result }}
          XCUITEST: ${{ needs.xcuitest.result }}
        run: |
          echo "smoke=$SMOKE xcuitest=$XCUITEST"
          if [ "$SMOKE" = "failure" ] || [ "$SMOKE" = "cancelled" ] || \
             [ "$XCUITEST" = "failure" ] || [ "$XCUITEST" = "cancelled" ]; then
            echo "E2E failed"
            exit 1
          fi
          echo "E2E passed (or skipped — no on-device change)"
