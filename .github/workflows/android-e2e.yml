# On-device Android e2e (Linux + KVM) — the third backend's lane, the Android twin of the iOS
# `ios-e2e.yml` (macOS / idb) and `web-e2e.yml` (Linux / Playwright). It boots an AVD under KVM on a
# Linux runner and drives the showcase over `--backend android` (the adb driver, BE-0007), asserting
# deterministic pass/fail. Like the iOS and web lanes, the work is split into per-concern jobs so a
# red check names the capability that broke from the checks list alone, not one bundled pass/fail:
#   - smoke (adb): the functional heart — run the core scenarios through `bajutsu run`, against both
#     Android UI toolkits (Compose over the full `E2E_SCENARIOS`, Views over the Stable-tab
#     `E2E_VIEWS_SCENARIOS` subset; `components`/`modals` stay Compose-only for now), the sets
#     defined in the Android Makefile. Each scenario's selectors list both id forms (BE-0221).
#   - golden (adb): the BE-0006 element-tree golden over the resident channel, then re-run with the
#     resident channel forced off (`e2e-fallback`, BAJUTSU_ADB_RESIDENT=0) so both the resident path
#     (BE-0245) and the `uiautomator dump` fallback are exercised and proven to yield the same tree.
#     `fallback` is a step in this job, not a fourth job — it is the same golden on the other read
#     channel, so a separate job would rebuild the APK and reboot the AVD to assert the same tree.
#   - visual (adb): the pixel VRT against the CI-recorded baseline. A pixel baseline is host-specific,
#     so — like ios-e2e.yml's `visual` and web-e2e.yml's lanes — it is a non-gating signal.
#   - network (adb): the BE-0283 network-capture assertion — a `request` observes real emulator
#     traffic reported through BajutsuAndroid's interceptor over the `adb reverse` collector bridge.
#   - conformance (adb): the BE-0114 driver conformance contract (tests/driver_conformance.py) run
#     on-device against the adb driver (BE-0270) — the Android twin of ios-e2e.yml's `conformance
#     (idb + xcuitest)`. It proves the determinism-core invariants (an ambiguous selector fails, a
#     zero-match fails, `capabilities()` matches behavior, condition-backed waits) hold on the real
#     actuator, which smoke/golden/visual cannot cover (they drive unambiguous selectors only). Unlike
#     the other jobs it runs pytest, not the run CLI, so it keeps the dev group.
# It runs no LLM — a deterministic `run` over fixed scenarios — so it stays within the prime
# directives, and it is kept off the fast `make check` gate exactly as the idb and web e2e lanes are.
# The lane now carries a REQUIRED status check like iOS's `E2E`: the `E2E (android)` job below
# `needs` the deterministic host-independent jobs (`smoke`, `conformance`, `network`) and always reports (a
# path-skip is a pass), so it — not the KVM jobs, which are path-gated — is what `main`'s
# branch-protection ruleset pins. `golden` and `visual` are deliberately NOT part of its `needs:`: a
# pixel baseline is host-specific (the x86_64 software renderer varies) and the element-tree golden
# can drift with an upstream dependency, so each stays a per-PR signal that never blocks a merge —
# the same deterministic-and-host-independent boundary iOS's `E2E` already draws. Each job boots its
# own AVD; unlike iOS's metered macOS runners (10x billing), Android runs on standard-priced Linux
# under KVM, so the per-job boot is an acceptable cost for the attribution win. Per-job setup is
# duplicated the same way ios-e2e.yml duplicates its own — no composite action.
#
# The AVD is x86_64 API 34, not the arm64 image the local 2026-07-07 validation used: KVM
# acceleration on the x86_64 GitHub Linux runner needs an x86_64 system image, and a foreign-arch
# (arm64) image would fall back to slow software emulation and time the job out. The API level (34)
# matches the local validation; only the ABI tracks the CI host.
#
# Because `E2E (android)` is a required check, the lane can't be path-gated at the trigger — a
# required check skipped by a `paths:` filter stays pending forever and blocks the merge. So it
# triggers on every PR (and the merge queue) and the `changes` job path-gates the KVM jobs instead,
# running scripts/e2e_changes.py with E2E_LANE=android (the positive-list of adb-relevant paths — the
# adb driver + resident channel, the run pipeline and scenario loader, the `bajutsu run` CLI entry,
# the Android showcase and shared scenarios, the app-side SDKs BajutsuAndroid/BajutsuAndroidUIAutomatorServer,
# the config, and this workflow — unit-tested in tests/test_e2e_changes.py). A new adb-relevant path
# defaults to NOT triggering — add it to that module's `android` fragment.
name: Android E2E (emulator)

on:
  workflow_dispatch:
  # Trigger on every PR so the `E2E (android)` gate job always reports a status (a required check
  # that never runs stays pending and blocks merges). The metered KVM jobs themselves are path-gated
  # by the `changes` job below — a PR that can't affect the adb path skips them and the gate passes.
  pull_request:
  # Also run in the merge queue: `E2E (android)` is a required check, and a required check that never
  # reports on `merge_group` leaves the queue entry pending until it times out.
  merge_group:

permissions:
  contents: read

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether a KVM run is warranted. The emulator jobs only fire when the PR touches what they
  # exercise — the adb driver, the run path, the Android showcase and app SDKs, or this workflow. The
  # decision lives in scripts/e2e_changes.py (E2E_LANE=android) so it is unit-tested — the Android
  # twin of ios-e2e.yml's `changes` job. The `E2E (android)` aggregator always reports, so an
  # unrelated PR is neither run nor blocked.
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so the script's merge-base (three-dot) diff can find the PR's fork point.
          fetch-depth: 0
      - name: Detect relevant paths
        id: filter
        env:
          E2E_LANE: android
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: python3 scripts/e2e_changes.py

  # The functional heart: run the core scenarios through `bajutsu run` over the adb backend, against
  # both Android UI toolkits (Compose full set + Views Stable-tab subset, BE-0221). This is the "does
  # bajutsu drive Android?" check — the Android twin of ios-e2e.yml's `smoke (idb)` and web-e2e.yml's
  # `smoke (playwright)`. Builds both a11y APKs and the resident UI Automator server (BE-0245) so the
  # reads go over the resident channel by default (bajutsu/platform_lifecycle.py).
  smoke:
    name: smoke (adb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # A cold AVD boot + APK builds + the Compose full set and Views subset is ~18min; 30 catches a
    # real hang (a wedged AVD boot or adb) with comfortable headroom.
    timeout-minutes: 30
    # The adb backend is pure subprocess (no Python extra), so the base package suffices; skip the
    # dev group (mypy / pytest / ruff), which the Linux `check` gate owns.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Gradle needs JDK 17 (demos/showcase/android targets jvmTarget 17); pin it explicitly rather
      # than lean on whichever JDK the runner image defaults to.
      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      # Cache the Gradle build across runs (the committed wrapper drives the build; this only warms
      # its caches, so a miss just rebuilds cold and never changes the result).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      # KVM must be world-accessible for the emulator to be hardware-accelerated on the Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install the base package (no dev)
        run: uv sync --no-dev

      # Build both a11y APKs outside the emulator session so the AVD is only alive during the run
      # itself; bajutsu's launch installs each from the config's appPath. Views joins Compose
      # (BE-0221): the Stable-tab subset drives both toolkits, whose ids differ only in `.`/`-` vs
      # `_` — each scenario's selectors list both forms.
      - name: Build the Compose + Views showcase APKs
        run: make -C demos/showcase/android compose-build views-build

      # Build the resident UI Automator server APKs (BE-0245) so the adb backend's reads run over the
      # resident channel by default (bajutsu/platform_lifecycle.py).
      - name: Build the resident UI Automator server APKs
        run: make -C BajutsuAndroidUIAutomatorServer build

      # Cache the AVD system image + snapshot so the boot is warm across runs (the canonical
      # android-emulator-runner recipe): create-and-snapshot on a miss, then reuse it on the run.
      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Pin the device profile so the CI emulator's screen geometry matches the local arm64
          # validation (pixel_6). The deep-scroll scenarios (`notices`, `controls`) reach a far target
          # with a fixed number of screen-fraction swipes, sized for this device — a different default
          # profile scrolls a different number of rows per swipe and never reaches the target (BE-0208).
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # Boot the AVD under KVM and run the core scenarios over the adb backend (the action owns
      # boot + readiness; the default serial `booted` resolves to the one running emulator).
      - name: Run the core scenarios (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6  # match the local validation geometry (see the create-AVD step above)
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-smoke-run
          path: runs/
          if-no-files-found: ignore

  # The BE-0006 element-tree golden: pins the normalized adb accessibility tree for the Stable
  # catalog. Runs the golden over the resident channel (server APKs built below, so it is on by
  # default, BE-0245), then re-runs it with BAJUTSU_ADB_RESIDENT=0 (`e2e-fallback`) so the
  # `uiautomator dump` fallback is exercised too and the golden proves both channels yield the same
  # tree. The Android twin of the idb golden ios-e2e.yml now runs per PR.
  golden:
    name: golden (adb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # The golden reruns the Stable-tab scenario twice (resident + dump) against a booted AVD; ~15min
    # end to end, so 25 catches a real hang with headroom.
    timeout-minutes: 25
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install the base package (no dev)
        run: uv sync --no-dev

      # The golden asserts the Compose a11y tree; the resident server flips reads onto the resident
      # channel by default so the `e2e-golden` step exercises it, and `e2e-fallback` forces it off.
      - name: Build the Compose showcase APK
        run: make -C demos/showcase/android compose-build

      - name: Build the resident UI Automator server APKs
        run: make -C BajutsuAndroidUIAutomatorServer build

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # `e2e-golden` reads over the resident channel (server APKs built above); `e2e-fallback`
      # re-runs the same golden with the channel forced off, so both paths are exercised and the
      # golden proves they yield the same tree.
      - name: Run the element-tree golden over both read channels (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e-golden && make -C demos/showcase/android e2e-fallback

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-golden-run
          path: runs/
          if-no-files-found: ignore

  # On-device network capture (BE-0283): a `request` assertion observes real emulator traffic end to
  # end. The showcase GETs SHOWCASE_API_URL/horses over OkHttp, BajutsuAndroid's interceptor reports
  # the exchange to the host collector, and the runner bridges that collector to the emulator with
  # `adb reverse` (the transport this item delivers). `e2e-network` runs a throwaway host stub the
  # emulator reaches at 10.0.2.2 and points SHOWCASE_API_URL there. Reads are minimal (wait Refresh,
  # tap, wait status), so — like the visual job — the resident server is not built (dump suffices).
  network:
    name: network (adb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # A cold AVD boot + the Compose build + one network scenario is ~12min; 25 catches a real hang.
    timeout-minutes: 25
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install the base package (no dev)
        run: uv sync --no-dev

      # The scenario drives the Compose a11y twin; bajutsu's launch installs it from the config's appPath.
      - name: Build the Compose showcase APK
        run: make -C demos/showcase/android compose-build

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run the network-capture scenario (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e-network

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-network-run
          path: runs/
          if-no-files-found: ignore

  # The driver conformance suite (BE-0114): one backend-agnostic contract, run on-device against the
  # adb driver (BE-0270) — the Android twin of ios-e2e.yml's `conformance (idb + xcuitest)`. It proves
  # the determinism-core invariants (ambiguous selector fails, zero-match fails, capabilities() matches
  # behavior, condition-backed waits) hold on the real actuator, which smoke/golden/visual cannot cover
  # (they drive unambiguous selectors only). `launch_driver` boots the showcase straight into
  # ConformanceScreen and the suite reseeds it over `am start`; the resident server APKs are built so
  # reads run over the resident channel (BE-0245), the adb-specific read path the contract now pins.
  conformance:
    name: conformance (adb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # A cold AVD boot + the Compose + resident-server builds + the contract (a handful of reseeds) is
    # ~15min; 25 catches a real hang (a wedged AVD boot or adb) with headroom.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Unlike the smoke / golden / visual jobs, this one drives the contract through pytest, not the
      # run CLI, so it keeps the dev group (pytest / pytest-xdist / mypy stack). The adb backend itself
      # needs no extra.
      - name: Install the package with the dev group
        run: uv sync

      # `launch_driver` installs the a11y APK from the config's appPath and boots into ConformanceScreen.
      - name: Build the Compose showcase APK
        run: make -C demos/showcase/android compose-build

      # Build the resident UI Automator server APKs (BE-0245) so the reads run over the resident channel
      # by default (bajutsu/platform_lifecycle.py) — the adb-specific read path the contract now pins.
      - name: Build the resident UI Automator server APKs
        run: make -C BajutsuAndroidUIAutomatorServer build

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # `e2e-conformance` runs `adb root` (the MULTI_TOUCH pinch/rotate test needs the rooted
      # `sendevent` sweep, BE-0232) then the `ondevice`-marked contract serially (`-n0`) against the one
      # booted emulator.
      - name: Run the driver conformance contract (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e-conformance

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-conformance-run
          path: runs/
          if-no-files-found: ignore

  # The pixel VRT (BE-0208 unit 4 visual dimension): pixel-compare the Stable catalog against the
  # CI-recorded baseline (demos/showcase/scenarios/visual/baselines_android/). A pixel baseline is
  # host-specific — the CI x86_64 software renderer (swiftshader) and a local arm64 emulator diverge
  # per pixel — so the baseline is recorded on this lane and committed (see that dir's README); this
  # job compares against it. Like ios-e2e.yml's `visual`, this is a signal, not a gate.
  visual:
    name: visual (adb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # A cold AVD boot + the Compose build + one pixel VRT run is ~12min; 25 catches a real hang.
    timeout-minutes: 25
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95  # v5.6.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # The pixel compare needs Pillow (the `visual` extra); the adb backend itself has none. Sync it
      # here (still no dev group) so `make e2e-visual` finds it.
      - name: Install the base package + visual extra (no dev)
        run: uv sync --no-dev --extra visual

      # The VRT drives the Stable launch tab and screenshots it — an element-tree read channel is not
      # asserted, so the resident server is not built here (reads fall back to `uiautomator dump`).
      - name: Build the Compose showcase APK
        run: make -C demos/showcase/android compose-build

      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run the visual regression (VRT, pixel snapshot) (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e-visual

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-visual-run
          path: runs/
          if-no-files-found: ignore

  # Single required status check for the Android lane — the Android twin of ios-e2e.yml's `E2E`.
  # Always runs so it reports even when the KVM jobs are skipped (a PR that can't affect the adb
  # path) — a skipped dependency is a pass; only a real failure or cancellation fails the gate.
  # `network` joins `smoke`/`conformance` in `needs:`: its pass/fail is a deterministic,
  # host-independent fact (was the exchange observed?), so a regression there must fail the required
  # check like the other two — it is path-gated the same way, so a skip is still a pass. `golden` and
  # `visual` remain deliberately excluded (see the header): the element-tree golden can drift with an
  # upstream dependency and a pixel baseline is host-specific, so each stays a per-PR signal. Make
  # `E2E (android)` the required check, not the path-gated KVM jobs.
  #
  # `changes`'s own result is checked too, not just the KVM jobs': `changes` has no `if:`, so it
  # always runs and never reports `skipped` — but if it *fails* (e.g. a misconfigured `E2E_LANE`,
  # `scripts/e2e_changes.py` raising on an unrecognized lane), `smoke`/`conformance` are skipped as a
  # side effect of the failed dependency, not of a genuine path-skip, and a check that only inspected
  # them would read that as a pass — the required gate reporting green having run nothing.
  e2e:
    name: E2E (android)
    needs: [changes, smoke, conformance, network]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        env:
          CHANGES: ${{ needs.changes.result }}
          SMOKE: ${{ needs.smoke.result }}
          CONFORMANCE: ${{ needs.conformance.result }}
          NETWORK: ${{ needs.network.result }}
        run: |
          echo "changes=$CHANGES smoke=$SMOKE conformance=$CONFORMANCE network=$NETWORK"
          for result in "$CHANGES" "$SMOKE" "$CONFORMANCE" "$NETWORK"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "E2E (android) failed"
              exit 1
            fi
          done
          echo "E2E (android) passed (or skipped — no adb-relevant change)"
