# On-device Android e2e (Linux + KVM) — the third backend's lane, the Android twin of the iOS
# `e2e.yml` (macOS / idb) and `web-e2e.yml` (Linux / Playwright). It boots an AVD under KVM on a
# Linux runner and drives the showcase's core id/tap/type/value scenarios over `--backend android`
# (the adb driver, BE-0007), asserting the deterministic pass/fail. The *same* scenario set runs
# against both Android UI toolkits — Compose (dotted SPEC ids verbatim) and Views (`android:id`
# underscore ids) — since each scenario's selectors list both id forms (BE-0221). It runs no LLM — a
# deterministic `run` over fixed scenarios — so it stays within the prime directives, and it is kept
# off the fast `make check` gate exactly as the idb and web e2e lanes are.
#
# The AVD is x86_64 API 34, not the arm64 image the local 2026-07-07 validation used: KVM
# acceleration on the x86_64 GitHub Linux runner needs an x86_64 system image, and a foreign-arch
# (arm64) image would fall back to slow software emulation and time the job out. The API level (34)
# matches the local validation; only the ABI tracks the CI host.
#
# Positive-list path filter (mirrors web-e2e.yml): only the paths this lane exercises — the adb
# driver, the run pipeline and scenario loader, the CLI entry points `bajutsu run` wires through,
# the Android showcase and the shared scenarios, the config, and this workflow. `bajutsu/*.py`
# covers the single-level top-level modules (the adb command layer, the backend registry, and the
# platform lifecycle live there); `bajutsu/drivers/adb.py` is listed on its own because the wildcard
# does not reach into subdirectories. Neither a required check nor gated by the `changes` job, so a
# plain `paths:` filter is enough: an unrelated PR simply doesn't run it. A new adb-relevant path
# defaults to NOT triggering — add it here.
name: Android E2E (emulator)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: &android-paths
      - 'bajutsu/drivers/adb.py'
      - 'bajutsu/runner/**'
      - 'bajutsu/scenario/**'
      - 'bajutsu/orchestrator/**'
      - 'bajutsu/*.py'
      - 'bajutsu/cli/commands/run.py'
      - 'bajutsu/cli/__init__.py'
      - 'bajutsu/cli/_shared.py'
      - 'bajutsu/cli/commands/__init__.py'
      - 'demos/showcase/android/**'
      - 'demos/showcase/scenarios/**'
      - 'demos/showcase/showcase.config.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    paths: *android-paths

permissions:
  contents: read

concurrency:
  group: android-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-e2e:
    name: smoke + golden + visual (adb)
    runs-on: ubuntu-latest
    # Booting an emulator, building both APKs, and running the Stable-tab scenarios against both the
    # Compose and Views toolkits (BE-0221) plus the golden element-tree and pixel-visual checks is
    # ~16min end to end; 35 catches a real hang (a wedged AVD boot or adb) with comfortable headroom.
    timeout-minutes: 35
    # The adb backend is pure subprocess (no Python extra), so the base package suffices; skip the
    # dev group (mypy / pytest / ruff), which the Linux `check` gate owns.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Gradle needs JDK 17 (demos/showcase/android targets jvmTarget 17); pin it explicitly rather
      # than lean on whichever JDK the runner image defaults to.
      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      # Cache the Gradle build across runs (the committed wrapper drives the build; this only warms
      # its caches, so a miss just rebuilds cold and never changes the result).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0

      # KVM must be world-accessible for the emulator to be hardware-accelerated on the Linux runner.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install the base package (no dev)
        run: uv sync --no-dev

      # Build both a11y APKs outside the emulator session so the AVD is only alive during the run
      # itself; bajutsu's launch installs each from the config's appPath. The `make e2e` step below
      # depends on both builds too, but Gradle finds them up to date there, so they are not rebuilt.
      # Views joins Compose here (BE-0221): the same scenario set drives both toolkits, whose ids
      # differ only in `.`/`-` vs `_` — each scenario's selectors list both forms.
      - name: Build the Compose + Views showcase APKs
        run: make -C demos/showcase/android compose-build views-build

      # Cache the AVD system image + snapshot so the boot is warm across runs (the canonical
      # android-emulator-runner recipe): create-and-snapshot on a miss, then reuse it on the run.
      - name: Cache AVD
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-x86_64-pixel6

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Pin the device profile so the CI emulator's screen geometry matches the local arm64
          # validation (pixel_6). The deep-scroll scenarios (`notices`, `controls`) reach a far target
          # with a fixed number of screen-fraction swipes, sized for this device — a different default
          # profile scrolls a different number of rows per swipe and never reaches the target (BE-0208).
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # Boot the AVD under KVM and run the passing scenarios over the adb backend. The action owns
      # boot + readiness; `make -C demos/showcase/android e2e` drives the core scenarios, `e2e-golden`
      # the BE-0006 element-tree golden, and `e2e-visual` the pixel VRT check (both BE-0208 unit 4),
      # all in this one emulator session (default serial `booted` resolves to the one running
      # emulator). The golden's baseline was recorded on a local arm64 emulator; it passes here on
      # x86_64 because the comparison is field-level with a tolerant frame check (identity/label/traits
      # are ABI-stable). The visual baseline, being pixel-exact, is host-specific — it is instead
      # recorded here on this x86_64 lane and committed (see
      # demos/showcase/scenarios/visual/baselines_android/README.md); this step compares against it.
      - name: Run the core scenarios, golden, and visual (adb)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d  # v2.38.0
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6  # match the local validation geometry (see the create-AVD step above)
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -camera-front none
          disable-animations: true
          script: make -C demos/showcase/android e2e && make -C demos/showcase/android e2e-golden && make -C demos/showcase/android e2e-visual

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-e2e-run
          path: runs/
          if-no-files-found: ignore
