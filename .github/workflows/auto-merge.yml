name: Auto-merge (bypass App)

# Enable GitHub's native auto-merge on every PR so it merges automatically
# once branch protection is satisfied (CI green + an approving review).
#
# Identity matters here. Native auto-merge performs the eventual merge as the actor that *enabled*
# it, so enabling with `GITHUB_TOKEN` (github-actions[bot]) makes the merge push a GITHUB_TOKEN event
# — and GitHub suppresses further workflow runs from GITHUB_TOKEN events. That silently starves the
# `push`-triggered `roadmap-id` allocator (BE-0089): a placeholder PR merged by auto-merge never
# fires it. So when the bypass App is configured we enable auto-merge with its installation token
# (an App token is not GITHUB_TOKEN, so its merge push does fire push workflows); otherwise we fall
# back to GITHUB_TOKEN — harmless, because without the App `roadmap-id` is dormant anyway.
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Decide which identity enables auto-merge
        id: gate
        env:
          APP_ID: ${{ secrets.AUTOMATION_BOT_APP_ID }}
          APP_KEY: ${{ secrets.AUTOMATION_BOT_PRIVATE_KEY }}
        run: |
          # Prefer the App only when BOTH halves are present (minting needs both); a half-configured
          # App must not be selected. Mirrors the gate in roadmap-id.yml so the two stay in lockstep.
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AUTOMATION_BOT App not configured — enabling auto-merge with GITHUB_TOKEN. Push-triggered workflows (roadmap-id) will not fire on the auto-merge, but they are dormant without the App anyway (BE-0089)."
          fi

      - name: Mint a short-lived installation token for the bypass App
        if: steps.gate.outputs.use_app == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.AUTOMATION_BOT_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_BOT_PRIVATE_KEY }}

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.gate.outputs.use_app == 'true' && steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --merge "$PR_URL"
