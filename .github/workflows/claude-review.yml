# Advisory PR code review by Claude Code (BE-0203).
#
# This makes Claude Code the automated PR reviewer (replacing GitHub Copilot after a parallel
# migration; see docs/ai-development.md): on every pull request (open and each push) Claude Code
# reviews against *this repository's* contract (.github/claude-review-prompt.md — the three prime
# directives, the docstring standard, the bilingual-docs rule, the BE-ID lifecycle) and posts inline
# line-level comments only — no top-level summary, since a fresh one on every push leaves stale,
# contradictory overviews — via the action's native inline-comment tool (see the claude_args allowlist
# below). To stop it repeating the SAME findings on every push while still missing nothing, each run
# reads the FULL diff (so no changed line goes unreviewed) but is also handed every finding already
# posted on the PR (the "Compute the review inputs" step below) and told never to re-post one — it
# dedupes by suppressing repeats, not by narrowing what it looks at. A genuinely new issue, even on
# code an earlier run overlooked, is still raised. A maintainer or collaborator can also ask for a fresh pass on demand
# by writing `@claude review` on the PR — that on-demand path is gated to trusted actors
# (OWNER / MEMBER / COLLABORATOR), so a comment from anyone else is ignored.
#
# HARD BOUNDARY (prime directive 1): this review is *advisory*. It is deliberately NOT added to
# `main`'s branch-protection `required_status_checks`, and the job's own result is decoupled from
# the findings — a review that *found issues* is a successful review, so the job goes red only on an
# infrastructure failure, never on "the reviewer disliked the code". The deterministic `check` /
# `E2E` gates remain the only merge arbiters; this adds a reviewer, never a judge.
#
# Auth is the vendor-neutral provider BE-0104 selects, picked at run time from the `claude-review`
# Environment (the gate step below): a Claude Code subscription (the `CLAUDE_CODE_OAUTH_TOKEN`
# secret, generated by `claude setup-token`, BE-0163) is preferred when present; otherwise Amazon
# Bedrock, reached by exchanging the workflow's GitHub OIDC token for short-lived AWS credentials
# (the `AWS_BEDROCK_ROLE_ARN` secret, no static key). With neither configured the job is a green
# no-op, so no PR is ever red while a credential is being provisioned. A plain `pull_request` event
# from a fork does not expose secrets by GitHub's design, so auto-review covers same-repo
# `claude/<topic>` / `<user>/<topic>` branches; fork PRs are reviewed on demand by a maintainer. We
# deliberately do NOT use `pull_request_target` (it would run with secrets against untrusted fork
# code).
name: Claude review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Minimum the surface needs: read the diff, post review comments, and mint the OIDC token the
# Bedrock credential exchange requires (unused on the subscription path, harmless there). Nothing
# else.
permissions:
  contents: read
  pull-requests: write
  id-token: write

# A rapid push sequence supersedes a stale review instead of stacking several — but ONLY pushes
# cancel: the group is split by event type, and cancel-in-progress is true only for `pull_request`.
# Otherwise a comment posted mid-review (a bot reply, a reviewer note, even `@claude review` itself)
# would land in the same group and cancel the running auto-review, surfacing a red "cancelled" check.
# So push events supersede each other (per PR), while comment-triggered runs stay independent.
concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # NOTE: this job's name is intentionally NOT listed in main's required_status_checks — the review
  # is advisory and must never gate a merge (prime directive 1). Keep it off that list.
  review:
    name: claude review
    runs-on: ubuntu-latest
    # Fail fast instead of GitHub's 360-minute default: a live review runs in ~7 min, so a run that
    # far exceeds this is a hang (provider outage, runaway tool loop) — cap it rather than tie up a
    # runner and burn Actions minutes for hours.
    timeout-minutes: 20
    # Auto-review on every PR event. The on-demand path (item 4) is additive and hardened against
    # fork-PR secret exposure: a comment event runs only when it is a PR comment, contains the
    # `@claude review` phrase, AND comes from a trusted actor (OWNER/MEMBER/COLLABORATOR). Because
    # `issue_comment` runs with repo secrets even on fork PRs, restricting the association is what
    # stops an untrusted commenter from triggering a credentialed run.
    if: >-
      github.event_name == 'pull_request' ||
      (
        (
          (github.event_name == 'issue_comment' && github.event.issue.pull_request) ||
          github.event_name == 'pull_request_review_comment'
        ) &&
        contains(github.event.comment.body, '@claude review') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    # Scope the review credential to this Environment so an unrelated job can't read it.
    environment: claude-review
    steps:
      - name: Pick the AI provider (or no-op)
        id: gate
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ROLE_ARN: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: |
          # Prefer the Claude Code subscription (OAuth) when its token is present; otherwise use
          # Amazon Bedrock via OIDC. Enable each provider only when ALL of its required inputs are
          # present — Bedrock needs both the role ARN and the model id — so a half-configured
          # Environment stays a dormant no-op rather than running and failing (which would turn the
          # advisory check red on config drift). Same all-or-nothing shape as roadmap-id.yml (BE-0089).
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "provider=oauth" >> "$GITHUB_OUTPUT"
          elif [ -n "$ROLE_ARN" ] && [ -n "$MODEL_ID" ]; then
            echo "provider=bedrock" >> "$GITHUB_OUTPUT"
          else
            echo "provider=none" >> "$GITHUB_OUTPUT"
            if [ -n "$ROLE_ARN" ] && [ -z "$MODEL_ID" ]; then
              echo "::notice::AWS_BEDROCK_ROLE_ARN is set but the BEDROCK_MODEL_ID variable is missing — advisory Claude review is dormant (BE-0203). No-op."
            elif [ -z "$ROLE_ARN" ] && [ -n "$MODEL_ID" ]; then
              echo "::notice::BEDROCK_MODEL_ID is set but the AWS_BEDROCK_ROLE_ARN secret is missing — advisory Claude review is dormant (BE-0203). No-op."
            else
              echo "::notice::Neither CLAUDE_CODE_OAUTH_TOKEN nor AWS_BEDROCK_ROLE_ARN (+ BEDROCK_MODEL_ID) is set — advisory Claude review is dormant (BE-0203). No-op."
            fi
          fi

      # Check out the DEFAULT branch, never the untrusted PR head. This job holds the review
      # credential (OAuth token / Bedrock role) and write scope, so checking out PR-authored code
      # here is the CodeQL "untrusted checkout in a privileged context" / TOCTOU risk (a fork PR
      # could carry a hostile `.github/claude-review-prompt.md` or code). The review never needs the
      # head checked out: it reads the change set with `gh pr diff` (below) and posts via the API.
      # The default branch is the canonical, trusted home of the review contract — the same version
      # for every PR regardless of its target base (and it resolves on comment events too, which
      # carry no PR base in their payload). `persist-credentials: false` keeps the checkout from
      # carrying a usable token.
      - name: Check out the default branch (trusted) for the review contract
        if: steps.gate.outputs.provider != 'none'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      # Compute WHAT the reviewer dedupes against, at the mechanism level — the prompt used to just
      # say "on a re-run, comment only on what the latest push changed", yet the run re-read the whole
      # PR diff (`gh pr diff`) on every push. A non-deterministic reviewer re-reading the full diff
      # each time re-mines unchanged code and dribbles fresh findings, so the review never settles —
      # but narrowing WHAT it reads to only the pushed delta would make it MISS a real problem outside
      # that delta. So keep it reading the full diff (miss nothing) and instead hand it the findings
      # already posted inline, with an instruction never to re-post one — it dedupes by suppressing
      # repeats, not by narrowing its view. Fetching prior findings here is reliable where the
      # prompt's own `gh pr view --comments` is not (that does not return inline review comments
      # reliably), and needs no PR-head checkout, so the "never check out untrusted head" property
      # (above) holds. Runs for every PR event; a comment event falls through to `@claude review`.
      - name: Compute the review inputs (prior findings)
        id: inputs
        if: steps.gate.outputs.provider != 'none' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Every finding already posted inline on this PR, compacted to `path:line — first body line`.
          # The review reads the FULL diff on every run so no changed line ever goes unreviewed (missing
          # a real problem is the failure to avoid); it dedupes by never re-posting a finding on this
          # list, NOT by narrowing what it looks at. Cap generously so a long-running PR's history fits;
          # `printf -v` (not a heredoc, whose column-0 body would close this YAML block scalar) builds
          # the multi-line value.
          PRIOR=$(gh api --paginate "repos/$REPO/pulls/$PR/comments" \
            --jq '.[] | select(.body | startswith("🤖 **Claude Code**")) | "- " + .path + ":" + ((.line // .original_line // 0)|tostring) + " — " + (.body|split("\n")[0])' \
            | head -c 32000 || true)
          if [ -n "$PRIOR" ]; then
            printf -v PRIOR_SECTION '%s\n%s' \
              'The following findings are ALREADY posted as inline comments on this PR. Do NOT repeat, restate, or re-post any of them — match by file and line and by substance, and treat them as settled. Every OTHER real issue you find anywhere in the diff you must still raise, even on code an earlier pass overlooked.' \
              "$PRIOR"
          else
            PRIOR_SECTION=""
          fi

          {
            echo "prior_section<<__BAJUTSU_EOF__"
            printf '%s\n' "$PRIOR_SECTION"
            echo "__BAJUTSU_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Exchange OIDC token for Bedrock AWS credentials
        if: steps.gate.outputs.provider == 'bedrock'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Run the advisory Claude review
        if: steps.gate.outputs.provider != 'none'
        uses: anthropics/claude-code-action@1298632ce7736903d02a1435002705aa2a594a6c  # v1.0.175
        env:
          # Bedrock needs an explicit model id (a Bedrock inference-profile id); set it as the
          # `BEDROCK_MODEL_ID` Environment variable alongside the role ARN — point it at an Opus
          # profile to match the subscription path. Empty on the subscription path, where claude_args
          # pins the model to `opus` instead.
          ANTHROPIC_MODEL: ${{ steps.gate.outputs.provider == 'bedrock' && vars.BEDROCK_MODEL_ID || '' }}
        with:
          # Exactly one provider is active per run: on 'oauth' the token authenticates and
          # use_bedrock is false; on 'bedrock' the token is empty and use_bedrock is true.
          use_bedrock: ${{ steps.gate.outputs.provider == 'bedrock' }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The action rejects any non-human (Bot/App) actor unless it is allow-listed, so PRs opened
          # by our own automation bot (bajutsu-automation-bot — roadmap-refresh, docs-refresh, etc.)
          # would otherwise fail the review with "Workflow initiated by non-human actor". Allow-list
          # exactly that trusted internal bot rather than using '*' (which the action warns can let
          # external Apps invoke it with attacker-controlled prompts on public repos). The match is
          # case-insensitive and strips a trailing `[bot]`, so this covers both actor spellings.
          allowed_bots: "bajutsu-automation-bot"
          # Inline comments post through the action's native tool (the action buffers and posts them);
          # the diff read and discussion read go through the narrowly-scoped `gh pr …` commands. The
          # built-in `/code-review` skill posts via unrestricted `gh` (Bash), which the action sandboxes
          # out — so we grant exactly these tools instead. We deliberately do NOT grant `gh pr comment`:
          # the review posts inline findings only, no top-level summary — a fresh summary on every push
          # leaves stale, contradictory overviews on the PR, so withholding the tool enforces the rule.
          # Run the review on Opus, not the action's default Sonnet: sharper severity triage means
          # fewer low-value nitpicks and higher-quality findings, at ~1.67x the per-token cost. On the
          # subscription (OAuth) path pass the `opus` alias here; on Bedrock the model is the
          # BEDROCK_MODEL_ID inference-profile the org configures (point it at an Opus profile).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*)"
            ${{ steps.gate.outputs.provider == 'oauth' && '--model opus' || '' }}
          # On a PR event, review against the repo-flavored contract and post inline via the native
          # tool. The reviewer reads the FULL diff every run so no changed line is missed; {1} lists
          # the findings already on the PR so it dedupes by not re-posting them, not by narrowing what
          # it looks at. On a comment event the prompt is empty, so the action falls through to its
          # default `@claude` mention handling — the on-demand `@claude review` path.
          prompt: ${{ github.event_name == 'pull_request' && format('Review this pull request (#{0}) as an advisory (non-gating) reviewer. Read the review contract at .github/claude-review-prompt.md and follow it exactly, including its "Identify yourself as Claude Code" rule (prefix every inline comment so the review reads as Claude Code, since it posts under github-actions[bot]). Read the diff with `gh pr diff {0}` and review the ENTIRE diff exhaustively in this single pass — raise every finding at once, and do NOT treat unchanged code as settled just because an earlier run did not flag it; if you find a real issue anywhere in the diff, raise it, so nothing is missed. {1} Post each finding as an inline comment with the mcp__github_inline_comment__create_inline_comment tool, adding a GitHub suggestion block wherever a concrete, mechanical fix fits. Do NOT post any top-level summary comment — post inline findings only, because a fresh summary on every push leaves stale, contradictory overviews on the PR. If nothing warrants a comment, post nothing. This review is advisory only, never a merge gate.', github.event.pull_request.number, steps.inputs.outputs.prior_section) || '' }}
