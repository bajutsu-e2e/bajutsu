name: copilot-review

# Request a GitHub Copilot code review on every PR, so the Copilot reviewer is
# added automatically regardless of who opened it. Requires Copilot code review
# to be enabled for the repository.
on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

concurrency:
  group: copilot-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-copilot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Request a review from Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api --method POST \
            "/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f "reviewers[]=copilot-pull-request-reviewer[bot]"
