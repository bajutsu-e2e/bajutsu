# Real-browser CI for the web (Playwright) backend, on a headless Chromium — two jobs: the demo
# smoke (BE-0041) drives the demo web app end to end, and the driver conformance suite (BE-0114)
# runs the backend-agnostic contract against the real driver. Unlike the iOS E2E (e2e.yml) both run
# on Linux — no Mac, no Simulator — but installing Chromium + running a browser is heavy enough to
# gate. Neither is a required check, so a path filter is enough: they simply don't run on a PR that
# can't affect the web path, and an unrelated PR isn't blocked.
#
# Positive-list filter (mirrors android-e2e.yml and e2e.yml's scripts/e2e_changes.py): only paths
# the web jobs actually exercise. Subdirectories are listed explicitly (runner, scenario, drivers,
# orchestrator for the smoke; serve, templates, serve-ui for the serve-UI dogfood, which drives the
# served SPA); top-level `bajutsu/*.py` modules are allow-listed by name (the run/assert/codegen
# path) rather than swept by a `bajutsu/*.py` wildcard, which also caught the serve/analytics/crawl
# modules (stats, audit, usage*, crawl*, …) that live at the top level but no web job runs. CLI
# commands are limited to the three entry points the smoke invokes, plus the conformance suite's own
# files. A new subpackage, top-level module, or CLI command defaults to NOT triggering this
# workflow — add it here when it becomes web-CI-relevant.
name: Web E2E (Playwright)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: &web-paths
      - 'bajutsu/runner/**'
      - 'bajutsu/scenario/**'
      - 'bajutsu/drivers/**'
      - 'bajutsu/orchestrator/**'
      # Top-level modules the run / codegen / record path imports (allow-listed by name; kept in
      # sync with android-e2e.yml and scripts/e2e_changes.py). Excludes serve/analytics/crawl
      # modules — the serve backend is covered by the 'bajutsu/serve/**' entry below.
      - 'bajutsu/_yaml.py'
      - 'bajutsu/adb.py'
      - 'bajutsu/agent_factory.py'
      - 'bajutsu/agent_protocols.py'
      - 'bajutsu/artifact_perms.py'
      - 'bajutsu/assertions.py'
      - 'bajutsu/backends.py'
      - 'bajutsu/capabilities.py'
      - 'bajutsu/capability_preflight.py'
      - 'bajutsu/codegen.py'
      - 'bajutsu/codegen_common.py'
      - 'bajutsu/codegen_emit.py'
      - 'bajutsu/codegen_playwright.py'
      - 'bajutsu/codegen_uiautomator.py'
      - 'bajutsu/config.py'
      - 'bajutsu/config_source.py'
      - 'bajutsu/crawl.py'
      - 'bajutsu/device_id.py'
      - 'bajutsu/dom.py'
      - 'bajutsu/dotenv.py'
      - 'bajutsu/elements.py'
      - 'bajutsu/evidence.py'
      - 'bajutsu/golden.py'
      - 'bajutsu/handoff.py'
      - 'bajutsu/idb_version.py'
      - 'bajutsu/interp.py'
      - 'bajutsu/intervals.py'
      - 'bajutsu/mailbox.py'
      - 'bajutsu/network.py'
      - 'bajutsu/platform_lifecycle.py'
      - 'bajutsu/record.py'
      - 'bajutsu/redaction.py'
      - 'bajutsu/run_id.py'
      - 'bajutsu/simctl.py'
      - 'bajutsu/totp.py'
      - 'bajutsu/visual.py'
      - 'bajutsu/web_network.py'
      - 'bajutsu/webview.py'
      - 'bajutsu/cli/__init__.py'
      - 'bajutsu/cli/_shared.py'
      - 'bajutsu/cli/commands/__init__.py'
      - 'bajutsu/cli/commands/run.py'
      - 'bajutsu/cli/commands/codegen.py'
      - 'bajutsu/cli/commands/record.py'
      # The serve UI dogfood (BE-0058) drives the served SPA, so it is web-CI-relevant whenever the
      # serve backend or its templates change — not only when the harness itself does.
      - 'bajutsu/serve/**'
      - 'bajutsu/templates/**'
      - 'demos/serve-ui/**'
      - 'demos/web/**'
      - 'tests/driver_conformance.py'
      - 'tests/test_driver_conformance_web.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'Makefile'
      - '.github/workflows/web-e2e.yml'
  pull_request:
    paths: *web-paths

permissions:
  contents: read

concurrency:
  group: web-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-e2e:
    name: smoke (playwright)
    runs-on: ubuntu-latest
    # The web smoke needs only the `web` extra, never the dev group (mypy / pytest / ruff + the
    # gate-only extras). UV_NO_DEV makes every uv call here skip it — both the explicit `uv sync`
    # below and the re-sync inside `make -C demos/web e2e` (web-deps) — so neither re-adds dev.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      # Cache the Chromium binary `playwright install` downloads (~150MB) so it isn't
      # re-fetched every run. Keyed on uv.lock (the pinned Playwright version lives there);
      # the restore-keys fallback warms the cache when uv.lock changes for an unrelated dep —
      # `playwright install` below is idempotent, so a stale browser is simply re-downloaded
      # and the cache only ever skips work, never changes the result.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Web smoke (demos/web)
        run: make -C demos/web e2e

  # The serve Web UI dogfood (BE-0058): the web backend drives Bajutsu's *own* serve SPA through the
  # Tier-A deterministic scenarios. Same shape and same `web` extra as the smoke above — the inner
  # serve it drives is brought up and torn down by the config's launchServer, so no server is
  # hand-started here. Keyless: no ANTHROPIC_API_KEY, no model — pass/fail is the scenarios' machine
  # assertions only.
  serve-ui-dogfood:
    name: dogfood (serve UI)
    runs-on: ubuntu-latest
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Serve UI dogfood (demos/serve-ui)
        run: make -C demos/serve-ui e2e

  # The driver conformance suite (BE-0114) against the real Playwright backend: the same contract
  # `make check` runs on FakeDriver, now driving a headless Chromium so drift in the driver's own
  # query / action code (which bypasses the shared base) is caught. It needs pytest, so — unlike the
  # smoke above — this job installs the dev group alongside the web extra (no UV_NO_DEV here).
  web-conformance:
    name: conformance (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend + test tooling (Playwright + Chromium + pytest)
        run: uv sync --extra web --group dev && uv run --no-sync playwright install --with-deps chromium

      # `-m web` overrides the default `-m 'not web'` (pyproject addopts) so the browser-driven
      # conformance suite — deselected everywhere else — actually runs here. `-n0` overrides the
      # default `-n auto`: the suite shares one module-scoped Chromium, so a single process launches
      # it once, rather than xdist relaunching a browser per worker for these few short tests.
      - name: Driver conformance (Playwright)
        run: uv run --no-sync pytest tests/test_driver_conformance_web.py -m web -n0
