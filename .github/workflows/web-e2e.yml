# Real-browser CI for the web (Playwright) backend, on a headless Chromium — four jobs: the demo
# smoke (BE-0041) drives the demo web app end to end, the serve-UI dogfood (BE-0058) drives Bajutsu's
# own serve SPA, the driver conformance suite (BE-0114) runs the backend-agnostic contract against
# the real driver, and the network smoke (BE-0282) drives the real network path (interception,
# capture, the mocked flag, and redaction of really-captured evidence). Unlike the iOS E2E
# (ios-e2e.yml) all run on Linux — no Mac, no Simulator — but installing Chromium + running a browser
# is heavy enough to gate.
#
# The lane carries a REQUIRED status check like iOS's `E2E`: the `E2E (web)` job below `needs` all
# four stable deterministic host-independent jobs (`smoke (playwright)`, `dogfood (serve UI)`,
# `conformance (playwright)`, `network (playwright)`) and always reports (a path-skip is a pass), so
# it — not the browser jobs, which are path-gated — is what `main`'s branch-protection ruleset pins.
# The web lane has no host-specific pixel VRT or upstream-drift golden, so every job feeds the gate.
# The network job (`network (playwright)`) landed as SIGNAL first (BE-0282) and, having proven stable
# in CI, is now promoted into the aggregator's `needs` — the web twin of android-e2e.yml's already-
# gating `network (adb)`.
#
# Because `E2E (web)` is a required check, the lane can't be path-gated at the trigger — a required
# check skipped by a `paths:` filter stays pending forever and blocks the merge. So it triggers on
# every PR (and the merge queue) and the `changes` job path-gates the browser jobs instead, running
# scripts/e2e_changes.py with E2E_LANE=web (the positive-list of web-relevant paths — the drivers,
# the run pipeline and scenario loader, the run/codegen/record CLI entries, the serve backend and its
# templates for the dogfood, the web + serve-ui demos, the conformance harness, and this workflow —
# unit-tested in tests/test_e2e_changes.py). A new web-CI-relevant path defaults to NOT triggering —
# add it to that module's `web` fragment.
name: Web E2E (Playwright)

on:
  workflow_dispatch:
  # Trigger on every PR so the `E2E (web)` gate job always reports a status (a required check that
  # never runs stays pending and blocks merges). The browser jobs themselves are path-gated by the
  # `changes` job below — a PR that can't affect the web path skips them and the gate passes.
  pull_request:
  # Also run in the merge queue: `E2E (web)` is a required check, and a required check that never
  # reports on `merge_group` leaves the queue entry pending until it times out.
  merge_group:

permissions:
  contents: read

concurrency:
  group: web-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether a browser run is warranted. The Chromium jobs only fire when the PR touches what
  # they exercise — the drivers, the run path, the serve backend and demos, or this workflow. The
  # decision lives in scripts/e2e_changes.py (E2E_LANE=web) so it is unit-tested — the web twin of
  # ios-e2e.yml's `changes` job. The `E2E (web)` aggregator always reports, so an unrelated PR is
  # neither run nor blocked.
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so the script's merge-base (three-dot) diff can find the PR's fork point.
          fetch-depth: 0
      - name: Detect relevant paths
        id: filter
        env:
          E2E_LANE: web
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: python3 scripts/e2e_changes.py

  web-e2e:
    name: smoke (playwright)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    # The web smoke needs only the `web` extra, never the dev group (mypy / pytest / ruff + the
    # gate-only extras). UV_NO_DEV makes every uv call here skip it — both the explicit `uv sync`
    # below and the re-sync inside `make -C demos/web e2e` (web-deps) — so neither re-adds dev.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Cache the Chromium binary `playwright install` downloads (~150MB) so it isn't
      # re-fetched every run. Keyed on uv.lock (the pinned Playwright version lives there);
      # the restore-keys fallback warms the cache when uv.lock changes for an unrelated dep —
      # `playwright install` below is idempotent, so a stale browser is simply re-downloaded
      # and the cache only ever skips work, never changes the result.
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Web smoke (demos/web)
        run: make -C demos/web e2e

  # The serve Web UI dogfood (BE-0058): the web backend drives Bajutsu's *own* serve SPA through the
  # Tier-A deterministic scenarios. Same shape and same `web` extra as the smoke above — the inner
  # serve it drives is brought up and torn down by the config's launchServer, so no server is
  # hand-started here. Keyless: no ANTHROPIC_API_KEY, no model — pass/fail is the scenarios' machine
  # assertions only.
  serve-ui-dogfood:
    name: dogfood (serve UI)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Serve UI dogfood (demos/serve-ui)
        run: make -C demos/serve-ui e2e

  # The driver conformance suite (BE-0114) against the real Playwright backend: the same contract
  # `make check` runs on FakeDriver, now driving a headless Chromium so drift in the driver's own
  # query / action code (which bypasses the shared base) is caught. It needs pytest, so — unlike the
  # smoke above — this job installs the dev group alongside the web extra (no UV_NO_DEV here).
  web-conformance:
    name: conformance (playwright)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend + test tooling (Playwright + Chromium + pytest)
        run: uv sync --extra web --group dev && uv run --no-sync playwright install --with-deps chromium

      # `-m web` overrides the default `-m 'not web'` (pyproject addopts) so the browser-driven
      # conformance suite — deselected everywhere else — actually runs here. `-n0` overrides the
      # default `-n auto`: the suite shares one module-scoped Chromium, so a single process launches
      # it once, rather than xdist relaunching a browser per worker for these few short tests.
      - name: Driver conformance (Playwright)
        run: uv run --no-sync pytest tests/test_driver_conformance_web.py -m web -n0

  # Web network smoke (BE-0282): the one job that drives the real network path — page.route
  # interception, requestfinished capture, the `mocked` provenance flag, and redaction of
  # really-captured evidence — which the demo `smoke` above opts out of with --no-network. It runs
  # the `network`-tagged demos/web scenario WITH network on, then asserts the persisted network.json
  # masks the Sync request's secret (demos/web/network/assert_redaction.py). Keyless — the verdict is
  # the scenario's deterministic `request` assertion plus that check, no model anywhere.
  #
  # This job lands as SIGNAL, not a required check (BE-0282: "land as signal first, promote to
  # required only once it proves stable"): it is deliberately absent from the `E2E (web)`
  # aggregator's `needs` below, so a failure here does not block a merge yet. Same `web` extra and
  # path-gate as the smoke; promote it into the aggregator once it has proven stable.
  #
  # Android has no counterpart: the adb driver declares no NETWORK capability and there is no native
  # network monitor to actuate (observes_network_via_driver is false), so Android network capture is
  # out of scope pending that monitor. The absence is a deliberate boundary, not an oversight — see
  # BE-0282 and docs/architecture.md.
  web-network:
    name: network (playwright)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install the web backend (Playwright + Chromium)
        run: uv sync --extra web && uv run --no-sync playwright install --with-deps chromium

      - name: Web network smoke + redaction check (demos/web)
        run: make -C demos/web e2e-network

  # Single required status check for the web lane — the web twin of ios-e2e.yml's `E2E`. Always runs
  # so it reports even when the browser jobs are skipped (a PR that can't affect the web path) — a
  # skipped dependency is a pass; only a real failure or cancellation fails the gate. The web lane
  # has no host-specific or upstream-drift job to exclude, so all four deterministic jobs feed it
  # (`network (playwright)` was promoted from signal to gate once stable — see above).
  # Make `E2E (web)` the required check, not the path-gated browser jobs.
  #
  # `changes`'s own result is checked too, not just the browser jobs': `changes` has no `if:`, so it
  # always runs and never reports `skipped` — but if it *fails* (e.g. a misconfigured `E2E_LANE`,
  # `scripts/e2e_changes.py` raising on an unrecognized lane), the browser jobs are skipped as a side
  # effect of the failed dependency, not of a genuine path-skip, and a check that only inspected them
  # would read that as a pass — the required gate reporting green having run nothing.
  e2e:
    name: E2E (web)
    needs: [changes, web-e2e, serve-ui-dogfood, web-conformance, web-network]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        env:
          CHANGES: ${{ needs.changes.result }}
          SMOKE: ${{ needs.web-e2e.result }}
          DOGFOOD: ${{ needs.serve-ui-dogfood.result }}
          CONFORMANCE: ${{ needs.web-conformance.result }}
          NETWORK: ${{ needs.web-network.result }}
        run: |
          echo "changes=$CHANGES smoke=$SMOKE dogfood=$DOGFOOD conformance=$CONFORMANCE network=$NETWORK"
          for result in "$CHANGES" "$SMOKE" "$DOGFOOD" "$CONFORMANCE" "$NETWORK"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "E2E (web) failed"
              exit 1
            fi
          done
          echo "E2E (web) passed (or skipped — no web-relevant change)"
