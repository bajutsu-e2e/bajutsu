# Keep the refs/be-claims/* reservation ledger from leaking. A claim earns its keep only while an
# *open* PR holds the id and it is *not yet on main*; once either stops being true the number must be
# freed for allocation. Two triggers:
#   - release: when a roadmap PR closes (merged or not), drop the claims it introduced — merged ids
#     now live on main (the claim is redundant), abandoned ids are freed.
#   - gc: a daily sweep that drops any claim whose id is on main or held by no open PR, catching
#     leaks from a cancelled allocation run.
name: roadmap-claims-gc

on:
  pull_request:
    types: [closed]
    paths:
      - 'roadmaps/**'
  schedule:
    - cron: '47 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write       # to delete refs/be-claims/* refs
  pull-requests: read

jobs:
  release:
    name: release a closed PR's claims
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Release the claims this PR introduced
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ids="$(gh api "repos/{owner}/{repo}/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename' 2>/dev/null \
            | sed -n 's#.*/BE-\([0-9]\{4\}\)-.*#\1#p' | sort -u)"
          if [ -z "$ids" ]; then
            echo "PR #$PR_NUMBER introduced no BE ids; nothing to release."
            exit 0
          fi
          read -ra id_list <<< "$(printf '%s' "$ids" | paste -sd' ' -)"
          for id in "${id_list[@]}"; do
            bash scripts/be_claims.sh release "$id"
          done

  gc:
    name: sweep orphaned claims
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Drop claims that are on main or held by no open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          claimed="$(bash scripts/be_claims.sh list)"
          if [ -z "$claimed" ]; then
            echo "No claims; nothing to sweep."
            exit 0
          fi
          # ids on main (the checked-out tree) and ids any open PR currently holds.
          main_ids="$(find roadmaps/implemented roadmaps/proposals -mindepth 1 -maxdepth 1 \
            -type d -name 'BE-*' 2>/dev/null | sed -n 's#.*/BE-\([0-9]\{4\}\)-.*#\1#p' | sort -u)"
          open_ids="$(bash scripts/open_pr_be_ids.sh '')"   # exclude nothing -> every open PR

          read -ra claim_list <<< "$claimed"
          for id in "${claim_list[@]}"; do
            if printf '%s\n' "$main_ids" | grep -qx "$id"; then
              echo "BE-$id is on main; the claim is redundant."
              bash scripts/be_claims.sh release "$id"
            elif ! printf '%s ' "$open_ids" | grep -qw "$id"; then
              echo "BE-$id is held by no open PR; the claim is orphaned."
              bash scripts/be_claims.sh release "$id"
            fi
          done
