# On-device iOS E2E (macOS + Simulator) — the iOS backend's lane, mirroring android-e2e.yml
# (adb) and web-e2e.yml (Playwright) in scope, but unlike them this lane carries the platform's
# REQUIRED status check: the `E2E` job below always reports (even when the macOS jobs are
# path-gated skipped), so it — not this file's name — is what `main`'s branch-protection ruleset
# pins. Seven jobs, against the showcase suite (BE-0079, the single iOS fixture):
#   - smoke (idb): build the showcase, boot a Simulator, run a scenario through the idb backend
#     (driver + simctl + idb + real actuation) — the functional heart.
#   - actuation (idb): real on-device idb actuation beyond the conformance job's `tap` (BE-0281) —
#     `back` and device control (setLocation / clipboard / push) on the Stable launch tab, the
#     surface idb reaches. Deliberately NOT part of the `E2E` gate's `needs:` (like `golden` /
#     `visual`): new actuation lands as a per-PR signal first (Simulator flakiness, BE-0218) and is
#     promoted to the gate only once stable.
#   - golden (idb): the BE-0006 element-tree golden over idb, the iOS twin of android-e2e.yml's
#     `golden (adb)`. Like `visual`, deliberately NOT part of the `E2E` gate's `needs:` — the tree
#     golden is deterministic, but `idb_companion` upstream drift could redden it independently of
#     any Bajutsu change, so a drift surfaces here as a per-PR signal without blocking a merge.
#   - xcuitest (codegen): generate a native XCUITest from a scenario and run it with
#     xcodebuild — no bajutsu / idb / AI at test time (the codegen output path).
#   - xcuitest (multi-touch): a pinch/rotate scenario through the full `bajutsu run` path on the
#     XCUITest backend (BE-0019) — two-finger gestures idb cannot actuate. Also runs the runner
#     channel's `/type` (search.yaml) and `/swipe` + `/back` (notices.yaml) actuation (BE-0281),
#     tab-crossing scenarios idb cannot reach.
#   - conformance (idb + xcuitest): the driver conformance suite (BE-0114) on-device against both
#     iOS backends.
#   - visual (idb): the iOS twin of android-e2e.yml's `visual` — a pixel VRT of the Stable
#     catalog against the committed `baselines_ios/` baseline. Deliberately NOT part of the `E2E`
#     gate's `needs:` (see that job below) — a pixel baseline is host-specific (the Simulator
#     renderer varies by Xcode / device / OS), so a drift surfaces here as a signal, never
#     blocking a merge, the same rationale android-e2e.yml's `visual` and web-e2e.yml's jobs
#     follow for their own non-required lanes.
# The SwiftUI a11y product is the smoke / golden / codegen / visual subject; the UIKit twin shares
# the identifier contract, so one toolkit suffices for the gate.
# The BE-0006 element-tree goldens live on the showcase
# (demos/showcase/scenarios/golden/, ported in BE-0079's retirement, split by backend in BE-0107).
# The idb golden now runs both per PR (the `golden` job here) and weekly (idb-monitor, against the
# latest idb_companion — a forward-looking check the per-PR job does not replace).
# Runs on every relevant PR and on demand (the Actions tab / `gh workflow run ios-e2e.yml`).
name: iOS E2E (Simulator)

on:
  workflow_dispatch:
  # Trigger on every PR so the `e2e` gate job always reports a status (required checks
  # that never run stay pending and block merges). The metered macOS jobs themselves are
  # path-gated by the `changes` job below — docs-only PRs skip them and the gate passes.
  pull_request:
  # Also run in the merge queue: `E2E` is a required check, and a required check that
  # never reports on `merge_group` leaves the queue entry pending until it times out.
  # The `changes` job uses the merge group's SHAs so path-gating still applies here.
  merge_group:

permissions:
  contents: read

concurrency:
  group: ios-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decide whether an on-device run is warranted. The macOS jobs only fire when the PR
  # touches what they exercise — the app, the SDK, the runtime, the build/deps, or this
  # workflow/action itself. Manual runs (no PR context) always count as relevant. The same
  # decision also gates the `visual` job below (BAJUTSU broader relevance list is a superset of
  # its former standalone path filter, so it never runs less often than before).
  #
  # The decision lives in scripts/e2e_changes.py (the positive-list of on-device-relevant paths,
  # and the merge-base diff that scopes the check to the PR's own changes) so it is unit-tested —
  # tests/test_e2e_changes.py — rather than an untested shell one-liner. Add a new
  # on-device-relevant path to the positive-list there.
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so the script's merge-base (three-dot) diff can find the PR's fork point.
          fetch-depth: 0
      - name: Detect relevant paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: python3 scripts/e2e_changes.py

  smoke:
    name: smoke (idb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/idb would otherwise run to the
    # 6h default. Typical end-to-end is ~10min, so 25 catches a real hang with comfortable headroom.
    timeout-minutes: 25
    # BE-0231 unit 4: a cold-boot CI Simulator sometimes renders the first Stable row later than the
    # shared smoke scenario's 10s first-wait allows — even with unit 2's `readyWhen` gate (which waits
    # up to _await_ready's own 10s for that row). Raise the wait *floor* so the condition wait has the
    # budget to see it: the gate's ~10s plus this 20s ceiling gives the row ~30s from launch, well
    # past the >20s cold-boot render observed on this lane. A condition wait returns the instant the
    # row appears, so a fast render is unaffected — no fixed sleep (prime directive 2), the same knob
    # the Android e2e lane opts into (demos/showcase/android/Makefile). Only a genuine no-show spends
    # the full budget, and it still fails loudly, bounded well under timeout-minutes above.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Skip Homebrew's auto-update (re-fetching every tap on each run costs minutes) and the
      # post-install cleanup; rely on the runner image's pre-installed Homebrew state for xcodegen.
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # Start the boot first so it runs concurrently with the app build below — the first
      # boot of a fresh Simulator costs ~80s and does not depend on the build. `wait: 'false'`
      # returns once the boot is initiated; we block on "booted" (the wait step) right before
      # installing the app.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs, matching
      # the xcuitest job. Keyed on Xcode + the app's Swift sources + project spec; the `-app-` infix
      # keeps this app-scheme cache from colliding with the xcuitest job's UITests-scheme cache that
      # writes the same DerivedData path. restore-keys warm compiled modules on a partial source
      # change; a miss just rebuilds cold, so the cache only ever speeds the build, never its result.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Fetch the idb backend's deps concurrently with the app build: idb_companion (brew, ~20s) and
      # the idb Python extra are both independent of the build, so backgrounding them hides their
      # cost under the ~2.5min build instead of paying it serially before the run. The composite
      # action's idempotent `brew list || install` / `uv sync` then no-op. `wait` surfaces a
      # background failure, and a build failure exits first under `set -e` (run scenarios is skipped).
      - name: Build the showcase app (fetch idb deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb --no-dev &
          sync_pid=$!
          # If the build fails, `set -e` exits the step before the waits; the trap stops the
          # background fetches so they don't keep burning metered minutes or trail confusing logs.
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT  # success: the fetches finished, so don't kill on the normal exit

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run smoke scenarios
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/smoke.yaml
          target: showcase-swiftui
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: smoke-run

  # Real on-device idb actuation beyond the conformance job's `tap` (BE-0281): drives the actuators
  # idb can reach on the Stable launch tab, which the smoke / golden / visual jobs above never tap or
  # otherwise drive the UI (they only `wait`/`expect`). idb collapses the native tab bar into one
  # opaque group and cannot tap any tab (SPEC.md §3, BE-0107), so the tab-crossing gesture / text
  # scenarios stay on XCUITest (the `xcuitest (multi-touch)` job below runs them); this job covers the
  # launch-tab surface idb *does* drive — `back` and device control, unproven on any iOS lane before
  # now:
  #   - navigation.yaml: tap a Stable row → push Horse Detail → `back` (the OS back button). idb `tap`
  #     is already the conformance job's contract, but `back` end-to-end over the idb companion is not.
  #   - device.yaml / push.yaml: `setLocation`, clipboard round-trip, and a simctl `push` — the
  #     device-control family idb advertises via DEVICE_CONTROL_ALL but no iOS lane had exercised it
  #     (only Android proved any device control on a real device, BE-0210). All three run on the
  #     launch tab.
  # Deliberately NOT in the `E2E` gate's `needs:` below (like `golden` / `visual`): the Simulator lane
  # has a flakiness history (BE-0218), so new actuation lands as a per-PR signal first and is promoted
  # to the gate only once it proves stable. One build serves all three scenarios (cost discipline: the
  # macOS runner bills at 10x) — split the interaction and device-control halves into their own jobs
  # if one is promoted to the gate ahead of the other.
  actuation:
    name: actuation (idb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/idb would otherwise run to the 6h
    # default. Build + three short scenario runs is ~12min, so 25 catches a real hang with headroom.
    timeout-minutes: 25
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # navigation/device/push's own 10s first-wait — the same knob the `smoke` job above and the Android
    # lane use. A condition wait returns the instant the row appears, so this is a ceiling, not a sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # Start the boot first so it runs concurrently with the app build below (a fresh boot is ~80s
      # and does not depend on the build). `wait: 'false'` returns once boot is initiated; the wait
      # step blocks on "booted" right before installing the app.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs, sharing
      # the `-app-` scheme cache the smoke / golden / visual jobs use. A miss just rebuilds cold.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Fetch the idb backend's deps concurrently with the app build (both independent of it). A
      # build failure exits first under `set -e`; the trap stops the background fetches.
      - name: Build the showcase app (fetch idb deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb --no-dev &
          sync_pid=$!
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      # Interaction (BE-0281): idb `tap` + `back` end-to-end, on the Stable launch tab so no tab tap
      # idb cannot perform is needed.
      # continue-on-error: the three scenarios below are independent and unrelated, bundled into one
      # job purely for cost reasons (see the job header comment) — a normal step failure would skip
      # every step after it, hiding the other two scenarios' pass/fail signal and artifacts even
      # though they have nothing to do with the failure. The "Report actuation results" step below
      # turns any step failure back into a job failure once all three have had a chance to run.
      - name: Run the navigation scenario (idb — tap + back)
        id: navigation
        continue-on-error: true
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/navigation.yaml
          target: showcase-swiftui
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: actuation-navigation-run

      # Device control (BE-0281): `setLocation` + clipboard round-trip. simctl-backed, on the launch
      # tab. The iOS twin of android-e2e.yml's device-control coverage (BE-0210).
      - name: Run the device-control scenario (idb — setLocation + clipboard)
        id: device
        continue-on-error: true
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/device.yaml
          target: showcase-swiftui
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: actuation-device-run

      # Device control (BE-0281): a simctl `push` delivery — iOS-only (no faithful Android-emulator
      # equivalent, so it lives apart from the cross-backend device.yaml, see push.yaml's header).
      - name: Run the push scenario (idb — push notification)
        id: push
        continue-on-error: true
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/push.yaml
          target: showcase-swiftui
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: actuation-push-run

      # Re-fail the job if any of the three continue-on-error steps above failed — they need to run
      # independently of each other, but the job as a whole must still redden so the signal isn't lost.
      - name: Report actuation results
        if: always()
        run: |
          echo "navigation: ${{ steps.navigation.outcome }}"
          echo "device:     ${{ steps.device.outcome }}"
          echo "push:       ${{ steps.push.outcome }}"
          if [ "${{ steps.navigation.outcome }}" = "failure" ] || \
             [ "${{ steps.device.outcome }}" = "failure" ] || \
             [ "${{ steps.push.outcome }}" = "failure" ]; then
            echo "::error::at least one actuation scenario failed — see the step outcomes above"
            exit 1
          fi

  # The BE-0006 element-tree golden over idb: pins the normalized accessibility tree for the Stable
  # catalog's list rows, reached on the launch tab so idb needs no tab navigation. Runs the same
  # golden.yaml the weekly idb-monitor runs, now also per PR — the iOS twin of android-e2e.yml's
  # `golden (adb)` job. Deliberately NOT in the `e2e` gate's `needs:` (like `visual`): the tree
  # golden is deterministic and host-independent, but `idb_companion` is an upstream dependency whose
  # drift could redden it independently of any Bajutsu change, so a golden drift surfaces here as a
  # per-PR signal without blocking merges. The weekly idb-monitor golden stays — its purpose is
  # forward-looking (running against the latest idb_companion), which this per-PR job does not
  # replace. The Log-tab control golden lives in golden_xcuitest.yaml (BE-0107); idb cannot tap to
  # the Log tab, so only the launch-tab golden.yaml runs on idb here.
  golden:
    name: golden (idb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # A cold Xcode build (~2.5min) + a fresh Simulator boot (~80s) + the golden run is well under
    # this; 25 catches a hung Simulator/idb on the metered macOS runner with comfortable headroom.
    timeout-minutes: 25
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # the scenario's own 10s first-wait — the same knob the `smoke` job above and the Android lane use.
    # A condition wait returns the instant the row appears, so this is a ceiling, not a fixed sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # Start the boot first so it runs concurrently with the app build below (a fresh boot is ~80s
      # and does not depend on the build). `wait: 'false'` returns once boot is initiated; the wait
      # step blocks on "booted" right before installing the app.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs, sharing
      # the `-app-` scheme cache the smoke / visual jobs use. A miss just rebuilds cold.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Fetch the idb backend's deps concurrently with the app build (both independent of it). A
      # build failure exits first under `set -e`; the trap stops the background fetches.
      - name: Build the showcase app (fetch idb deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb --no-dev &
          sync_pid=$!
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      # Runs golden.yaml over idb; the scenario compares against its default goldens/ baseline (the
      # idb tree), a field-level tolerant compare (bajutsu/golden.py) that is ABI-stable.
      - name: Run golden scenarios (BE-0006)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/golden/golden.yaml
          target: showcase-swiftui
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: ios-golden-run

  # The codegen output path: a scenario -> native XCUITest, compiled and run by xcodebuild
  # with no bajutsu / idb / AI at test time. This is the claim M3 makes about codegen, so CI
  # has to exercise the generated Swift natively (not just the idb runtime above). It runs
  # against the SwiftUI a11y app, whose identifiers the generated test queries by name.
  xcuitest:
    name: xcuitest (codegen)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/xcodebuild would otherwise run to
    # the 6h default. Typical end-to-end is ~10min, so 25 catches a real hang with comfortable headroom.
    timeout-minutes: 25
    # `make ui-test` runs `uv run bajutsu codegen`, whose auto-sync would otherwise pull the dev
    # group (mypy / pytest / ruff + the gate-only extras). Codegen needs only the base package, so
    # skip dev for every uv invocation in this job — the Linux `check` gate owns that tooling.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # Skip Homebrew's auto-update (re-fetching every tap on each run costs minutes) and the
      # post-install cleanup; rely on the runner image's pre-installed Homebrew state for xcodegen.
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache xcodebuild DerivedData so the UITest build is incremental across runs. Keyed on the
      # Xcode version + Swift sources + project spec; the restore-keys fallback warms the cache
      # (compiled modules) when only sources change, scoped to the same Xcode, and a miss simply
      # rebuilds cold — so the cache only ever speeds the build, never changes its result.
      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Start the boot before the codegen build so the ~80s first boot overlaps with it.
      # `wait: 'false'` returns once the boot is initiated; no explicit wait is needed because
      # `xcodebuild test` blocks on the destination becoming ready when it reaches the test
      # phase, by which point the boot has finished.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # `make -C demos/showcase ui-test` re-generates ComponentsUITests.swift from the scenario,
      # regenerates the project, then `xcodebuild test`s it against the SwiftUI a11y app — no
      # bajutsu / idb / AI at test time.
      - name: Codegen + run native XCUITest
        run: make -C demos/showcase ui-test SIM=${{ steps.sim.outputs.udid }}

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: xcuitest-result
          path: demos/showcase/ios/swiftui/build/dd/Logs/Test/*.xcresult
          if-no-files-found: ignore

  # A pinch/rotate scenario run through the full `bajutsu run` path on the XCUITest backend
  # (BE-0019): two-finger gestures idb cannot actuate — idb is single-touch and raises
  # UnsupportedAction. This exercises the actuator end to end (resident runner, /gesture endpoint,
  # snapshot-handle addressing) via the run loop, not just the driver contract the conformance job
  # runs. The idb graceful-degradation fallback is not re-proved on-device here: the registry's
  # select-and-fall-through is covered deterministically by the fast-gate unit tests (an injected
  # availability fn), and the idb actuation path by the `smoke (idb)` job above — a macOS runner
  # always has xcodebuild, so xcuitest never actually degrades to idb here to observe.
  #
  # Also runs the deterministic scenario from `permission.yaml` (BE-0276) and the runner-channel
  # actuation scenarios search.yaml + notices.yaml (BE-0281): each taps a tab-bar item idb can never
  # resolve (see docs/showcase.md), so all need the same forced-XCUITest treatment as the multi-touch
  # scenario above — this job's Simulator/app/runner build already pays for that, so each is one extra
  # `bajutsu run` rather than a whole new job. search.yaml exercises the `/type` endpoint and
  # notices.yaml the `/swipe` + `/back` endpoints of the resident runner — the actuators on-device CI
  # reached only for tap / pinch / rotate before BE-0281. Finally, two smoke runs prove the
  # bundled-runner path (BE-0292): the same resident runner resolved from the wheel bundle rather than
  # a config `testRunner`, against both the SwiftUI and UIKit a11y apps (the runner is app-agnostic,
  # BE-0019), showing a Simulator run needs no runner-build and no runner path. Retains the job's
  # original name (`xcuitest (multi-touch)` is a branch-protection required check) even though it now
  # covers more than the multi-touch scenario. Unlike the `actuation` job above, these steps don't get
  # `continue-on-error` + a summary step: this job feeds the required `E2E` gate, so an early failure
  # correctly stops the job rather than trading gate strictness for per-scenario signal the way the
  # non-gating `actuation` job does.
  xcuitest-gestures:
    name: xcuitest (multi-touch)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/runner would otherwise run to the
    # 6h default. Build + the gesture, permission, search, and notices scenario runs (BE-0281 added
    # the latter two), plus the UIKit build and the two bundled-runner smoke runs (BE-0292), is
    # ~27min, so 35 catches a real hang while keeping a comfortable buffer.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs, matching
      # the xcuitest job. Keyed on Xcode + the app's Swift sources + project spec; the `-app-` infix
      # keeps this app-scheme cache from colliding with the xcuitest job's UITests-scheme cache that
      # writes the same DerivedData path. restore-keys warm compiled modules on a partial source
      # change; a miss just rebuilds cold, so the cache only ever speeds the build, never its result.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # The resident XCUITest runner builds into its own DerivedData dir; cache it separately
      # (keyed on the runner's Swift sources + project spec) so `runner-build` is incremental too.
      - name: Cache DerivedData (runner)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: BajutsuKit/Runner/build/dd
          key: xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'BajutsuKit/Runner/project.yml') }}
          restore-keys: |
            xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # The UIKit twin builds into its own DerivedData dir; cache it separately (keyed on the UIKit
      # app's Swift sources + project spec) so the bundled-runner smoke run below (BE-0292) reuses an
      # incremental build. This app is otherwise built only by the non-gating idb jobs on SwiftUI, so
      # its cache never collides with the `-app-` SwiftUI cache above.
      - name: Cache DerivedData (uikit)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/uikit/build/dd
          key: xcode-dd-uikit-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/uikit/**/*.swift', 'demos/showcase/ios/uikit/**/project.yml') }}
          restore-keys: |
            xcode-dd-uikit-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Build the a11y apps (SwiftUI + UIKit) and stage the resident XCUITest runner; fetch idb's deps
      # concurrently so the bajutsu-e2e action's idb_companion install / uv sync no-op. The trap stops
      # the background fetches if a build fails first (mirrors the smoke / conformance jobs).
      # `make runner-bundle` (BE-0292) builds the runner (its own `runner-build` step) AND stages it
      # into bajutsu/_xcuitest_runner/, so it serves both the testRunner-based scenarios (which read
      # the built .xctestrun) and the bundled-runner smoke runs below (which resolve to the staged copy
      # with no testRunner path) — no separate runner-build line needed.
      - name: Build the apps, build + bundle the runner (fetch idb deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb --no-dev &
          sync_pid=$!
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          make -C demos/showcase uikit-build
          make runner-bundle
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Install the apps
        run: |
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"
          xcrun simctl install "${{ steps.sim.outputs.udid }}" "demos/showcase/ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKit.app"

      - name: Run the multi-touch scenario (xcuitest)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/gestures_multitouch.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-gestures-run

      # The `permissions` field (BE-0276) on-device: reached via the same Simulator/app/runner this
      # job already built for the multi-touch scenario above, so it costs one more `bajutsu run`
      # rather than a whole new job. Forced onto XCUITest, like the multi-touch scenario, because
      # `permission.yaml` taps the "Permissions" tab bar item — idb collapses the tab bar into one
      # opaque group and can never resolve that tap (docs/showcase.md), regardless of backend cost
      # order. `--exclude ai` drops the file's notification scenario (its iOS grant path needs the
      # vision `dismissAlerts` guard, so it stays out of this deterministic gate — prime directive
      # 1) and keeps only `location`, which `simctl privacy grant` pre-grants before launch with no
      # prompt. android-e2e.yml's `smoke (adb)` job already runs both scenarios in permission.yaml
      # unchanged (adb's tab bar has no such limitation), so this is the iOS twin of that coverage.
      - name: Run the permission scenario (xcuitest)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/permission.yaml
          exclude: ai
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-permission-run

      # XCUITest actuation on the runner channel (BE-0281): the `/type`, `/swipe`, and `/back`
      # endpoints of the resident BajutsuRunner, which on-device CI reached only for tap / pinch /
      # rotate before now. Both scenarios open with a tab tap idb cannot resolve (they filter the
      # Search list / walk the Notices list, screens behind the native tab bar), so they belong on
      # XCUITest — reached via this job's already-built runner and app for one more `bajutsu run`
      # each, the same cost-sharing the permission scenario above uses rather than a whole new job.
      #   - search.yaml: `/type` into the Search field, then assert the filtered count.
      #   - notices.yaml: `/swipe` to walk an off-screen row into view, then `/back` from
      #     the pushed Notice Detail. The Notices List is XCUITest's reliable scroll surface (the Log
      #     Form's deep rows are not, see gestures_multitouch.yaml's header).
      - name: Run the search scenario (xcuitest — /type)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/search.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-search-run

      - name: Run the notices scenario (xcuitest — /swipe + /back)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/notices.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-notices-run

      # The bundled-runner path (BE-0292): the same resident runner, but resolved from the wheel
      # bundle instead of a config `testRunner`. Uses showcase.bundled-runner.config.yaml, whose
      # targets carry no `xcuitest` block, so with the runner staged into bajutsu/_xcuitest_runner/ by
      # `make runner-bundle` above, resolution falls through to the bundled runner and materializes it
      # into the cache — proving a Simulator run needs no runner-build and no runner path. smoke.yaml
      # runs identically on every target (it only asserts the fixed Stable catalog), so it is the
      # steadiest proof; running it on both toolkits shows the one app-agnostic bundled runner (BE-0019)
      # drives SwiftUI and UIKit alike. Forced onto XCUITest since the bundled runner is the point.
      - name: Run smoke on the bundled runner (xcuitest — SwiftUI, no testRunner)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/smoke.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.bundled-runner.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-bundled-swiftui-run

      - name: Run smoke on the bundled runner (xcuitest — UIKit, no testRunner)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/smoke.yaml
          target: showcase-uikit
          backend: xcuitest
          config: demos/showcase/showcase.bundled-runner.config.yaml
          udid: ${{ steps.sim.outputs.udid }}
          artifact-name: xcuitest-bundled-uikit-run

  # The driver conformance suite (BE-0114): one backend-agnostic contract, run on-device against
  # BOTH iOS backends — idb (idb_companion) and XCUITest (the resident BajutsuRunner). It proves
  # the determinism-core invariants (ambiguous selector fails, zero-match fails, capabilities()
  # matches behavior, condition-backed waits) hold identically on the real actuators, not just
  # FakeDriver (fast gate) and Playwright (web CI). `launch_driver` brings each backend up itself,
  # so this job only needs the app + runner built and a booted Simulator; the `ondevice` pytest
  # marker (deselected by the gate's default) means the same contract file runs here unchanged.
  conformance:
    name: conformance (idb + xcuitest)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/runner would otherwise run to the
    # 6h default. Two backends end-to-end is ~12min, so 25 catches a real hang with headroom.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"

      # The DerivedData cache must not cross Xcode upgrades: a different Xcode's compiled modules
      # cause stale-artifact build failures. Capture the active Xcode build version for the cache key.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs, matching
      # the xcuitest job. Keyed on Xcode + the app's Swift sources + project spec; the `-app-` infix
      # keeps this app-scheme cache from colliding with the xcuitest job's UITests-scheme cache that
      # writes the same DerivedData path. restore-keys warm compiled modules on a partial source
      # change; a miss just rebuilds cold, so the cache only ever speeds the build, never its result.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # The resident XCUITest runner builds into its own DerivedData dir; cache it separately
      # (keyed on the runner's Swift sources + project spec) so `runner-build` is incremental too.
      - name: Cache DerivedData (runner)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: BajutsuKit/Runner/build/dd
          key: xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'BajutsuKit/Runner/project.yml') }}
          restore-keys: |
            xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Build the a11y app AND the resident XCUITest runner; fetch idb's deps concurrently. Unlike
      # the smoke job, the venv here keeps the dev group (pytest) — this job runs the suite through
      # pytest, not the codegen CLI. The trap stops the background fetches if a build fails first.
      - name: Build the app + runner (fetch idb deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb &
          sync_pid=$!
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          make -C demos/showcase runner-build
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      # `launch_driver` erases/installs/launches per backend, so no explicit install here. `-m
      # ondevice` overrides the repo default (`-m 'not web and not ondevice'`) to select exactly the
      # on-device suite; BAJUTSU_CONFORMANCE_UDID both routes the backends and un-skips the module.
      # `-n0` overrides the default `-n auto`: the suite reseeds one shared Simulator via a single
      # spec file the app polls, so parallel workers would clobber each other's screen — run serially.
      - name: Run the conformance suite (idb + xcuitest)
        env:
          BAJUTSU_CONFORMANCE_UDID: ${{ steps.sim.outputs.udid }}
        run: uv run pytest tests/test_driver_conformance_ondevice.py -m ondevice -n0 -v

  # On-device iOS visual-regression (VRT): the iOS twin of android-e2e.yml's `e2e-visual`. Boots a
  # Simulator, builds the SwiftUI showcase, and runs the committed pixel VRT
  # (`make -C demos/showcase e2e-visual`) over the idb backend, comparing the Stable catalog against
  # the committed baselines_ios/ baseline. Deterministic (a pixel compare, no LLM), so it stays
  # within the prime directives.
  #
  # Gated by the same `changes` job as the functional jobs above, but deliberately NOT part of the
  # `e2e` gate's `needs:` below: a pixel baseline is host-specific — the Simulator renderer varies
  # by Xcode / device / OS — so a drift should surface as a signal on its own job, not block PRs on
  # the required check. On a drift the captured screenshot is uploaded to re-record the baseline
  # from (see demos/showcase/scenarios/visual/baselines_ios/README.md), the same bootstrap the
  # Android baseline used.
  visual:
    name: visual (idb)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # A cold Xcode build (~2.5min) + a fresh Simulator boot (~80s) + the VRT run is well under this;
    # 25 catches a hung Simulator/idb on the metered macOS runner with comfortable headroom.
    timeout-minutes: 25
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # the scenario's own 10s first-wait — the same knob the `smoke` job above and the Android lane use.
    # A condition wait returns the instant the row appears, so this is a ceiling, not a fixed sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90  # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # xcodegen generates the showcase Xcode project for `swiftui-build`; rely on the runner image's
      # pre-installed Homebrew state and skip auto-update / cleanup (each costs minutes per run).
      - name: Install xcodegen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: brew install xcodegen

      # Start the boot first so it runs concurrently with the app build below (a fresh boot is ~80s
      # and does not depend on the build). `wait: 'false'` returns once boot is initiated; the wait
      # step blocks on "booted" right before the run.
      - name: Boot a Simulator
        id: sim
        uses: ./.github/actions/boot-simulator
        with:
          wait: "false"
          # Pin the exact model the committed baseline was recorded on (see baselines_ios/README.md),
          # the iOS twin of android-e2e.yml's `profile: pixel_6`. Unpinned, boot-simulator takes
          # whichever iPhone the runner's Xcode ships first — a resolution change would drift this
          # pixel VRT for reasons unrelated to any UI change. A model missing from the runner fails
          # loudly rather than silently drifting.
          device-type: iPhone 17

      # The DerivedData cache must not cross Xcode upgrades (a different Xcode's compiled modules cause
      # stale-artifact build failures), so key it on the active Xcode build version.
      - name: Resolve Xcode version (for the cache key)
        id: xcode
        run: echo "ver=$(xcodebuild -version | tr '\n ' '--')" >> "$GITHUB_OUTPUT"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs (matches
      # the `smoke` job above). A miss just rebuilds cold, so the cache only ever speeds the build.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.xcode.outputs.ver }}-

      # Fetch the idb backend's deps concurrently with the app build (both independent of it): the
      # idb_companion brew formula and the idb + visual Python extras. The `make e2e-visual` step then
      # finds the build up to date and the extras synced. A build failure exits first under `set -e`;
      # the trap stops the background fetches so they don't trail on a metered runner.
      - name: Build the showcase app (fetch idb + visual deps concurrently)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          brew list facebook/fb/idb-companion >/dev/null 2>&1 || brew install facebook/fb/idb-companion &
          brew_pid=$!
          uv sync --extra idb --extra visual --no-dev &
          sync_pid=$!
          trap 'kill "$brew_pid" "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          wait "$brew_pid"
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      # Run the committed pixel VRT over idb. `make e2e-visual` (demos/showcase/Makefile) installs the
      # freshly-built app, drives the Stable catalog on the launch tab (no XCUITest tab navigation),
      # and pixel-compares it against baselines_ios/stable.png with the status bar + tab bar masked.
      - name: Run the visual regression (VRT, pixel snapshot)
        run: make -C demos/showcase e2e-visual SIM=${{ steps.sim.outputs.udid }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ios-e2e-visual-run
          path: runs/
          if-no-files-found: ignore

  # Single required status check for E2E. Always runs so it reports even when the macOS
  # jobs are skipped (docs-only PRs) — a skipped dependency is a pass; only a real
  # failure or cancellation fails the gate. `actuation`, `golden`, and `visual` are deliberately
  # excluded from `needs:` (see each job's comment) so newly-wired idb actuation (BE-0281), a
  # host-specific pixel drift, or an idb_companion upstream drift never blocks a merge. Make `E2E`
  # the required check, not the path-gated macOS jobs.
  e2e:
    name: E2E (iOS)
    needs: [changes, smoke, xcuitest, xcuitest-gestures, conformance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        env:
          SMOKE: ${{ needs.smoke.result }}
          XCUITEST: ${{ needs.xcuitest.result }}
          GESTURES: ${{ needs.xcuitest-gestures.result }}
          CONFORMANCE: ${{ needs.conformance.result }}
        run: |
          echo "smoke=$SMOKE xcuitest=$XCUITEST gestures=$GESTURES conformance=$CONFORMANCE"
          for result in "$SMOKE" "$XCUITEST" "$GESTURES" "$CONFORMANCE"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "E2E failed"
              exit 1
            fi
          done
          echo "E2E passed (or skipped — no on-device change)"
