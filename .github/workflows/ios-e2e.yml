# On-device iOS E2E (macOS + Simulator) — the iOS backend's lane, mirroring android-e2e.yml
# (adb) and web-e2e.yml (Playwright) in scope, but unlike them this lane carries the platform's
# REQUIRED status check: the `E2E` job below always reports (even when the macOS jobs are
# path-gated skipped), so it — not this file's name — is what `main`'s branch-protection ruleset
# pins. All on the XCUITest backend (the resident BajutsuRunner), against the showcase suite
# (BE-0079, the single iOS fixture).
#
# Build once, fan out. The showcase apps (SwiftUI + UIKit) and the resident XCUITest runner are
# host-independent build products, and every functional job installs the SAME ones. Compiling them
# per job rebuilt the app + runner on nearly every macOS job — 10x-billed runners — and rolled the
# cold-build flake dice as many times; instead a single `build` job compiles them once and uploads
# them as one artifact, and each consumer downloads + installs rather than building. This collapses
# ~8 redundant Swift builds to one, so the consumer jobs are just boot + install + run and clear the
# scarce macOS-runner queue faster. Two jobs stay self-contained because their `make` targets build
# a product the shared artifact does not carry:
#   - codegen builds and runs the *UITests scheme* via `xcodebuild test` — a different product than
#     the resident runner the others share (the codegen output path: scenario -> native XCUITest).
#   - visual runs `make e2e-visual`, whose `swiftui-build` prerequisite would rebuild anyway, and it
#     pins a geometry-specific Simulator; keeping it self-contained avoids reshaping the Makefile.
#
# The jobs, all on the XCUITest backend:
#   - smoke (xcuitest): run a scenario through the XCUITest backend (driver + simctl + the resident
#     runner + real actuation) — the functional heart.
#   - actuation (xcuitest): real on-device XCUITest actuation beyond the conformance job's `tap`
#     (BE-0281) — `back` and device control (setLocation / clipboard / push) on the Stable launch
#     tab. Deliberately NOT part of the `E2E` gate's `needs:` (like `golden` / `visual`): new
#     actuation lands as a per-PR signal first (Simulator flakiness, BE-0218) and is promoted to
#     the gate only once stable.
#   - golden (xcuitest): the BE-0006 element-tree golden over XCUITest, the iOS twin of
#     android-e2e.yml's `golden (adb)`. Like `visual`, deliberately NOT part of the `E2E` gate's
#     `needs:` — the tree golden is deterministic and host-independent, so a drift surfaces here as
#     a per-PR signal without blocking a merge.
#   - codegen (xcuitest): generate a native XCUITest from a scenario and run it with
#     xcodebuild — no bajutsu / AI at test time (the codegen output path). Its required step
#     compiles components.yaml; a trailing non-gating step (BE-0297) also compiles the wider DSL
#     surface (text-editing / gestures / multi-touch / coordinate-swipe / drag / compound selectors)
#     reusing scenarios already proven on-device, promoted into the gate once the slice is stable.
#   - gestures (xcuitest): a pinch/rotate scenario through the full `bajutsu run` path on the
#     XCUITest backend (BE-0019) — two-finger gestures, the one class of actuation the retired idb
#     backend could not drive.
#   - permission (xcuitest): the deterministic `permissions` field (BE-0276) — location, which
#     `simctl privacy grant` pre-grants before launch with no prompt — and the `handleSystemAlert`
#     step (BE-0316), which taps the SpringBoard notification-permission prompt's "Allow" button by
#     a native accessibility query. Both need the forced-XCUITest treatment a coordinate backend
#     can never resolve (tapping the tab bar item behind it, see docs/showcase.md).
#   - runner-actuation (xcuitest): the resident runner channel's actuation beyond tap / pinch /
#     rotate (BE-0281) — `/type` (search.yaml) and `/swipe` + `/back` (notices.yaml),
#     tab-crossing scenarios.
#   - bundled-runner (xcuitest): the bundled-runner path (BE-0292) — the same resident runner
#     resolved from the wheel bundle rather than a config `testRunner`, against both the SwiftUI
#     and UIKit a11y apps (the runner is app-agnostic, BE-0019), proving a Simulator run needs no
#     runner-build and no runner path. The `build` job stages the bundle (`make runner-bundle`).
#   - conformance (xcuitest): the driver conformance suite (BE-0114) on-device against the XCUITest
#     backend.
#   - visual (xcuitest): the iOS twin of android-e2e.yml's `visual` — a pixel VRT of the Stable
#     catalog against the committed `baselines_ios/` baseline. Deliberately NOT part of the `E2E`
#     gate's `needs:` (see that job below) — a pixel baseline is host-specific (the Simulator
#     renderer varies by Xcode / device / OS), so a drift surfaces here as a signal, never
#     blocking a merge, the same rationale android-e2e.yml's `visual` and web-e2e.yml's jobs
#     follow for their own non-required lanes.
# The SwiftUI a11y product is the smoke / golden / codegen / visual subject; the UIKit twin shares
# the identifier contract, so one toolkit suffices for the gate (bundled-runner is the exception —
# it deliberately runs both toolkits to prove the runner is app-agnostic).
# The BE-0006 element-tree goldens live on the showcase
# (demos/showcase/scenarios/golden/, ported in BE-0079's retirement).
# Runs on every relevant PR and on demand (the Actions tab / `gh workflow run ios-e2e.yml`).
name: iOS E2E (Simulator)

on:
  workflow_dispatch:
  # Trigger on every PR so the `e2e` gate job always reports a status (required checks
  # that never run stay pending and block merges). The metered macOS jobs themselves are
  # path-gated by the `changes` job below — docs-only PRs skip them and the gate passes.
  pull_request:
  # Also run in the merge queue: `E2E` is a required check, and a required check that
  # never reports on `merge_group` leaves the queue entry pending until it times out.
  # The `changes` job uses the merge group's SHAs so path-gating still applies here.
  merge_group:

permissions:
  contents: read

concurrency:
  group: ios-e2e-${{ github.ref }}
  cancel-in-progress: true

# Capture the XCUITest runner subprocess's stdout/stderr (folded together) on every on-device job.
# Without it the runner's output goes to DEVNULL, so a startup timeout ("xcuitest runner did not come
# up within Ns") is undiagnosable — we can't tell a crash from a hang from a slow XCTest host, and a
# *mid-run* runner crash (see `_MAX_WARM_REUSES` in `bajutsu/platform_lifecycle/environments/xcuitest.py`
# for what this repeatedly surfaced on this PR's CI runs) leaves no trace of what the runner did.
# With capture on, a startup-timeout warning carries the log's tail inline
# (bajutsu/platform_lifecycle/environments/xcuitest.py), and the file itself is retained for any
# failure. The directory sits *under* `runs/` on purpose: every on-device job already uploads `runs/`
# as its artifact, so the runner log rides along and is downloadable after any failure — a mid-run
# crash included, where there is no startup-timeout to log a tail. `github.workspace` (not
# `runner.temp`, which is unavailable in workflow-level env) keys it to the checkout.
env:
  BAJUTSU_XCUITEST_RUNNER_LOG: ${{ github.workspace }}/runs/runner-logs

jobs:
  # Decide whether an on-device run is warranted. The macOS jobs only fire when the PR
  # touches what they exercise — the app, the SDK, the runtime, the build/deps, or this
  # workflow/action itself. Manual runs (no PR context) always count as relevant. The same
  # decision also gates the `visual` job below (BAJUTSU broader relevance list is a superset of
  # its former standalone path filter, so it never runs less often than before).
  #
  # The decision lives in scripts/e2e_changes.py (the positive-list of on-device-relevant paths,
  # and the merge-base diff that scopes the check to the PR's own changes) so it is unit-tested —
  # tests/test_e2e_changes.py — rather than an untested shell one-liner. Add a new
  # on-device-relevant path to the positive-list there.
  changes:
    name: detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # Full history so the script's merge-base (three-dot) diff can find the PR's fork point.
          fetch-depth: 0
      - name: Detect relevant paths
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
        run: python3 scripts/e2e_changes.py

  # Build once, fan out. Compile the two showcase apps (SwiftUI + UIKit) and the resident XCUITest
  # runner, and stage the bundled runner — every host-independent product the functional jobs below
  # install — then tar them into one artifact each consumer downloads. Building here rather than in
  # every job trades ~8 cold Swift builds on 10x-billed macOS runners for one, and rolls the
  # cold-build flake dice once instead of once per job. A `tar` (not upload-artifact's per-file
  # upload) preserves the .app bundles' executable bits and symlinks; the runner's .xctestrun uses
  # __TESTROOT__-relative references (demos/showcase/Makefile) and every macOS runner unpacks to the
  # identical GITHUB_WORKSPACE path, so the products relocate cleanly across jobs.
  build:
    name: build (app + runner)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung xcodebuild would otherwise run to the 6h
    # default. A cold build of both apps + the runner is ~6min, so 30 catches a real hang with
    # comfortable headroom.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain
        with:
          # A build needs no Simulator; the consumer jobs boot their own. Skipping the boot frees
          # this job's CoreSimulator work.
          boot: "false"

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs. Keyed on
      # Xcode + the app's Swift sources + project spec; the `-app-` infix keeps this app-scheme cache
      # from colliding with the codegen job's UITests-scheme cache that writes the same DerivedData
      # path. restore-keys warm compiled modules on a partial source change; a miss just rebuilds
      # cold, so the cache only ever speeds the build, never its result.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # The resident XCUITest runner builds into its own DerivedData dir; cache it separately
      # (keyed on the runner's Swift sources + project spec) so `runner-build` is incremental too.
      - name: Cache DerivedData (runner)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: BajutsuKit/Runner/build/dd
          key: xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'BajutsuKit/Runner/project.yml') }}
          restore-keys: |
            xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # The UIKit twin builds into its own DerivedData dir; cache it separately (keyed on the UIKit
      # app's Swift sources + project spec). Only the bundled-runner job installs it, but building it
      # here keeps the fan-out artifact complete.
      - name: Cache DerivedData (uikit)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/uikit/build/dd
          key: xcode-dd-uikit-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/uikit/**/*.swift', 'demos/showcase/ios/uikit/**/project.yml') }}
          restore-keys: |
            xcode-dd-uikit-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # Build both a11y apps and the resident XCUITest runner. `make runner-bundle` (BE-0292) runs
      # its own `runner-build` (so the testRunner-config path is populated too) AND stages the runner
      # into bajutsu/_xcuitest_runner/ for the bundled-runner job — one command covers both runner
      # consumers.
      - name: Build the apps + runner
        run: |
          make -C demos/showcase swiftui-build
          make -C demos/showcase uikit-build
          make runner-bundle

      # Tar the products so the .app bundles keep their executable bits + symlinks (upload-artifact
      # uploads files individually and would flatten both). The whole runner Products dir travels
      # together so the .xctestrun's __TESTROOT__-relative bundle references resolve after untar.
      - name: Package the build products
        run: |
          tar -cf ios-build.tar \
            demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app \
            demos/showcase/ios/uikit/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseUIKit.app \
            BajutsuKit/Runner/build/dd/Build/Products \
            bajutsu/_xcuitest_runner

      - name: Upload the build products
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ios-build
          path: ios-build.tar
          # Throwaway per-run products; no reason to keep them beyond a day of debugging.
          retention-days: 1
          if-no-files-found: error

  smoke:
    name: smoke (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + install + run is ~5min, so 15
    # catches a hung Simulator/runner on the metered macOS runner with comfortable headroom.
    timeout-minutes: 15
    # BE-0231 unit 4: a cold-boot CI Simulator sometimes renders the first Stable row later than the
    # shared smoke scenario's 10s first-wait allows — even with unit 2's `readyWhen` gate (which waits
    # up to _await_ready's own 10s for that row). Raise the wait *floor* so the condition wait has the
    # budget to see it: the gate's ~10s plus this 20s ceiling gives the row ~30s from launch, well
    # past the >20s cold-boot render observed on this lane. A condition wait returns the instant the
    # row appears, so a fast render is unaffected — no fixed sleep (prime directive 2), the same knob
    # the Android e2e lane opts into (demos/showcase/android/Makefile). Only a genuine no-show spends
    # the full budget, and it still fails loudly, bounded well under timeout-minutes above.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run smoke scenarios
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/smoke.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: smoke-run

  # Real on-device XCUITest actuation beyond the conformance job's `tap` (BE-0281): drives `back`,
  # device control, and text editing that the smoke / golden / visual jobs above never reach (they
  # only `wait`/`expect`). The proven tab-crossing gesture / text scenarios (search.yaml,
  # notices.yaml) live in the `runner-actuation` job below, which feeds the required `E2E` gate;
  # this job is the non-gating landing pad where newer actuation earns its stability first:
  #   - navigation.yaml: tap a Stable row → push Horse Detail → `back` (the OS back button). `tap` is
  #     already the conformance job's contract, but `back` end-to-end through the resident runner is not.
  #   - device.yaml / push.yaml: `setLocation`, clipboard round-trip, and a simctl `push` — the
  #     device-control family, the iOS twin of Android's device control (BE-0210). Both run on the
  #     launch tab.
  #   - text_editing.yaml: `select` + `copy` (⌘A / ⌘C), then `delete` and `clear` on the Search field,
  #     with the copied text read back through the `clipboard` assertion — the four text-editing
  #     actuators no other scenario drove. It crosses to the Search tab, so once stable it can move up
  #     to the runner-actuation job beside search.yaml.
  # Deliberately NOT in the `E2E` gate's `needs:` below (like `golden` / `visual`): the Simulator lane
  # has a flakiness history (BE-0218), so new actuation lands as a per-PR signal first and is promoted
  # to the gate only once it proves stable.
  # Interaction + device control (BE-0281): four independent, unrelated scenarios that once shared
  # one job "purely for cost reasons" — the `build` job now stages the products, so the reason to
  # bundle is gone. Each scenario is its own matrix leg: a leg is a whole job, so GitHub's "Re-run
  # failed jobs" reruns only the scenario that failed and never the ones that already passed, and no
  # single leg comes near the timeout. `fail-fast: false` keeps a failing leg from cancelling its
  # siblings — the property the old continue-on-error + "Report actuation results" bundle emulated
  # by hand. Kept out of the `e2e` gate's `needs:` (below), unchanged from the bundle it replaces.
  #   - navigation:   `tap` + `back` end-to-end, on the Stable launch tab.
  #   - device:       setLocation + clipboard round-trip (simctl), on the launch tab — the iOS twin
  #                   of android-e2e.yml's device-control coverage (BE-0210).
  #   - push:         a simctl `push` delivery — iOS-only (no faithful Android-emulator equivalent,
  #                   so it lives apart from the cross-backend device.yaml, see push.yaml's header).
  #   - text_editing: `select` + `copy` round-trip the Search field's text through the clipboard,
  #                   then `delete` + `clear` edit it down (iOS-only single-form ids, Search tab).
  actuation:
    name: actuation (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + one short scenario run is ~4min,
    # so 15 catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 15
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # the scenario's own 10s first-wait — the same knob the `smoke` job above and the Android lane
    # use. A condition wait returns the instant the row appears, so this is a ceiling, not a sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    strategy:
      fail-fast: false
      matrix:
        scenario: [navigation, device, push, text_editing]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run the ${{ matrix.scenario }} scenario (xcuitest)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/${{ matrix.scenario }}.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: actuation-${{ matrix.scenario }}-run

  # The BE-0006 element-tree golden over XCUITest: pins the normalized accessibility tree for the
  # Stable catalog's list rows, reached on the launch tab. Runs golden.yaml per PR — the iOS twin of
  # android-e2e.yml's `golden (adb)` job. Deliberately NOT in the `e2e` gate's `needs:` (like
  # `visual`): the tree golden is deterministic and host-independent, so a golden drift surfaces
  # here as a per-PR signal without blocking merges.
  golden:
    name: golden (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + the golden run is well under this;
    # 15 catches a hung Simulator/runner on the metered macOS runner with comfortable headroom.
    timeout-minutes: 15
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # the scenario's own 10s first-wait — the same knob the `smoke` job above and the Android lane use.
    # A condition wait returns the instant the row appears, so this is a ceiling, not a fixed sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      # Runs golden.yaml over XCUITest; the scenario compares against its goldens/ baseline, a
      # field-level tolerant compare (bajutsu/golden.py) that is ABI-stable.
      - name: Run golden scenarios (BE-0006)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/golden/golden.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: ios-golden-run

  # The codegen output path: a scenario -> native XCUITest, compiled and run by xcodebuild
  # with no bajutsu / AI at test time. This is the claim M3 makes about codegen, so CI
  # has to exercise the generated Swift natively (not just the XCUITest runtime the other jobs
  # use). It runs against the SwiftUI a11y app, whose identifiers the generated test queries by name.
  # Self-contained (not a consumer of the `build` job's artifact): it compiles and runs the UITests
  # scheme via `xcodebuild test`, a different product than the resident runner the others install.
  codegen:
    name: codegen (xcuitest)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # Cap the metered macOS job (10x billing): a hung Simulator/xcodebuild would otherwise run to
    # the 6h default. Typical end-to-end is ~10min, so 25 catches a real hang with comfortable headroom.
    timeout-minutes: 25
    # `make ui-test` runs `uv run bajutsu codegen`, whose auto-sync would otherwise pull the dev
    # group (mypy / pytest / ruff + the gate-only extras). Codegen needs only the base package, so
    # skip dev for every uv invocation in this job — the Linux `check` gate owns that tooling.
    env:
      UV_NO_DEV: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      # Cache xcodebuild DerivedData so the UITest build is incremental across runs. Keyed on the
      # Xcode version + Swift sources + project spec; the restore-keys fallback warms the cache
      # (compiled modules) when only sources change, scoped to the same Xcode, and a miss simply
      # rebuilds cold — so the cache only ever speeds the build, never changes its result. No
      # `-app-` infix (unlike the build job's app cache): this job builds the UITests scheme into the
      # same DerivedData path, so its cache must never collide with that one.
      - name: Cache DerivedData
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # `make -C demos/showcase ui-test` re-generates ComponentsUITests.swift from the scenario,
      # regenerates the project, then `xcodebuild test`s it against the SwiftUI a11y app — no
      # bajutsu / AI at test time. No explicit "Wait for the Simulator" step (unlike the jobs that
      # install/actuate directly and follow the toolchain action's `udid` note): `xcodebuild test`
      # blocks on the destination becoming ready when it reaches the test phase, by which point the
      # boot the toolchain action started has finished.
      - name: Codegen + run native XCUITest
        run: make -C demos/showcase ui-test SIM=${{ steps.toolchain.outputs.udid }}

      # BE-0297 Unit 1/2/4: compile-and-run the DSL constructs components.yaml never reaches
      # (text-editing / gestures / multi-touch / coordinate-swipe / drag / compound selectors),
      # reusing scenarios already proven on-device by `bajutsu run` so only the emitted Swift is
      # newly under test. continue-on-error keeps this a non-gating per-PR signal (like `actuation`
      # / `golden`): the required Components step above owns this job's `E2E`-gate verdict, and the
      # newly compiled slice is promoted into the gate only once it proves stable. The DerivedData
      # cache makes this second build incremental over the Components build.
      - name: Codegen coverage (non-gating) — extended DSL surface
        id: codegen_coverage
        continue-on-error: true
        run: make -C demos/showcase ui-test-coverage SIM=${{ steps.toolchain.outputs.udid }}

      # continue-on-error keeps the job green, so surface a failure as a PR annotation rather than
      # letting it vanish — the non-gating slice's whole purpose is a visible per-PR signal (the
      # `actuation` job likewise re-reports its continue-on-error steps). Not a job failure: the
      # slice is promoted into the required gate only once it is stable (BE-0297 Unit 4).
      - name: Flag coverage failure (non-gating)
        if: steps.codegen_coverage.outcome == 'failure'
        run: |
          echo "::warning title=Codegen coverage (BE-0297)::The non-gating extended-DSL codegen slice failed to compile or run — see the 'Codegen coverage' step. Not gating; investigate before promoting it into the required gate."

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: xcuitest-result
          path: demos/showcase/ios/swiftui/build/dd/Logs/Test/*.xcresult
          if-no-files-found: ignore

  # A pinch/rotate scenario run through the full `bajutsu run` path on the XCUITest backend
  # (BE-0019): two-finger gestures actuated through the resident runner's /gesture endpoint and
  # snapshot-handle addressing. This exercises the actuator end to end via the run loop, not just
  # the driver contract the conformance job runs — the one class of actuation the retired idb
  # backend could not drive (BE-0290). Feeds the required `E2E` gate directly (no
  # continue-on-error): unlike the non-gating `actuation` job, an early failure here should stop
  # the job rather than trade gate strictness for a per-scenario signal.
  gestures:
    name: gestures (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + the gesture scenario run is
    # ~6min, so 15 catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run the multi-touch scenario (xcuitest)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/gestures_multitouch.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: gestures-run

  # The deterministic permission surface (BE-0276, BE-0316): each scenario taps a tab-bar item
  # behind the native tab bar (docs/showcase.md), a target a coordinate backend can never resolve,
  # so both need the same forced-XCUITest treatment. Feeds the required `E2E` gate directly (no
  # continue-on-error), like `gestures` above.
  #   - permission.yaml: the `permissions` field on-device. `--exclude ai` drops the file's
  #     notification scenario (its iOS grant path needs the vision `dismissAlerts` guard, so it
  #     stays out of this deterministic gate — prime directive 1) and keeps only `location`, which
  #     `simctl privacy grant` pre-grants before launch with no prompt. android-e2e.yml's
  #     `smoke (adb)` job already runs both scenarios in permission.yaml unchanged, so this is the
  #     iOS twin of that coverage.
  #   - permission_system_alert.yaml: the `handleSystemAlert` step. It fires the
  #     notification-permission request, then taps the SpringBoard prompt's "Allow" button by a
  #     native accessibility query — no vision model, so this is the deterministic counterpart to
  #     permission.yaml's `dismissAlerts` grant (which the step above excludes as `ai`). Its own
  #     file, not a scenario in permission.yaml: only the iOS (XCUITest) backend declares the
  #     capability, so a scenario in the shared file would fail android-e2e.yml's required
  #     `smoke (adb)` job at preflight.
  permission:
    name: permission (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + one short scenario run is ~4min,
    # so 15 catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 15
    # The two permission scenarios are independent; one leg each means a re-run touches only the one
    # that failed. `fail-fast: false` keeps a failing leg from cancelling its sibling. The `e2e`
    # gate `needs: permission` sees this job's aggregate result — failure if either leg failed — so
    # the required check is unchanged by the split (a matrix job is still one job to `needs:`).
    #   - permission.yaml (exclude ai): the `permissions` field on-device. `--exclude ai` drops the
    #     file's notification scenario (its iOS grant path needs the vision `dismissAlerts` guard, so
    #     it stays out of this deterministic gate — prime directive 1) and keeps only `location`,
    #     which `simctl privacy grant` pre-grants before launch with no prompt. android-e2e.yml's
    #     `smoke (adb)` job already runs both scenarios in permission.yaml unchanged, so this is the
    #     iOS twin of that coverage.
    #   - permission_system_alert.yaml: the `handleSystemAlert` step. It fires the
    #     notification-permission request, then taps the SpringBoard prompt's "Allow" button by a
    #     native accessibility query — no vision model, so this is the deterministic counterpart to
    #     permission.yaml's `dismissAlerts` grant (which the leg above excludes as `ai`). Its own
    #     file, not a scenario in permission.yaml: only the iOS (XCUITest) backend declares the
    #     capability, so a scenario in the shared file would fail android-e2e.yml's required
    #     `smoke (adb)` job at preflight.
    strategy:
      fail-fast: false
      matrix:
        include:
          # `exclude_tags` (not `exclude`, a reserved matrix key) feeds the action's `exclude`
          # input; "" runs every scenario in the file, exactly as the default did.
          - scenario: permission
            exclude_tags: ai
            artifact: permission-run
          - scenario: permission_system_alert
            exclude_tags: ""
            artifact: permission-system-alert-run
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run the ${{ matrix.scenario }} scenario (xcuitest)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/${{ matrix.scenario }}.yaml
          exclude: ${{ matrix.exclude_tags }}
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: ${{ matrix.artifact }}

  # XCUITest actuation on the runner channel (BE-0281): the `/type` and `/swipe` + `/back`
  # endpoints of the resident BajutsuRunner, which on-device CI reached only for tap / pinch /
  # rotate before this. Both scenarios open with a tab tap (they filter the Search list / walk the
  # Notices list, screens behind the native tab bar). Feeds the required `E2E` gate directly (no
  # continue-on-error), like `gestures` above.
  #   - search.yaml: `/type` into the Search field, then assert the filtered count.
  #   - notices.yaml: `/swipe` to walk an off-screen row into view, then `/back` from
  #     the pushed Notice Detail. The Notices List is XCUITest's reliable scroll surface (the Log
  #     Form's deep rows are not, see gestures_multitouch.yaml's header).
  runner-actuation:
    name: runner-actuation (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + one short scenario run is ~4min,
    # so 15 catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 15
    # One leg per scenario so a re-run touches only the one that failed; `fail-fast: false` keeps a
    # failing leg from cancelling its sibling. The `e2e` gate `needs: runner-actuation` sees the
    # aggregate result, so the required check is unchanged by the split.
    #   - search.yaml: `/type` into the Search field, then assert the filtered count.
    #   - notices.yaml: `/swipe` to walk an off-screen row into view, then `/back` from the pushed
    #     Notice Detail. The Notices List is XCUITest's reliable scroll surface (the Log Form's deep
    #     rows are not, see gestures_multitouch.yaml's header).
    strategy:
      fail-fast: false
      matrix:
        scenario: [search, notices]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/swiftui/build/dd/Build/Products/Debug-iphonesimulator/BajutsuShowcaseSwiftUI.app"

      - name: Run the ${{ matrix.scenario }} scenario (xcuitest — runner channel)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/${{ matrix.scenario }}.yaml
          target: showcase-swiftui
          backend: xcuitest
          config: demos/showcase/showcase.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: runner-actuation-${{ matrix.scenario }}-run

  # The bundled-runner path (BE-0292): the same resident runner, but resolved from the wheel
  # bundle instead of a config `testRunner`. Uses showcase.bundled-runner.config.yaml, whose
  # targets carry no `xcuitest` block, so with the runner staged into bajutsu/_xcuitest_runner/ by
  # the `build` job's `make runner-bundle`, resolution falls through to the bundled runner and
  # materializes it into the cache — proving a Simulator run needs no runner-build and no runner
  # path. smoke.yaml runs identically on every target (it only asserts the fixed Stable catalog), so
  # it is the steadiest proof; running it on both toolkits shows the one app-agnostic bundled runner
  # (BE-0019) drives SwiftUI and UIKit alike. Forced onto XCUITest since the bundled runner is the
  # point. Feeds the required `E2E` gate directly (no continue-on-error), like `gestures` above.
  # One leg per toolkit means a re-run installs and drives only the toolkit that failed — no
  # reinstalling both apps to re-prove the one that passed. `fail-fast: false` keeps a failing leg
  # from cancelling its sibling; the `e2e` gate `needs: bundled-runner` sees the aggregate result,
  # so the required check is unchanged.
  bundled-runner:
    name: bundled-runner (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the apps + bundled runner) — boot + one smoke run is
    # ~4min, so 15 catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolkit: swiftui
            target: showcase-swiftui
            app: BajutsuShowcaseSwiftUI
            artifact: bundled-runner-swiftui-run
          - toolkit: uikit
            target: showcase-uikit
            app: BajutsuShowcaseUIKit
            artifact: bundled-runner-uikit-run
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt apps + bundled runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      - name: Install the app
        run: xcrun simctl install "${{ steps.toolchain.outputs.udid }}" "demos/showcase/ios/${{ matrix.toolkit }}/build/dd/Build/Products/Debug-iphonesimulator/${{ matrix.app }}.app"

      - name: Run smoke on the bundled runner (xcuitest — ${{ matrix.toolkit }}, no testRunner)
        uses: ./.github/actions/bajutsu-e2e
        with:
          scenarios: demos/showcase/scenarios/smoke.yaml
          target: ${{ matrix.target }}
          backend: xcuitest
          config: demos/showcase/showcase.bundled-runner.config.yaml
          udid: ${{ steps.toolchain.outputs.udid }}
          artifact-name: ${{ matrix.artifact }}

  # The driver conformance suite (BE-0114): one backend-agnostic contract, run on-device against
  # the XCUITest backend (the resident BajutsuRunner). It proves the determinism-core invariants
  # (ambiguous selector fails, zero-match fails, capabilities() matches behavior, condition-backed
  # waits) hold on the real actuator, not just FakeDriver (fast gate) and Playwright (web CI).
  # `launch_driver` brings the backend up itself (erase / install / launch), so this job only needs
  # the app + runner staged by the `build` job and a booted Simulator; the `ondevice` pytest marker
  # (deselected by the gate's default) means the same contract file runs here unchanged.
  conformance:
    name: conformance (xcuitest)
    needs: [changes, build]
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # No build here (the `build` job staged the products) — boot + the pytest suite is ~8min, so 20
    # catches a real hang on the metered macOS runner with headroom.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain

      - name: Download the prebuilt app + runner
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: ios-build

      - name: Unpack the build products
        run: tar -xpf ios-build.tar

      # This job runs the suite through pytest, so its venv keeps the dev group (unlike the
      # bajutsu-e2e action's `--no-dev` run path). No build to overlap it with, so a plain sync.
      - name: Sync dependencies
        run: uv sync

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      # `launch_driver` erases/installs/launches the backend, so no explicit install here. `-m
      # ondevice` overrides the repo default (`-m 'not web and not ondevice'`) to select exactly the
      # on-device suite; BAJUTSU_CONFORMANCE_UDID both routes the backend and un-skips the module.
      # `-n0` overrides the default `-n auto`: the suite reseeds one shared Simulator via a single
      # spec file the app polls, so parallel workers would clobber each other's screen — run serially.
      - name: Run the conformance suite (xcuitest)
        env:
          BAJUTSU_CONFORMANCE_UDID: ${{ steps.toolchain.outputs.udid }}
        run: uv run pytest tests/test_driver_conformance_ondevice.py -m ondevice -n0 -v

  # On-device iOS visual-regression (VRT): the iOS twin of android-e2e.yml's `e2e-visual`. Boots a
  # Simulator, builds the SwiftUI showcase, and runs the committed pixel VRT
  # (`make -C demos/showcase e2e-visual`) over the XCUITest backend, comparing the Stable catalog
  # against the committed baselines_ios/ baseline. Deterministic (a pixel compare, no LLM), so it
  # stays within the prime directives. Self-contained (not a consumer of the `build` job's
  # artifact): `make e2e-visual`'s `swiftui-build` prerequisite would rebuild the app regardless, and
  # this job pins a geometry-specific Simulator model the shared build is indifferent to.
  #
  # Gated by the same `changes` job as the functional jobs above, but deliberately NOT part of the
  # `e2e` gate's `needs:` below: a pixel baseline is host-specific — the Simulator renderer varies
  # by Xcode / device / OS — so a drift should surface as a signal on its own job, not block PRs on
  # the required check. On a drift the captured screenshot is uploaded to re-record the baseline
  # from (see demos/showcase/scenarios/visual/baselines_ios/README.md), the same bootstrap the
  # Android baseline used.
  visual:
    name: visual (xcuitest)
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    runs-on: macos-latest
    # A cold Xcode build (~2.5min) + a fresh Simulator boot (~80s) + the VRT run is well under this;
    # 25 catches a hung Simulator/runner on the metered macOS runner with comfortable headroom.
    timeout-minutes: 25
    # Raise the wait floor so a cold-boot Simulator has budget to render the first Stable row before
    # the scenario's own 10s first-wait — the same knob the `smoke` job above and the Android lane use.
    # A condition wait returns the instant the row appears, so this is a ceiling, not a fixed sleep.
    env:
      BAJUTSU_MIN_WAIT_TIMEOUT: "20"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up the iOS toolchain
        id: toolchain
        uses: ./.github/actions/setup-ios-toolchain
        with:
          # Pin the exact model the committed baseline was recorded on (see baselines_ios/README.md),
          # the iOS twin of android-e2e.yml's `profile: pixel_6`. Unpinned, boot-simulator takes
          # whichever iPhone the runner's Xcode ships first — a resolution change would drift this
          # pixel VRT for reasons unrelated to any UI change. A model missing from the runner fails
          # loudly rather than silently drifting.
          device-type: iPhone 17

      # Cache the showcase app's DerivedData so `swiftui-build` is incremental across runs (matches
      # the build job's app cache). A miss just rebuilds cold, so the cache only ever speeds the build.
      - name: Cache DerivedData (app)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: demos/showcase/ios/swiftui/build/dd
          key: xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'demos/showcase/ios/swiftui/**/*.swift', 'demos/showcase/ios/swiftui/**/project.yml') }}
          restore-keys: |
            xcode-dd-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # The resident XCUITest runner builds into its own DerivedData dir; cache it separately
      # (keyed on the runner's Swift sources + project spec) so `runner-build` is incremental too.
      - name: Cache DerivedData (runner)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: BajutsuKit/Runner/build/dd
          key: xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-${{ hashFiles('BajutsuKit/**/*.swift', 'BajutsuKit/Runner/project.yml') }}
          restore-keys: |
            xcode-dd-runner-${{ runner.os }}-${{ runner.arch }}-${{ steps.toolchain.outputs.xcode-version }}-

      # Sync the visual Python extra concurrently with the app + runner build (the extra is
      # independent of the build): the pixel-compare deps `make e2e-visual` needs. A build failure
      # exits first under `set -e`; the trap stops the background sync so it doesn't trail on a
      # metered runner.
      - name: Build the app + runner (fetch visual deps concurrently)
        run: |
          uv sync --extra visual --no-dev &
          sync_pid=$!
          trap 'kill "$sync_pid" 2>/dev/null || true' EXIT
          make -C demos/showcase swiftui-build
          make -C demos/showcase runner-build
          wait "$sync_pid"
          trap - EXIT

      - name: Wait for the Simulator
        run: xcrun simctl bootstatus "${{ steps.toolchain.outputs.udid }}" -b

      # Run the committed pixel VRT over XCUITest. `make e2e-visual` (demos/showcase/Makefile)
      # installs the freshly-built app, drives the Stable catalog on the launch tab, and
      # pixel-compares it against baselines_ios/stable.png with the status bar + tab bar masked.
      - name: Run the visual regression (VRT, pixel snapshot)
        run: make -C demos/showcase e2e-visual SIM=${{ steps.toolchain.outputs.udid }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ios-e2e-visual-run
          path: runs/
          if-no-files-found: ignore

  # Single required status check for E2E. Always runs so it reports even when the macOS
  # jobs are skipped (docs-only PRs) — a skipped dependency is a pass; only a real
  # failure or cancellation fails the gate. `build` is included so a build failure (which skips
  # every consumer job, and a skipped job would otherwise read as a pass) still reddens the gate.
  # `actuation`, `golden`, and `visual` are deliberately excluded from `needs:` (see each job's
  # comment) so newly-wired actuation (BE-0281) or a host-specific pixel drift never blocks a merge.
  # Make `E2E` the required check, not the path-gated macOS jobs.
  e2e:
    name: E2E (iOS)
    needs: [changes, build, smoke, codegen, gestures, permission, runner-actuation, bundled-runner, conformance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check E2E results
        env:
          BUILD: ${{ needs.build.result }}
          SMOKE: ${{ needs.smoke.result }}
          CODEGEN: ${{ needs.codegen.result }}
          GESTURES: ${{ needs.gestures.result }}
          PERMISSION: ${{ needs.permission.result }}
          RUNNER_ACTUATION: ${{ needs.runner-actuation.result }}
          BUNDLED_RUNNER: ${{ needs.bundled-runner.result }}
          CONFORMANCE: ${{ needs.conformance.result }}
        run: |
          echo "build=$BUILD smoke=$SMOKE codegen=$CODEGEN gestures=$GESTURES permission=$PERMISSION runner_actuation=$RUNNER_ACTUATION bundled_runner=$BUNDLED_RUNNER conformance=$CONFORMANCE"
          for result in "$BUILD" "$SMOKE" "$CODEGEN" "$GESTURES" "$PERMISSION" "$RUNNER_ACTUATION" "$BUNDLED_RUNNER" "$CONFORMANCE"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "E2E failed"
              exit 1
            fi
          done
          echo "E2E passed (or skipped — no on-device change)"
