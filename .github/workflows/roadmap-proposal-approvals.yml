# Require two approving reviews before a BE *proposal* PR can merge.
#
# A new roadmap item is authored under `roadmaps/proposals/` (it is a proposal first unless its code
# ships with it), and accepting a proposal is a design decision worth more than one reviewer — so any
# PR that adds or edits a file under `roadmaps/proposals/` needs two approvals, above the repo-wide
# single-approval bar. This is a *status check*, not branch protection: only a check can raise the bar
# for one path without raising it for every PR. Add it to `main`'s ruleset as a required check to make
# the gate binding.
#
# It re-runs on `pull_request_review` so a second approval flips it green, and — like pr-title — it
# stays a step-level guard: a PR that touches no `roadmaps/proposals/` file completes the job green
# (a no-op), keeping the required-check contract satisfied for every PR, not just proposals.
name: roadmap-proposal-approvals

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed, edited]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: roadmap-proposal-approvals-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  require-two-approvals:
    name: require two approvals for BE proposals
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      REQUIRED: 2
    steps:
      - name: Detect whether the PR touches a BE proposal
        id: scope
        run: |
          files="$(gh api --paginate "repos/${REPO}/pulls/${PR}/files" -q '.[].filename')"
          if printf '%s\n' "$files" | grep -q '^roadmaps/proposals/'; then
            echo "proposal=true" >> "$GITHUB_OUTPUT"
          else
            echo "proposal=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR #${PR} touches no roadmaps/proposals/ file — the two-approval rule does not apply. No-op."
          fi

      - name: Require at least two approving reviews
        if: steps.scope.outputs.proposal == 'true'
        run: |
          # Count distinct reviewers whose *latest* review is APPROVED — a later CHANGES_REQUESTED or
          # a dismissal supersedes an earlier approval. group_by needs the ISO-8601 submitted_at, which
          # sorts lexicographically, so max_by picks each reviewer's most recent state. The PR author
          # can't approve their own PR, so no self-approval filter is needed.
          approvals="$(gh api --paginate "repos/${REPO}/pulls/${PR}/reviews" \
            -q 'group_by(.user.login) | map(max_by(.submitted_at)) | map(select(.state == "APPROVED")) | length')"
          echo "Approving reviews: ${approvals:-0} (need ${REQUIRED})."
          if [ "${approvals:-0}" -lt "${REQUIRED}" ]; then
            echo "::error::BE proposal PRs require ${REQUIRED} approvals; found ${approvals:-0}."
            exit 1
          fi
