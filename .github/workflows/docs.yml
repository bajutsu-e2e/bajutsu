# Build and publish the public website + bilingual docs portal + generated API reference (BE-0093,
# extending BE-0065) to GitHub Pages. Built by `make docs` (MkDocs + mkdocs-material + mkdocstrings);
# mkdocstrings reads signatures statically via griffe, so the build imports none of the lazy/optional
# backends and needs no Simulator. Path-filtered so it runs only when the site's inputs (the docs
# tree, the Python core it documents, the theme override, the link hook, or the config) actually
# change — a separate, heavier path kept out of the `make check` gate, like on-device E2E.
#
# Every push to main that touches those inputs builds the site (`--strict`, so a broken reference or
# dead link fails here rather than publishing silently) and deploys it. workflow_dispatch stays for
# manual re-publishing. One-time setup before the first deploy can succeed: enable GitHub Pages
# (Settings → Pages → source "GitHub Actions"); until then the deploy step fails with "Ensure GitHub
# Pages has been enabled".
name: Docs site (build & deploy)

on:
  push:
    branches: [main]
    paths:
      - "bajutsu/**"
      - "docs/**"
      - "overrides/**"
      - "roadmaps/**"
      - "scripts/docs_repo_links.py"
      - "scripts/build_roadmap_dashboard.py"
      - "scripts/build_roadmap_index.py"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# The least privilege Pages deployment needs: read the repo, write the Pages artifact, and mint the
# OIDC token `deploy-pages` exchanges for the deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; don't cancel a running publish (it would leave Pages
# half-updated).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build site
    runs-on: ubuntu-latest
    steps:
      # Full history (not the default shallow clone) so the roadmap dashboard's Created/Updated
      # columns can be derived from each item's Git log (BE-0311); a shallow clone would report
      # every item as created and updated on the single checked-out commit's day.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true

      # The roadmap dashboard page is a build artifact (gitignored), generated from live BE metadata
      # (BE-0094) — regenerate it before the build so the published site always matches the committed
      # roadmap. Needs only stdlib, so `--no-dev` (no dev group, no docs extra) is enough.
      - name: Generate the roadmap dashboard page
        run: uv run --no-dev python scripts/build_roadmap_dashboard.py

      # Material's social-card plugin (enabled only in CI, where `CI=true`) renders OpenGraph images
      # via Cairo/Pango, which the `imaging` extra's Python bindings need as system libraries. A local
      # `make docs` keeps the plugin disabled, so this step is CI-only.
      - name: Install social-card system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev \
            libpango-1.0-0 libpangocairo-1.0-0

      # `--strict` fails the build on a broken reference (a bad autodoc path, a dead link), so a
      # merge that breaks the site is caught here rather than published silently.
      # --no-dev: mkdocstrings reads signatures statically (via griffe), so the build needs only the
      # `docs` extra — never the dev group (mypy / pytest / ruff + the gate-only extras), which the
      # auto-sync would otherwise pull in for nothing.
      - name: Build the site
        run: uv run --no-dev --extra docs mkdocs build --strict

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
