# Auto-label every PR by the paths it changes, so the GitHub PR list is triageable at a glance
# without opening each PR. Reads `.github/labeler.yml` (path globs -> label) and applies the
# matching `area:*` / `documentation` / `dependencies` labels via actions/labeler.
#
# This complements `roadmap-topic-labels.yml` (BE-0156), which only labels PRs that touch a
# roadmap item with its `topic:<key>`. This one covers the whole tree — code, docs, CI, tests,
# demos — so a PR that never touches `roadmaps/**` still gets an at-a-glance area label.
#
# Additive (`sync-labels` left at its default `false`): a re-run adds newly-matching labels and
# never strips labels a reviewer set by hand. Runs on `synchronize` too, so labels stay accurate
# as a PR's file set grows. Pure PR-triage tooling: it never touches `run`, the deterministic
# gate, or any pass/fail verdict.
name: PR labels

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read        # labeler reads the config from the checkout
  pull-requests: write  # add labels to the PR
  issues: write         # create an `area:*` label the first time it's used

concurrency:
  group: pr-labels-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: apply path labels
    runs-on: ubuntu-latest
    # A fork PR gets a read-only token, so label writes fail; skip it (repo-owned PRs are the only
    # ones this can act on) — the same guard roadmap-topic-labels.yml uses.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213  # v6.1.0
